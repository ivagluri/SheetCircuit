]]:\n    return {\n        \"cars\": load_cars(data_root),\n        \"drivers\": load_drivers(data_root),\n        \"tracks\": load_tracks(data_root),\n        \"events\": load_events(data_root),\n        \"parts\": load_parts(data_root),\n    }\n", "game/market.py": "from __future__ import annotations\n\nfrom game.loader import load_cars\nfrom game.models import Car\n\n\ndef list_market_cars() -> list[Car]:\n    return load_cars()\n", "game/models.py": "from __future__ import annotations\n\nfrom dataclasses import dataclass, field\n\n\n@dataclass\nclass CarIdentity:\n    id: str\n    name: str\n    year: int\n    manufacturer: str\n    model: str\n    drivetrain: str\n    layout: str\n    tags: list[str]\n\n\n@dataclass\nclass PowertrainStats:\n    power_hp: int\n    torque_nm: int\n    powerband: int\n    throttle_response: int\n    engine_reliability: int\n    cooling: int\n    aspiration: str\n    engine_stress: int\n\n\n@dataclass\nclass ChassisStats:\n    weight_kg: int\n    weight_distribution_front: float\n    center_of_gravity: int\n    chassis_rigidity: int\n    stability: int\n    rotation: int\n\n\n@dataclass\nclass TireStats:\n    tire_compound: str\n    tire_width_front: int\n    tire_width_rear: int\n    base_grip: int\n    wet_grip: int\n    tire_wear_resistance: int\n    tire_heat_resistance: int\n    tire_warmup: int\n\n\n@dataclass\nclass BrakeStats:\n    braking_power: int\n    brake_stability: int\n    brake_cooling: int\n    brake_fade_resistance: int\n\n\n@dataclass\nclass SuspensionStats:\n    handling: int\n    mechanical_grip: int\n    suspension_compliance: int\n    curb_handling: int\n    bump_absorption: int\n    steering_precision: int\n\n\n@dataclass\nclass AeroStats:\n    downforce: int\n    drag: int\n    aero_efficiency: int\n    high_speed_stability: int\n\n\n@dataclass\nclass DurabilityStats:\n    overall_reliability: int\n    engine_reliability: int\n    gearbox_reliability: int\n    suspension_durability: int\n    brake_durability: int\n    cooling_capacity: int\n    mechanical_sympathy_modifier: int\n\n\n@dataclass\nclass FuelStats:\n    fuel_capacity_l: float\n    base_fuel_burn: float\n    fuel_efficiency: int\n\n\n@dataclass\nclass CarCondition:\n    overall_condition: float\n    engine_condition: float\n    gearbox_condition: float\n    suspension_condition: float\n    brake_condition: float\n    body_condition: float\n    tire_condition: float\n    mileage: int\n\n\n@dataclass\nclass TuneSetup:\n    tire_pressure_front: float\n    tire_pressure_rear: float\n    final_drive: float\n    gear_bias: float\n    brake_bias: float\n    brake_pressure: float\n    front_ride_height: int\n    rear_ride_height: int\n    suspension_stiffness_front: int\n    suspension_stiffness_rear: int\n    antiroll_front: int\n    antiroll_rear: int\n    camber_front: float\n    camber_rear: float\n    toe_front: float\n    toe_rear: float\n    front_downforce: int\n    rear_downforce: int\n    differential_power: int\n    differential_coast: int\n    differential_preload: int\n    engine_map: str\n\n\n@dataclass\nclass Car:\n    identity: CarIdentity\n    powertrain: PowertrainStats\n    chassis: ChassisStats\n    tires: TireStats\n    brakes: BrakeStats\n    suspension: SuspensionStats\n    aero: AeroStats\n    durability: DurabilityStats\n    fuel: FuelStats\n    condition: CarCondition\n    installed_parts: list[str]\n    tune: TuneSetup\n    value: int\n\n\n@dataclass\nclass Part:\n    id: str\n    name: str\n    category: str\n    cost: int\n    modifiers: dict[str, int | float]\n    class_rating_delta: int\n\n\n@dataclass\nclass TrackSegment:\n    name: str\n    length_pct: float\n    tags: list[str]\n    surface: str\n    condition: str\n\n\n@dataclass\nclass SegmentProfile:\n    \"\"\"Per-segment, position-resolved data used to run a race segment by segment.\n\n    Weights/rates are *intensive* (per unit of track position): the length-weighted\n    sum across a lap's profiles reproduces the track's aggregate weights/rates, so a\n    dry tarmac track integrates to exactly the same lap time and wear as the aggregate\n    model. ``grip_mult``/``tire_wear_mult``/``wet_weight`` carry the resolved\n    surface+condition effects (see SURFACE_MODIFIERS / CONDITION_MODIFIERS).\n    \"\"\"\n\n    name: str\n    length_pct: float\n    start_pct: float\n    end_pct: float\n    surface: str\n    condition: str\n    weights: dict[str, float]\n    tire_wear_rate: float\n    fuel_burn_rate: float\n    engine_heat_rate: float\n    grip_mult: float\n    tire_wear_mult: float\n    wet_weight: float\n\n\n@dataclass\nclass Track:\n    id: str\n    name: str\n    layout_type: str\n    base_lap_time: float\n    length_km: float\n    pit_lane_loss_s: float\n    segments: list[TrackSegment]\n    overtake_difficulty: float\n    elevation_change_m: int\n    surface: str\n    default_condition: str\n    weather_variability: float\n    power_weight: float = 0.0\n    acceleration_weight: float = 0.0\n    top_speed_weight: float = 0.0\n    grip_weight: float = 0.0\n    braking_weight: float = 0.0\n    handling_weight: float = 0.0\n    aero_weight: float = 0.0\n    tire_wear_rate: float = 0.0\n    fuel_burn_rate: float = 0.0\n    engine_heat_rate: float = 0.0\n    # Net climb grade (%) for the per-car hillclimb time penalty. Derived at load and 0.0 for\n    # loop layouts (which return to start), so it never penalises a circuit. See loader.\n    climb_gradient_pct: float = 0.0\n    segment_profiles: list[SegmentProfile] = field(default_factory=list)\n\n\n@dataclass\nclass Driver:\n    id: str\n    name: str\n    pace: int\n    consistency: int\n    racecraft: int\n    feedback: int\n    fitness: int\n    aggression: int\n    mechanical_sympathy: int\n    wet_skill: int\n    salary: int\n    experience: int = 0\n\n\n@dataclass\nclass Event:\n    id: str\n    name: str\n    track_id: str\n    car_class_limit: str\n    entry_fee: int\n    prize_money: list[int]\n    opponent_count: int\n    restrictions: dict\n    min_team_level: int = 1\n    event_kind: str = \"ladder\"\n    rival_skill: int | None = None\n    # Race length lives on the event, not the track: one track hosts a 5-lap sprint and a\n    # 24h enduro. Exactly one of these is set (validated in the loader). distance_km is\n    # resolved against the track's length_km; duration_s is time-based (structurally\n    # supported but not yet wired into the race loop).\n    laps: int | None = None\n    distance_km: float | None = None\n    duration_s: float | None = None\n\n\n@dataclass\nclass RaceFormat:\n    \"\"\"How long a race runs, resolved from an event against its track.\n\n    ``laps`` is the fixed lap target for lap- and distance-based races (the loop runs\n    exactly that many). ``mode`` records how it was specified; for ``duration`` the race\n    is open-ended (``laps`` is None) and the loop stops on the time predicate.\n    \"\"\"\n\n    mode: str  # \"laps\" | \"distance\" | \"duration\"\n    laps: int | None\n    distance_km: float | None = None\n    duration_s: float | None = None\n\n\n@dataclass\nclass EffectiveCarStats:\n    power: float\n    torque: float\n    weight: float\n    acceleration: float\n    top_speed: float\n    braking: float\n    brake_stability: float\n    grip: float\n    wet_grip: float\n    handling: float\n    mechanical_grip: float\n    aero_grip: float\n    drag: float\n    stability: float\n    tire_wear_rate: float\n    tire_heat_rate: float\n    fuel_burn_rate: float\n    engine_heat_rate: float\n    reliability: float\n    suspension_compliance: float\n    curb_handling: float\n    drivetrain: str = \"RWD\"\n    # Physical attrition inputs: fuel economy is fuel_burn_rate \u00d7 FUEL_L_PER_KM_UNIT\n    # (litres/km), drawn against this tank; tyre life derives from tire_wear_rate.\n    fuel_capacity_l: float = 0.0\n    # Real power-to-weight (hp/kg, post-parts) -- the intrinsic driver of hillclimb pace.\n    power_to_weight: float = 0.0\n\n\n@dataclass\nclass TelemetryHistory:\n    lap_times: list[float] = field(default_factory=list)\n    positions: list[int] = field(default_factory=list)\n    engine_temps: list[float] = field(default_factory=list)\n    fuel_pct: list[float] = field(default_factory=list)\n    tire_wear: list[float] = field(default_factory=list)\n    tire_temps: list[float] = field(default_factory=list)\n    driver_energy: list[float] = field(default_factory=list)\n    driver_focus: list[float] = field(default_factory=list)\n    driver_stress: list[float] = field(default_factory=list)\n\n\n@dataclass\nclass RaceCarState:\n    car_id: str\n    driver_id: str\n    label: str\n    is_player: bool\n    position: int\n    lap: int\n    distance: float\n    gap_to_leader: float\n    tire_pct: float\n    tire_temp: float\n    fuel_pct: float\n    condition_pct: float\n    engine_temp: float\n    driver_energy: float\n    driver_focus: float\n    driver_stress: float\n    pace_mode: str\n    last_lap_time: float | None\n    total_time: float\n    event_log: list[str]\n    is_dnf: bool = False\n    lap_elapsed: float = 0.0\n    # Count of event_log entries already published to the session race log, so each\n    # entry is surfaced exactly once (event_log is cumulative and never cleared).\n    event_log_published: int = 0\n\n\n@dataclass\nclass RaceSession:\n    event_id: str\n    track_id: str\n    current_lap: int\n    total_laps: int\n    cars: list[RaceCarState]\n    player_car_id: str\n    is_finished: bool\n    telemetry: dict[str, TelemetryHistory]\n    race_log: list[tuple[int, str]]\n    random_seed: int\n    car_roster: dict[str, Car] = field(default_factory=dict)\n    driver_roster: dict[str, Driver] = field(default_factory=dict)\n    track: Track | None = None\n    event: Event | None = None\n    parts: list[Part] = field(default_factory=list)\n    ticks_per_lap: int = 1\n    current_sub_tick: int = 0\n    # Set for duration (Regime A) races: the time cap the leader must cross before the\n    # lockstep field finishes the lead lap. None for lap/distance races, where total_laps is\n    # the fixed target. For duration races total_laps instead tracks the completed lap count.\n    duration_s: float | None = None\n    # The rolled race-day condition (loader.roll_race_condition); the session's track\n    # profiles are already escalated to it.\n    weather: str = \"dry\"\n    # Per-entry effective stats, computed once at entry: they are invariant for the\n    # whole race (condition and tune don't change mid-race), so ticks read this cache\n    # instead of recomputing (which deep-copies the car) every tick for every car.\n    effective_stats: dict[str, EffectiveCarStats] = field(default_factory=dict)\n    player_car_condition_before: CarCondition | None = None\n\n\n@dataclass\nclass RaceTickResult:\n    session: RaceSession\n    lap: int\n    standings: list[RaceCarState]\n    event_log: list[str]\n    is_lap_end: bool = False\n\n\n@dataclass\nclass RaceResult:\n    event_id: str\n    track_id: str\n    total_laps: int\n    standings: list[RaceCarState]\n    player_position: int\n    prize_money: int\n    lap_times: dict[str, list[float]]\n    race_log: list[str]\n", "game/opponents.py": "from __future__ import annotations\n\nimport random\nfrom copy import deepcopy\n\nfrom constants import (\n    CLASS_RIVAL_SKILL,\n    EVENT_PACE_FLOOR_PERCENTILE,\n    RIVAL_MATCH_LAP_BAND_FRAC,\n    RIVAL_MATCH_EXPANSION_FACTOR,\n    RIVAL_MATCH_MIN_UNIQUE,\n    RIVAL_MATCH_POOL_FACTOR,\n    RIVAL_SKILL_SIGMA,\n)\nfrom game.effective_stats import compute_effective_stats, derived_class, derived_rating\nfrom game.models import Car, Driver, Event, Track\n\nCLASS_ORDER = {\"E\": 0, \"D\": 1, \"C\": 2, \"B\": 3, \"A\": 4, \"S\": 5}\n\n\ndef _clamp(value: float, low: float, high: float) -> float:\n    return max(low, min(high, value))\n\n\nclass EventEntryError(ValueError):\n    \"\"\"Raised when a car cannot enter an event.\"\"\"\n\n\ndef validate_event_entry(car: Car, event: Event, parts: list | None = None) -> None:\n    if not _class_allowed(car, event.car_class_limit, parts):\n        raise EventEntryError(f\"{car.identity.name} exceeds {event.car_class_limit} class limit\")\n    failed_rule = _failed_restriction(car, event, parts or [])\n    if failed_rule:\n        raise EventEntryError(f\"{car.identity.name} fails event restriction: {failed_rule}\")\n\n\ndef build_opponent_grid(\n    event: Event,\n    player_car_id: str,\n    player_driver: Driver,\n    cars: dict[str, Car],\n    parts: list,\n    track: Track,\n    seed: int,\n) -> tuple[dict[str, Car], dict[str, Driver], list[tuple[str, str]]]:\n    \"\"\"Build a seeded rival field from honest cars and real driver stats.\n\n    The field is anchored to the player's derived event pace, not to the fastest\n    eligible car. That keeps very low-end cars competitive with nearby machinery\n    while still adapting when the catalog grows or a wildly faster/slower car is added.\n    \"\"\"\n    _ = player_driver  # Skill still affects the race, just not car matchmaking.\n    rng = random.Random(seed)\n\n    eligible = [deepcopy(car) for car in cars.values() if car.identity.id != player_car_id and _is_eligible(car, event, parts)]\n    if not eligible:\n        eligible = [deepcopy(car) for car in cars.values() if _is_eligible(car, event, parts)]\n    if not eligible:\n        eligible = [deepcopy(car) for car in cars.values() if car.identity.id != player_car_id] or [deepcopy(next(iter(cars.values())))]\n\n    player_car = cars.get(player_car_id)\n    tier_pool = _event_peer_pool(player_car, eligible, parts, track, event) if player_car else eligible\n    rival_skill = _effective_rival_skill(event)\n\n    car_roster: dict[str, Car] = {}\n    driver_roster: dict[str, Driver] = {}\n    entries: list[tuple[str, str]] = []\n    for index in range(event.opponent_count):\n        source_car = deepcopy(rng.choice(tier_pool))\n        car_id = f\"opponent_{index + 1}_{source_car.identity.id}\"\n        source_car.identity.id = car_id\n        car_roster[car_id] = source_car\n        driver = _opponent_driver(index, rival_skill, rng)\n        driver_roster[driver.id] = driver\n        entries.append((car_id, driver.id))\n    return car_roster, driver_roster, entries\n\n\ndef opponent_entry_labels(entries: list[tuple[str, str]], car_roster: dict[str, Car]) -> list[str]:\n    \"\"\"Human-readable opponent labels, numbered only when a model is reused.\"\"\"\n    names = [car_roster[car_id].identity.name for car_id, _driver_id in entries]\n    totals = {name: names.count(name) for name in set(names)}\n    seen: dict[str, int] = {}\n    labels: list[str] = []\n    for name in names:\n        seen[name] = seen.get(name, 0) + 1\n        labels.append(f\"{name} #{seen[name]}\" if totals[name] > 1 else name)\n    return labels\n\n\ndef _event_peer_pool(\n    player_car: Car,\n    eligible: list[Car],\n    parts: list,\n    track: Track,\n    event: Event,\n) -> list[Car]:\n    if not eligible:\n        return eligible\n\n    player_lap = _natural_lap(player_car, parts, track)\n    profiles = [\n        (car, _natural_lap(car, parts, track))\n        for car in eligible\n    ]\n    floor_lap = _event_floor_lap([lap for _car, lap in profiles], event.car_class_limit)\n    anchor_lap = min(player_lap, floor_lap)\n    profiles.sort(key=lambda profile: (abs(profile[1] - anchor_lap), derived_rating(profile[0], parts), profile[0].identity.id))\n\n    band = anchor_lap * RIVAL_MATCH_LAP_BAND_FRAC\n    target_unique = min(\n        len(profiles),\n        max(RIVAL_MATCH_MIN_UNIQUE, min(event.opponent_count, round(len(profiles) ** 0.5))),\n    )\n    max_pool = min(len(profiles), max(target_unique, round(event.opponent_count * RIVAL_MATCH_POOL_FACTOR)))\n    pool = [car for car, lap in profiles if abs(lap - anchor_lap) <= band]\n    if not pool:\n        expanded = [\n            car for car, lap in profiles\n            if abs(lap - anchor_lap) <= band * RIVAL_MATCH_EXPANSION_FACTOR\n        ]\n        pool = expanded or [profiles[0][0]]\n    elif len(pool) > max_pool:\n        pool = pool[:max_pool]\n    return pool\n\n\ndef _event_floor_lap(laps: list[float], class_limit: str) -> float:\n    if not laps:\n        return float(\"inf\")\n    ordered = sorted(laps)\n    percentile = EVENT_PACE_FLOOR_PERCENTILE.get(class_limit, EVENT_PACE_FLOOR_PERCENTILE[\"E\"])\n    percentile = _clamp(percentile, 0.0, 1.0)\n    index = round((len(ordered) - 1) * percentile)\n    return ordered[index]\n\n\ndef _natural_lap(car: Car, parts: list, track: Track) -> float:\n    from game.simulation import calculate_lap_time\n\n    return calculate_lap_time(compute_effective_stats(car, parts), track)\n\n\ndef _effective_rival_skill(event: Event) -> int:\n    default = CLASS_RIVAL_SKILL.get(event.car_class_limit, CLASS_RIVAL_SKILL[\"E\"])\n    skill = default if event.rival_skill is None else event.rival_skill\n    return int(round(_clamp(skill, 0, 100)))\n\n\ndef _is_eligible(car: Car, event: Event, parts: list) -> bool:\n    return _class_allowed(car, event.car_class_limit, parts) and _failed_restriction(car, event, parts) == \"\"\n\n\ndef _class_allowed(car: Car, class_limit: str, parts: list | None = None) -> bool:\n    car_rank = CLASS_ORDER.get(derived_class(car, parts), 99)\n    limit_rank = CLASS_ORDER.get(class_limit, 99)\n    return car_rank <= limit_rank\n\n\ndef _failed_restriction(car: Car, event: Event, parts: list) -> str:\n    restrictions = event.restrictions or {}\n    if \"max_power_hp\" in restrictions and car.powertrain.power_hp > restrictions[\"max_power_hp\"]:\n        return f\"max_power_hp {restrictions['max_power_hp']}\"\n    if \"max_weight_kg\" in restrictions and car.chassis.weight_kg > restrictions[\"max_weight_kg\"]:\n        return f\"max_weight_kg {restrictions['max_weight_kg']}\"\n    if \"max_overall_condition\" in restrictions and car.condition.overall_condition > restrictions[\"max_overall_condition\"]:\n        return f\"max_overall_condition {restrictions['max_overall_condition']}\"\n    if \"allowed_tires\" in restrictions and car.tires.tire_compound not in restrictions[\"allowed_tires\"]:\n        allowed = \", \".join(restrictions[\"allowed_tires\"])\n        return f\"allowed_tires {allowed}\"\n    if \"max_class_rating\" in restrictions and derived_rating(car, parts) > restrictions[\"max_class_rating\"]:\n        return f\"max_class_rating {restrictions['max_class_rating']}\"\n    return \"\"\n\n\ndef _skill_roll(rng: random.Random, skill: int, sigma: float = RIVAL_SKILL_SIGMA) -> int:\n    return int(round(_clamp(rng.gauss(skill, sigma), 5, 98)))\n\n\ndef _opponent_driver(index: int, skill: int, rng: random.Random) -> Driver:\n    pace = _skill_roll(rng, skill)\n    consistency = int(round(_clamp(rng.gauss(skill + 6, RIVAL_SKILL_SIGMA * 0.7), 20, 98)))\n    racecraft = _skill_roll(rng, skill)\n    mechanical_sympathy = int(round(_clamp(rng.gauss(skill + 2, RIVAL_SKILL_SIGMA), 20, 95)))\n    wet_skill = int(round(_clamp(rng.gauss(skill - 2, RIVAL_SKILL_SIGMA), 15, 95)))\n    fitness = int(round(_clamp(50 + skill * 0.35 + rng.uniform(-6, 6), 45, 90)))\n    return Driver(\n        id=f\"opponent_driver_{index + 1}\",\n        name=f\"Rival {index + 1}\",\n        pace=pace,\n        consistency=consistency,\n        racecraft=racecraft,\n        feedback=35,\n        fitness=fitness,\n        aggression=int(round(_clamp(rng.gauss(42 + skill * 0.18, 10), 20, 85))),\n        mechanical_sympathy=mechanical_sympathy,\n        wet_skill=wet_skill,\n        salary=0,\n        experience=0,\n    )\n", "game/progression.py": "from __future__ import annotations\n\nfrom dataclasses import dataclass\nfrom typing import Any, Mapping\n\nfrom constants import (\n    EVENT_KIND_LADDER,\n    TEAM_LEVEL_BY_CLASS,\n    TEAM_LEVEL_THRESHOLDS,\n    TEAM_XP_BY_CLASS,\n    TEAM_XP_EVENT_KIND_MULTIPLIER,\n    TEAM_XP_FINISH_MULTIPLIERS,\n    TEAM_XP_FIRST_WIN_BONUS_MULTIPLIER,\n    TEAM_XP_REPEAT_MULTIPLIERS,\n)\n\n\n@dataclass(frozen=True)\nclass TeamXpProgress:\n    level: int\n    xp: int\n    level_start_xp: int\n    next_level: int | None\n    next_level_xp: int | None\n    xp_into_level: int\n    xp_needed_for_next: int | None\n    level_fraction: float\n\n\n@dataclass(frozen=True)\nclass TeamXpAward:\n    car_class_limit: str\n    event_kind: str\n    base_xp: int\n    finish_multiplier: float\n    event_kind_multiplier: float\n    repeat_multiplier: float\n    first_win: bool\n    result_xp: int\n    first_win_bonus: int\n    total_xp: int\n\n\ndef team_level_for_xp(team_xp: int) -> int:\n    \"\"\"Highest team level whose threshold has been reached.\"\"\"\n    xp = max(0, int(team_xp))\n    level = min(TEAM_LEVEL_THRESHOLDS)\n    for candidate, threshold in sorted(TEAM_LEVEL_THRESHOLDS.items()):\n        if xp >= threshold:\n            level = candidate\n    return level\n\n\ndef team_xp_progress(team_xp: int) -> TeamXpProgress:\n    \"\"\"Progress within the current level, including next-level target when any.\"\"\"\n    xp = max(0, int(team_xp))\n    level = team_level_for_xp(xp)\n    level_start = TEAM_LEVEL_THRESHOLDS[level]\n    later_levels = [\n        (candidate, threshold)\n        for candidate, threshold in sorted(TEAM_LEVEL_THRESHOLDS.items())\n        if candidate > level\n    ]\n    if not later_levels:\n        return TeamXpProgress(\n            level=level,\n            xp=xp,\n            level_start_xp=level_start,\n            next_level=None,\n            next_level_xp=None,\n            xp_into_level=xp - level_start,\n            xp_needed_for_next=None,\n            level_fraction=1.0,\n        )\n    next_level, next_threshold = later_levels[0]\n    span = max(1, next_threshold - level_start)\n    into_level = xp - level_start\n    return TeamXpProgress(\n        level=level,\n        xp=xp,\n        level_start_xp=level_start,\n        next_level=next_level,\n        next_level_xp=next_threshold,\n        xp_into_level=into_level,\n        xp_needed_for_next=max(0, next_threshold - xp),\n        level_fraction=max(0.0, min(1.0, into_level / span)),\n    )\n\n\ndef min_team_level_for_class(car_class_limit: str) -> int:\n    \"\"\"Default event gate for a class ladder event.\"\"\"\n    try:\n        return TEAM_LEVEL_BY_CLASS[car_class_limit]\n    except KeyError as exc:\n        raise ValueError(f\"Unknown car class limit: {car_class_limit}\") from exc\n\n\ndef is_team_level_unlocked(team_xp: int, min_team_level: int) -> bool:\n    return team_level_for_xp(team_xp) >= int(min_team_level)\n\n\ndef empty_event_progress() -> dict[str, Any]:\n    return {\n        \"starts\": 0,\n        \"best_position\": None,\n        \"wins\": 0,\n        \"podiums\": 0,\n        \"best_time_s\": None,\n    }\n\n\ndef normalize_event_progress(progress: Mapping[str, Any] | None) -> dict[str, Any]:\n    \"\"\"Fill missing event-progress fields while preserving future extra keys.\"\"\"\n    normalized = empty_event_progress()\n    if progress:\n        normalized.update(dict(progress))\n    normalized[\"starts\"] = max(0, int(normalized.get(\"starts\") or 0))\n    normalized[\"wins\"] = max(0, int(normalized.get(\"wins\") or 0))\n    normalized[\"podiums\"] = max(0, int(normalized.get(\"podiums\") or 0))\n    best_position = normalized.get(\"best_position\")\n    normalized[\"best_position\"] = int(best_position) if best_position is not None else None\n    best_time = normalized.get(\"best_time_s\")\n    normalized[\"best_time_s\"] = float(best_time) if best_time is not None else None\n    return normalized\n\n\ndef updated_event_progress(\n    progress: Mapping[str, Any] | None,\n    position: int,\n    is_dnf: bool,\n    total_time_s: float | None = None,\n) -> dict[str, Any]:\n    \"\"\"Return a new per-event progress record after one race result.\"\"\"\n    updated = normalize_event_progress(progress)\n    updated[\"starts\"] += 1\n    if is_dnf:\n        return updated\n\n    position = _valid_position(position)\n    best = updated[\"best_position\"]\n    if best is None or position < best:\n        updated[\"best_position\"] = position\n    if position == 1:\n        updated[\"wins\"] += 1\n    if position <= 3:\n        updated[\"podiums\"] += 1\n    if total_time_s is not None:\n        total_time = max(0.0, float(total_time_s))\n        best_time = updated[\"best_time_s\"]\n        if best_time is None or total_time < best_time:\n            updated[\"best_time_s\"] = total_time\n    return updated\n\n\ndef team_xp_award(\n    car_class_limit: str,\n    event_kind: str = EVENT_KIND_LADDER,\n    position: int = 1,\n    is_dnf: bool = False,\n    event_progress_before: Mapping[str, Any] | None = None,\n) -> TeamXpAward:\n    \"\"\"Calculate team XP from result quality, event type, and prior event wins.\"\"\"\n    progress = normalize_event_progress(event_progress_before)\n    base_xp = _value_for_key(TEAM_XP_BY_CLASS, car_class_limit, \"car class limit\")\n    kind_multiplier = _value_for_key(TEAM_XP_EVENT_KIND_MULTIPLIER, event_kind, \"event kind\")\n    finish_multiplier = _finish_multiplier(position, is_dnf)\n    repeat_multiplier = _repeat_multiplier(progress[\"wins\"])\n    first_win = not is_dnf and position == 1 and progress[\"wins\"] == 0\n    result_xp = round(base_xp * kind_multiplier * finish_multiplier * repeat_multiplier)\n    first_win_bonus = (\n        round(base_xp * kind_multiplier * TEAM_XP_FIRST_WIN_BONUS_MULTIPLIER)\n        if first_win\n        else 0\n    )\n    return TeamXpAward(\n        car_class_limit=car_class_limit,\n        event_kind=event_kind,\n        base_xp=base_xp,\n        finish_multiplier=finish_multiplier,\n        event_kind_multiplier=kind_multiplier,\n        repeat_multiplier=repeat_multiplier,\n        first_win=first_win,\n        result_xp=result_xp,\n        first_win_bonus=first_win_bonus,\n        total_xp=result_xp + first_win_bonus,\n    )\n\n\ndef _finish_multiplier(position: int, is_dnf: bool) -> float:\n    if is_dnf:\n        return TEAM_XP_FINISH_MULTIPLIERS[\"dnf\"]\n    position = _valid_position(position)\n    return TEAM_XP_FINISH_MULTIPLIERS.get(position, TEAM_XP_FINISH_MULTIPLIERS[\"finish\"])\n\n\ndef _repeat_multiplier(wins_before: int) -> float:\n    index = max(0, int(wins_before))\n    if index >= len(TEAM_XP_REPEAT_MULTIPLIERS):\n        return TEAM_XP_REPEAT_MULTIPLIERS[-1]\n    return TEAM_XP_REPEAT_MULTIPLIERS[index]\n\n\ndef _valid_position(position: int) -> int:\n    position = int(position)\n    if position < 1:\n        raise ValueError(f\"Race position must be 1 or greater: {position}\")\n    return position\n\n\ndef _value_for_key(mapping: Mapping[Any, Any], key: Any, label: str) -> Any:\n    try:\n        return mapping[key]\n    except KeyError as exc:\n        raise ValueError(f\"Unknown {label}: {key}\") from exc\n", "game/race_session.py": "from __future__ import annotations\n\nimport math\nimport random\nfrom copy import deepcopy\nfrom dataclasses import dataclass\n\nfrom constants import (\n    AI_COMMAND,\n    AI_PIT_FUEL_PCT,\n    AI_PIT_TIRE_PCT,\n    COMMAND_MODIFIERS,\n    CONDITION_HIT_FAILURE,\n    CONDITION_HIT_MISTAKE,\n    DRIVER_ENERGY_RECOVER_PIT,\n    DRIVER_FOCUS_RECOVER_PIT,\n    DRIVER_STAT_CAP,\n    DRIVER_STRESS_RELIEF_PIT,\n    DRIVER_XP_PER_RACE,\n    DRIVER_XP_PER_STAT_POINT,\n    DNF_DRIVER_RELIEF,\n    DNF_DRIVER_RELIEF_FLOOR,\n    ENGINE_OVERHEAT_C,\n    MISTAKE_DNF_PROB,\n    MISTAKE_TIME_MEDIUM,\n    MISTAKE_TIME_SMALL,\n    MAX_TICKS_PER_LAP,\n    MIN_TICKS_PER_LAP,\n    OVERTAKE_BASE_CHANCE_PER_LAP,\n    OVERTAKE_CONTEST_MAX_S,\n    OVERTAKE_FOLLOW_GAP_S,\n    OVERTAKE_GAP_JITTER_S,\n    OVERTAKE_RACECRAFT_PER_POINT,\n    PERCENT_MAX,\n    PRESENTATION_SPEED_FACTOR,\n    RIVAL_LAP_JITTER_S,\n    RIVAL_REACTIVE_GAP_S,\n    SALARY_WEEKLY_ENABLED,\n    SALARY_WEEKLY_FRACTION,\n    TICK_RATE_HZ,\n    TIRE_OVERHEAT_C,\n    WEATHER_RNG_OFFSET,\n)\nfrom game.effective_stats import compute_effective_stats\nfrom game.game_state import GameState\nfrom game.loader import (\n    apply_race_condition,\n    load_cars,\n    load_drivers,\n    load_events,\n    load_parts,\n    load_tracks,\n    resolve_race,\n    roll_race_condition,\n)\nfrom game.models import CarCondition, RaceSession, RaceTickResult, TelemetryHistory\nfrom game.opponents import build_opponent_grid, opponent_entry_labels, validate_event_entry\nfrom game.progression import TeamXpAward, normalize_event_progress, team_level_for_xp, team_xp_award, updated_event_progress\nfrom game.simulation import (\n    SimulationError,\n    _apply_lap_wear,\n    _find_garage_car,\n    _get,\n    _initial_state,\n    _prize_for_position,\n    _rank,\n    _segments_in_interval,\n    apply_post_race_wear,\n    lap_time_over_interval,\n)\nfrom game.telemetry import failure_chance, failure_dnf_chance, mistake_chance, record_telemetry, warning_messages\n\n\n@dataclass\nclass FinishEventResult:\n    prize_money: int\n    driver_progression_message: str\n    team_xp_award: TeamXpAward | None\n    team_xp_before: int\n    team_xp_after: int\n    event_progress_before: dict\n    event_progress_after: dict\n    player_position: int\n    player_is_dnf: bool\n    player_total_time_s: float | None\n    car_condition_before: CarCondition | None\n    car_condition_after: CarCondition | None\n\n    def __iter__(self):\n        yield self.prize_money\n        yield self.driver_progression_message\n\n\ndef ticks_per_lap_for(lap_time_s: float) -> int:\n    \"\"\"Sub-ticks for a lap whose real (canonical) time is ``lap_time_s``, tied to watched time.\n\n    watched = lap_time_s / PRESENTATION_SPEED_FACTOR; ticks = watched * TICK_RATE_HZ. This keeps\n    the per-update pause a constant 1/TICK_RATE_HZ (no dead air) while the total watched length\n    tracks the car's actual pace, and a true realtime race (factor 1.0) gets proportionally more\n    ticks. Safe because the sim is resolution-invariant: tick count does not move the result.\n    \"\"\"\n    watched_s = lap_time_s / PRESENTATION_SPEED_FACTOR\n    ticks = round(watched_s * TICK_RATE_HZ)\n    return max(MIN_TICKS_PER_LAP, min(MAX_TICKS_PER_LAP, ticks))\n\n\ndef enter_event(game_state: GameState, event_id: str, car_id: str, driver_id: str, seed: int = 1) -> RaceSession:\n    cars = {car.identity.id: deepcopy(car) for car in load_cars()}\n    drivers = {driver.id: driver for driver in load_drivers()}\n    events = {event.id: event for event in load_events()}\n    tracks = {track.id: track for track in load_tracks()}\n    parts = load_parts()\n    event = _get(events, event_id, \"event\")\n    _validate_team_level_entry(game_state, event)\n    track = _get(tracks, event.track_id, \"track\")\n    # Race-day forecast: rolled on an isolated stream (the main rng's draw sequence is\n    # untouched) and applied to this session's freshly loaded track copy.\n    weather = roll_race_condition(track, random.Random(seed + WEATHER_RNG_OFFSET))\n    apply_race_condition(track, weather)\n    garage_car = _find_garage_car(game_state, car_id)\n    if garage_car is None:\n        raise SimulationError(f\"Unknown garage car: {car_id}\")\n    if game_state.money < event.entry_fee:\n        raise SimulationError(f\"Insufficient funds for entry fee: {event.entry_fee}\")\n    validate_event_entry(garage_car, event, parts)\n    game_state.money -= event.entry_fee\n    cars[car_id] = deepcopy(garage_car)\n    player_driver = _get(drivers, driver_id, \"driver\")\n\n    states = [_initial_state(car_id, player_driver.id, \"YOU\", True)]\n    opponent_cars, opponent_drivers, opponent_entries = build_opponent_grid(\n        event, car_id, player_driver, cars, parts, track, seed\n    )\n    cars.update(opponent_cars)\n    drivers.update(opponent_drivers)\n    opponent_labels = opponent_entry_labels(opponent_entries, opponent_cars)\n    for label, (opponent_car_id, opponent_driver_id) in zip(opponent_labels, opponent_entries):\n        opponent_state = _initial_state(opponent_car_id, opponent_driver_id, label, False)\n        states.append(opponent_state)\n\n    race_format = resolve_race(event, track)\n    # Effective stats are invariant for the whole race, so compute them once per entry;\n    # every tick reads this cache instead of recomputing per car.\n    effective_stats = {\n        state.car_id: compute_effective_stats(cars[state.car_id], parts) for state in states\n    }\n    # Density follows the *player's* nominal lap pace, not the neutral track reference, so the\n    # watched length matches the \"your car vs this event\" estimate (a slow car genuinely takes\n    # longer to run). Deterministic (no wear, no variance) so it is stable across seeds.\n    nominal_lap_s = lap_time_over_interval(effective_stats[car_id], track, player_driver, start=0.0, length=1.0)\n    ticks_per_lap = ticks_per_lap_for(nominal_lap_s)\n    return RaceSession(\n        event_id=event.id,\n        track_id=track.id,\n        current_lap=0,\n        # Duration races have no fixed target; total_laps tracks the completed-lap count\n        # and grows as the race runs (see simulate_tick), so it starts at 0.\n        total_laps=race_format.laps or 0,\n        duration_s=race_format.duration_s,\n        cars=states,\n        player_car_id=car_id,\n        is_finished=False,\n        telemetry={state.label: TelemetryHistory() for state in states},\n        race_log=[(1, f\"Race runs {weather}.\")] if weather != \"dry\" else [],\n        random_seed=seed,\n        weather=weather,\n        car_roster=cars,\n        driver_roster=drivers,\n        track=track,\n        event=event,\n        parts=parts,\n        ticks_per_lap=ticks_per_lap,\n        current_sub_tick=0,\n        effective_stats=effective_stats,\n        player_car_condition_before=deepcopy(garage_car.condition),\n    )\n\n\ndef _validate_team_level_entry(game_state: GameState, event) -> None:\n    current_level = team_level_for_xp(game_state.team_xp)\n    if current_level < event.min_team_level:\n        raise SimulationError(\n            f\"{event.name} requires Team Lv {event.min_team_level}; \"\n            f\"current Team Lv {current_level} ({game_state.team_xp} XP).\"\n        )\n\n\ndef apply_player_command(session: RaceSession, command: str) -> RaceTickResult:\n    if command not in COMMAND_MODIFIERS:\n        raise SimulationError(f\"Unknown race command: {command}\")\n    player = _player_state(session)\n    player.pace_mode = command\n    return simulate_tick(session)\n\n\ndef simulate_tick(session: RaceSession) -> RaceTickResult:\n    if session.is_finished:\n        return RaceTickResult(\n            session=session, lap=session.current_lap,\n            standings=_active_standings(session), event_log=[], is_lap_end=False,\n        )\n    if session.track is None:\n        raise SimulationError(\"RaceSession is missing track data\")\n\n    lap_fraction = 1.0 / session.ticks_per_lap\n    is_lap_end = (session.current_sub_tick + 1) >= session.ticks_per_lap\n    # The whole field shares one track position each tick; the last tick of a lap\n    # runs to the line exactly so per-lap totals stay clean.\n    seg_start = session.current_sub_tick * lap_fraction\n    seg_length = (1.0 - seg_start) if is_lap_end else lap_fraction\n    overlaps = (\n        _segments_in_interval(session.track.segment_profiles, seg_start, seg_length)\n        if session.track.segment_profiles\n        else []\n    )\n    # Stride by more than any possible tick count so (lap, sub_tick) pairs never share\n    # a seed (a stride of 100 collided once ticks_per_lap exceeded it, e.g. realtime).\n    rng = random.Random(\n        session.random_seed + session.current_lap * (MAX_TICKS_PER_LAP + 1) + session.current_sub_tick\n    )\n    lap_log: list[str] = []\n    player_time = _player_state(session).total_time\n\n    # Process the field in running order so overtaking can compare each car against the\n    # one directly ahead on the road (already advanced this tick).\n    field_order = sorted(\n        (state for state in session.cars if not state.is_dnf),\n        key=lambda state: state.total_time,\n    )\n    road_ahead: list[tuple[float, object, object]] = []  # (pre-tick time, state, driver) of advanced cars\n    for state in field_order:\n        pre_tick_time = state.total_time\n        command = state.pace_mode if state.is_player else _ai_command(state, player_time)\n        driver = _get(session.driver_roster, state.driver_id, \"driver\")\n        effective = session.effective_stats.get(state.car_id)\n        if effective is None:  # sessions built without the cache (tests, old saves)\n            effective = compute_effective_stats(_get(session.car_roster, state.car_id, \"car\"), session.parts)\n        tick_time = lap_time_over_interval(\n            effective, session.track, driver, state, rng,\n            command=command,\n            start=seg_start, length=seg_length,\n        )\n        if not state.is_player:\n            # Jitter keeps the rival pack shuffling in close battles. Scaled by sqrt(slice) so the\n            # accumulated per-lap shuffle is the same at any tick count (resolution-invariant).\n            tick_time += rng.uniform(-RIVAL_LAP_JITTER_S, RIVAL_LAP_JITTER_S) * math.sqrt(seg_length)\n        extra_penalty = 0.0\n\n        # Mistakes and failures can strike on any tick, scaled to the slice of track\n        # covered, so a single-lap stage races the same as a multi-lap circuit.\n        if rng.random() < mistake_chance(state, driver, command) * seg_length:\n            penalty = MISTAKE_TIME_MEDIUM if rng.random() < 0.35 else MISTAKE_TIME_SMALL\n            extra_penalty += penalty\n            state.event_log.append(f\"{state.label} made a mistake and lost {penalty:.1f}s.\")\n            if penalty == MISTAKE_TIME_MEDIUM:\n                # A big moment dings the car; damage feeds failure risk and post-race wear.\n                state.condition_pct = max(0.0, state.condition_pct - CONDITION_HIT_MISTAKE)\n            if command == \"go_all_out\" and rng.random() < _dnf_chance(driver):\n                state.is_dnf = True\n                state.event_log.append(f\"{state.label} crashed out.\")\n        if not state.is_dnf and rng.random() < failure_chance(state, effective, driver, command) * seg_length:\n            if rng.random() < failure_dnf_chance(state):\n                # Terminal failure: an overheated engine makes a mechanical issue far\n                # more likely to end the race (see FAILURE_DNF_* in constants).\n                state.is_dnf = True\n                state.event_log.append(f\"{state.label} retired with a mechanical failure.\")\n            else:\n                state.event_log.append(f\"{state.label} suffered a mechanical issue.\")\n                extra_penalty += MISTAKE_TIME_SMALL\n                # Non-terminal issues still damage the car -- issues beget issues\n                # (condition_pct feeds failure_chance) and wear carries past the flag.\n                state.condition_pct = max(0.0, state.condition_pct - CONDITION_HIT_FAILURE)\n\n        if is_lap_end and command == \"pit\":\n            extra_penalty += session.track.pit_lane_loss_s\n            state.driver_energy = min(PERCENT_MAX, state.driver_energy + DRIVER_ENERGY_RECOVER_PIT)\n            state.driver_focus = min(PERCENT_MAX, state.driver_focus + DRIVER_FOCUS_RECOVER_PIT)\n            state.driver_stress = max(0.0, state.driver_stress - DRIVER_STRESS_RELIEF_PIT)\n            state.event_log.append(f\"{state.label} pitted (+{session.track.pit_lane_loss_s:.0f}s).\")\n\n        state.total_time += tick_time + extra_penalty\n        state.lap_elapsed += tick_time + extra_penalty\n\n        if road_ahead and not state.is_dnf:\n            _contest_overtakes(session.track, rng, state, driver, pre_tick_time, road_ahead, seg_length)\n\n        if command == \"pit\" and is_lap_end:\n            _apply_lap_wear(state, effective, session.track, \"pit\", driver_fitness=driver.fitness, seconds=tick_time)\n        elif overlaps:\n            # Apportion the tick's real seconds across the profiles it spans, so the\n            # time-based channels (engine heat, driver fatigue) accrue correctly.\n            for profile, overlap in overlaps:\n                slice_seconds = tick_time * (overlap / seg_length) if seg_length > 0 else tick_time\n                _apply_lap_wear(state, effective, session.track, command, fraction=overlap, profile=profile, driver_fitness=driver.fitness, seconds=slice_seconds)\n        else:\n            _apply_lap_wear(state, effective, session.track, command, fraction=seg_length, driver_fitness=driver.fitness, seconds=tick_time)\n\n        if is_lap_end and command == \"pit\":\n            # Pit is a one-shot: once the stop is done, resume normal running so the\n            # car doesn't keep diving into the pits every lap.\n            state.pace_mode = \"normal\"\n\n        if is_lap_end:\n            state.last_lap_time = state.lap_elapsed\n            state.lap_elapsed = 0.0\n            state.lap += 1\n            state.distance += session.track.length_km\n            state.event_log.extend(warning_messages(state))\n        if is_lap_end or state.is_dnf:\n            # Publish at lap end for running cars, and immediately on DNF -- a crashed\n            # car is skipped on every later tick, so this is its last chance to speak.\n            lap_log.extend(_unpublished_events(state))\n        if not state.is_dnf:\n            road_ahead.append((pre_tick_time, state, driver))\n\n    active = [state for state in session.cars if not state.is_dnf]\n    if active:\n        _rank(active)  # sorts and assigns positions/gaps in one pass\n    for state in active:\n        if is_lap_end:\n            record_telemetry(session.telemetry[state.label], state)\n\n    session.current_sub_tick = (session.current_sub_tick + 1) % session.ticks_per_lap\n    if is_lap_end:\n        session.current_lap += 1\n    if session.duration_s is not None:\n        # Duration race (Regime A lockstep): finish at a lap boundary once the leader passes\n        # the time cap. total_laps tracks the completed laps for display/result.\n        leader_time = min((state.total_time for state in active), default=0.0)\n        time_up = is_lap_end and session.current_lap >= 1 and leader_time >= session.duration_s\n        session.is_finished = time_up or len(active) <= 1\n        session.total_laps = session.current_lap\n    else:\n        session.is_finished = session.current_lap >= session.total_laps or len(active) <= 1\n\n    if is_lap_end and not lap_log:\n        lap_log.append(f\"Lap {session.current_lap} completed.\")\n    log_lap = session.current_lap if is_lap_end else session.current_lap + 1\n    session.race_log.extend((log_lap, msg) for msg in lap_log)\n    return RaceTickResult(\n        session=session, lap=session.current_lap,\n        standings=active, event_log=lap_log, is_lap_end=is_lap_end,\n    )\n\n\ndef finish_event(game_state: GameState, session: RaceSession) -> FinishEventResult:\n    player = _player_state(session)\n    if player.is_dnf or session.event is None or session.track is None:\n        prize_money = 0\n    else:\n        prize_money = _prize_for_position(session.event, player.position)\n    team_xp_before = game_state.team_xp\n    event_progress_before: dict = {}\n    event_progress_after: dict = {}\n    award: TeamXpAward | None = None\n    total_time_s = None if player.is_dnf else player.total_time\n    if session.event is not None:\n        event_progress_before = normalize_event_progress(game_state.event_progress.get(session.event.id))\n        award = team_xp_award(\n            session.event.car_class_limit,\n            session.event.event_kind,\n            position=player.position,\n            is_dnf=player.is_dnf,\n            event_progress_before=event_progress_before,\n        )\n        event_progress_after = updated_event_progress(\n            event_progress_before,\n            position=player.position,\n            is_dnf=player.is_dnf,\n            total_time_s=total_time_s,\n        )\n        game_state.team_xp += award.total_xp\n        game_state.event_progress[session.event.id] = event_progress_after\n    game_state.money += prize_money\n    game_state.week += 1\n    if SALARY_WEEKLY_ENABLED:\n        game_state.money -= sum(\n            round(driver.salary * SALARY_WEEKLY_FRACTION) for driver in game_state.hired_drivers\n        )\n    garage_car = _find_garage_car(game_state, player.car_id)\n    car_condition_after = None\n    if garage_car is not None and session.track is not None:\n        damage = PERCENT_MAX - player.condition_pct\n        apply_post_race_wear(garage_car, session.track.length_km * session.current_lap, damage)\n        car_condition_after = deepcopy(garage_car.condition)\n    progression_message = \"\"\n    if not player.is_dnf:\n        hired_driver = next((d for d in game_state.hired_drivers if d.id == player.driver_id), None)\n        if hired_driver is not None:\n            progression_message = _apply_driver_progression(hired_driver)\n    return FinishEventResult(\n        prize_money=prize_money,\n        driver_progression_message=progression_message,\n        team_xp_award=award,\n        team_xp_before=team_xp_before,\n        team_xp_after=game_state.team_xp,\n        event_progress_before=event_progress_before,\n        event_progress_after=event_progress_after,\n        player_position=player.position,\n        player_is_dnf=player.is_dnf,\n        player_total_time_s=total_time_s,\n        car_condition_before=deepcopy(session.player_car_condition_before),\n        car_condition_after=car_condition_after,\n    )\n\n\n_PROGRESSION_STATS = (\"pace\", \"consistency\", \"racecraft\", \"fitness\", \"mechanical_sympathy\", \"wet_skill\")\n\n\ndef _apply_driver_progression(driver) -> str:\n    xp_before = driver.experience\n    driver.experience += DRIVER_XP_PER_RACE\n    gains_before = xp_before // DRIVER_XP_PER_STAT_POINT\n    gains_after = driver.experience // DRIVER_XP_PER_STAT_POINT\n    messages = [f\"{driver.name} +{DRIVER_XP_PER_RACE} XP (total: {driver.experience})\"]\n    for _ in range(gains_after - gains_before):\n        eligible = [(getattr(driver, s), s) for s in _PROGRESSION_STATS if getattr(driver, s) < DRIVER_STAT_CAP]\n        if not eligible:\n            break\n        _, stat = min(eligible)\n        setattr(driver, stat, getattr(driver, stat) + 1)\n        messages.append(f\"{driver.name} +1 {stat.replace('_', ' ')} ({getattr(driver, stat)})\")\n    return \"  \".join(messages)\n\n\ndef _pass_chance(track, attacker, defender) -> float:\n    \"\"\"Per-LAP chance sustained pressure converts into a pass, before slice scaling.\n\n    Wide/easy tracks (low overtake_difficulty) let the quicker car through quickly;\n    narrow ones form trains. A racecraft edge (attacker vs defender) tilts the odds.\"\"\"\n    skill = 1.0 + (attacker.racecraft - defender.racecraft) * OVERTAKE_RACECRAFT_PER_POINT\n    return max(0.0, OVERTAKE_BASE_CHANCE_PER_LAP * (1.0 - track.overtake_difficulty) * skill)\n\n\ndef _complete_pass(attacker, defender) -> None:\n    \"\"\"A won contest reorders the road: the two cars exchange race clocks.\n\n    The exchange conserves the pair's combined time (a pass moves cars, it does not\n    mint or destroy lap time) and drops the defender into the attacker's old spot --\n    inside the new leader's dirty air, where it can fight back next tick.\"\"\"\n    delta = defender.total_time - attacker.total_time\n    attacker.total_time += delta\n    attacker.lap_elapsed += delta\n    defender.total_time -= delta\n    defender.lap_elapsed -= delta\n\n\ndef _contest_overtakes(track, rng, state, driver, pre_tick_time, road_ahead, seg_length: float) -> None:\n    \"\"\"The car behind cannot simply drive through the cars ahead.\n\n    ``road_ahead`` is the already-advanced field this tick as (pre-tick time, state,\n    driver) triples; ``pre_tick_time`` is the follower's own clock at tick start.\n    Walking up the road from the nearest car (largest time), every car this tick\n    would put the follower within the follow gap of (or past) must be dealt with: a\n    seeded roll against _pass_chance (scaled by the tick slice, so pass rates are\n    resolution-invariant) completes the pass -- a follower still nominally behind\n    exchanges clocks with the defender (_complete_pass), so the move always reorders\n    the road; a failed move holds the follower in dirty air just off the follow gap\n    (a breathing band of [gap, gap + OVERTAKE_GAP_JITTER_S], so trains flutter\n    instead of freezing at one number) and ends its progress. Two exemptions: a car\n    swept past with more margin than the\n    contest window (it pitted, crashed wide, or is crawling on fumes) is not really\n    defending, and a car that was NOT strictly ahead when the tick began (a standing\n    start or dead heat) holds no road to defend -- there the field spreads on pace\n    alone instead of freezing in processing order.\"\"\"\n    for ahead_pre, ahead_state, ahead_driver in sorted(\n        road_ahead, key=lambda entry: entry[1].total_time, reverse=True\n    ):\n        if ahead_pre >= pre_tick_time:\n            continue  # dead heat at tick start: no established position to defend\n        held = ahead_state.total_time + OVERTAKE_FOLLOW_GAP_S\n        margin = held - state.total_time\n        if margin <= 0.0:\n            break  # clear of the nearest car ahead, so clear of everyone beyond it\n        if margin > OVERTAKE_CONTEST_MAX_S:\n            continue  # swept past a crippled car: free, keep driving up the road\n        if rng.random() < _pass_chance(track, driver, ahead_driver) * seg_length:\n            if state.total_time > ahead_state.total_time:\n                _complete_pass(state, ahead_state)\n                state.event_log.append(f\"{state.label} passed {ahead_state.label}.\")\n            continue  # the move sticks; on to the next car up the road\n        # Breathing room: the hold is a band, not a rail. Positive-only, so the gap\n        # never dips below the follow gap (and never turns into a backdoor pass) --\n        # train gaps flutter in [gap, gap + jitter] instead of freezing at 0.400.\n        # Drawn BEFORE the stacking sweep so the sweep guards the final position.\n        held += rng.random() * OVERTAKE_GAP_JITTER_S\n        # Slot into the train: if the hold would land within the follow gap of another\n        # settled car -- on either side of it (a queue has formed) -- stack behind that\n        # car instead. One ascending sweep resolves the chain because the held time\n        # only ever moves backward.\n        for _settled_pre, settled_state, _settled_driver in sorted(\n            road_ahead, key=lambda entry: entry[1].total_time\n        ):\n            settled_time = settled_state.total_time\n            if settled_time - OVERTAKE_FOLLOW_GAP_S < held < settled_time + OVERTAKE_FOLLOW_GAP_S:\n                held = settled_time + OVERTAKE_FOLLOW_GAP_S\n        state.lap_elapsed += held - state.total_time\n        state.total_time = held\n        break\n\n\ndef _unpublished_events(state, limit: int = 3) -> list[str]:\n    \"\"\"Event-log entries not yet surfaced in the session race log (at most ``limit``,\n    keeping the newest). Advances the car's published watermark so nothing repeats.\"\"\"\n    new_events = state.event_log[state.event_log_published:]\n    state.event_log_published = len(state.event_log)\n    return new_events[-limit:]\n\n\ndef _ai_command(state, player_time: float) -> str:\n    \"\"\"Rule-based rival pit boss: survive first, then race.\n\n    Pit when tyres or fuel won't last, lift to the matching cooling command when a\n    temperature is past its overheat threshold, push when locked in a close battle,\n    otherwise hold pace. Mirrors the tools the player has, so long races no longer\n    systematically cook the AI.\"\"\"\n    if state.fuel_pct <= AI_PIT_FUEL_PCT or state.tire_pct <= AI_PIT_TIRE_PCT:\n        return \"pit\"\n    tires_hot = state.tire_temp >= TIRE_OVERHEAT_C\n    engine_hot = state.engine_temp >= ENGINE_OVERHEAT_C\n    if tires_hot and engine_hot:\n        return \"cool_down\"\n    if tires_hot:\n        return \"save_tyres\"\n    if engine_hot:\n        return \"save_fuel\"\n    if abs(state.total_time - player_time) <= RIVAL_REACTIVE_GAP_S:\n        return \"push\"\n    return AI_COMMAND\n\n\ndef _dnf_chance(driver) -> float:\n    \"\"\"Per-tick crash-out probability when going all out, eased by a composed driver.\n\n    Consistency and mechanical sympathy reduce it; the floor leaves go-all-out a real\n    gamble even for aces, and is the hook for future explicit driver skill levels.\n    \"\"\"\n    skill = (driver.consistency + driver.mechanical_sympathy) / 2\n    relief = max(DNF_DRIVER_RELIEF_FLOOR, 1.0 - skill * DNF_DRIVER_RELIEF)\n    return MISTAKE_DNF_PROB * relief\n\n\ndef _player_state(session: RaceSession):\n    return next(state for state in session.cars if state.is_player)\n\n\ndef _active_standings(session: RaceSession):\n    active = [state for state in session.cars if not state.is_dnf]\n    active.sort(key=lambda state: state.total_time)\n    return active\n", "game/reference_suite.py": "\"\"\"Intrinsic reference fixtures for runtime car-class derivation.\n\nA car's class is computed on the fly from its capability on a small, FIXED suite of\narchetype tracks -- a drag run (power), a slalom (technical), and a hybrid of the two --\nnever from a stored label or the loaded track catalog. This keeps class a property of the\ncar alone: a custom/creator car gets a real class with nothing to look up and nothing to\ngo stale (the same de-pin principle the orphan-stat references follow).\n\nThe fixtures' geometry (length, derived base lap time) is irrelevant here -- class reads\nthe capability *composite* (a base_lap_time-independent weighted sum of the car's effective\naxes for that archetype's tag mix), so the race-pace tuning (PERF_FRACTION etc.) does not\nmove the tiers.\n\"\"\"\nfrom __future__ import annotations\n\nfrom game.loader import track_from_dict\nfrom game.models import EffectiveCarStats, Track\n\n\ndef _fixture(fixture_id: str, tags: list[str]) -> Track:\n    n = len(tags)\n    segments = [\n        {\"name\": f\"s{i}\", \"length_pct\": 1.0 / n, \"tags\": [tag], \"surface\": \"tarmac\", \"condition\": \"dry\"}\n        for i, tag in enumerate(tags)\n    ]\n    return track_from_dict(\n        {\n            \"id\": fixture_id, \"name\": fixture_id, \"layout_type\": \"circuit\",\n            \"laps\": 1, \"length_km\": 3.0, \"pit_lane_loss_s\": 20.0,\n            \"overtake_difficulty\": 0.5, \"surface\": \"tarmac\", \"default_condition\": \"dry\",\n            \"weather_variability\": 0.0, \"elevation_change_m\": 10, \"segments\": segments,\n        }\n    )\n\n\n# Built once at import. Insertion order is stable, so shape reads are deterministic.\nREFERENCE_FIXTURES: dict[str, Track] = {\n    \"power\": _fixture(\"ref_drag\", [\"long_straight\", \"long_straight\"]),\n    \"technical\": _fixture(\"ref_slalom\", [\"tight_chicane\", \"technical_section\"]),\n    \"hybrid\": _fixture(\"ref_hybrid\", [\"long_straight\", \"technical_section\", \"slow_corner\"]),\n}\n\n\ndef archetype_capabilities(effective: EffectiveCarStats) -> dict[str, float]:\n    \"\"\"The car's capability composite on each archetype fixture (higher = more capable).\"\"\"\n    # Lazy import: simulation imports effective_stats, which imports this module lazily.\n    from game.simulation import _track_composite\n\n    return {name: _track_composite(effective, track) for name, track in REFERENCE_FIXTURES.items()}\n\n\ndef mean_capability(effective: EffectiveCarStats) -> float:\n    \"\"\"Mean capability across the suite -- the scalar a car's tier is bracketed from.\"\"\"\n    caps = archetype_capabilities(effective)\n    return sum(caps.values()) / len(caps)\n", "game/save_load.py": "from __future__ import annotations\n\nimport json\nfrom dataclasses import asdict\nfrom pathlib import Path\nfrom typing import Any\n\nfrom constants import SCHEMA_VERSION\nfrom game.game_state import GameState\nfrom game.loader import DataLoadError, car_from_dict, driver_from_dict\nfrom game.progression import normalize_event_progress\n\n\nclass SaveVersionError(ValueError):\n    \"\"\"Raised when a save file has an unsupported schema version.\"\"\"\n\n\ndef game_state_to_dict(game_state: GameState) -> dict[str, Any]:\n    return {\n        \"money\": game_state.money,\n        \"week\": game_state.week,\n        \"team_xp\": int(game_state.team_xp),\n        \"garage\": [asdict(car) for car in game_state.garage],\n        \"hired_drivers\": [asdict(driver) for driver in game_state.hired_drivers],\n        \"event_progress\": {\n            event_id: dict(progress)\n            for event_id, progress in game_state.event_progress.items()\n        },\n    }\n\n\ndef game_state_from_dict(data: dict[str, Any]) -> GameState:\n    return GameState(\n        money=data[\"money\"],\n        week=data[\"week\"],\n        team_xp=int(data.get(\"team_xp\", 0)),\n        garage=[car_from_dict(car_data) for car_data in data.get(\"garage\", [])],\n        hired_drivers=[driver_from_dict(driver_data) for driver_data in data.get(\"hired_drivers\", [])],\n        event_progress={\n            str(event_id): normalize_event_progress(progress)\n            for event_id, progress in data.get(\"event_progress\", {}).items()\n        },\n    )\n\n\ndef save_game(game_state: GameState, path: str | Path) -> None:\n    payload = {\n        \"schema_version\": SCHEMA_VERSION,\n        \"game_state\": game_state_to_dict(game_state),\n    }\n    target = Path(path)\n    target.parent.mkdir(parents=True, exist_ok=True)\n    with target.open(\"w\", encoding=\"utf-8\") as handle:\n        json.dump(payload, handle, indent=2)\n\n\ndef load_game(path: str | Path) -> GameState:\n    source = Path(path)\n    try:\n        with source.open(encoding=\"utf-8\") as handle:\n            payload = json.load(handle)\n    except json.JSONDecodeError as exc:\n        raise DataLoadError(f\"Malformed save JSON in {source}: {exc}\") from exc\n    except OSError as exc:\n        raise DataLoadError(f\"Could not read save {source}: {exc}\") from exc\n\n    version = payload.get(\"schema_version\")\n    if version != SCHEMA_VERSION:\n        raise SaveVersionError(f\"Unsupported save schema_version {version}; expected {SCHEMA_VERSION}\")\n    return game_state_from_dict(payload[\"game_state\"])\n", "game/simulation.py": "from __future__ import annotations\n\nimport math\nimport random\nfrom copy import deepcopy\nfrom typing import TypeVar\n\nfrom constants import (\n    AWD_LOWGRIP_BONUS,\n    COMMAND_MODIFIERS,\n    COMMAND_ENGINE_HEAT_INDEX,\n    COMMAND_FUEL_BURN_INDEX,\n    COMMAND_PACE_INDEX,\n    COMMAND_STRESS_INDEX,\n    COMMAND_TIRE_WEAR_INDEX,\n    ENGINE_COOLING_COMMANDS,\n    TYRE_COOLING_COMMANDS,\n    DRIVER_PACE_FRACTION,\n    DRIVER_ENERGY_DRAIN_PER_S,\n    DRIVER_ENERGY_LOW_PCT,\n    DRIVER_ENERGY_PACE_FRACTION,\n    DRIVER_FOCUS_DRAIN_PER_S,\n    DRIVER_STRESS_BUILD_PER_S,\n    FITNESS_DRAIN_PER_UNIT,\n    FITNESS_REF,\n    ENGINE_CRITICAL_C,\n    ENGINE_COOL_PER_S,\n    ENGINE_COOLING_BOOST,\n    ENGINE_HEAT_PER_S,\n    ENGINE_OVERHEAT_C,\n    ENGINE_TEMP_PENALTY_MAX,\n    FUEL_ECONOMY_FLOOR_L_PER_KM,\n    FUEL_EMPTY_PACE_FRACTION,\n    FUEL_L_PER_KM_UNIT,\n    FUEL_WEIGHT_PENALTY_PER_L,\n    INITIAL_ENGINE_TEMP_C,\n    INITIAL_TIRE_TEMP_C,\n    GRADIENT_PW_GAIN,\n    GRADIENT_PW_REF,\n    MILEAGE_KM_MULTIPLIER,\n    MIN_LAP_FRACTION,\n    PIT_ENGINE_COOL_C,\n    PIT_FUEL_RESTORE_PCT,\n    PIT_TIRE_RESTORE_PCT,\n    PIT_TIRE_TEMP_C,\n    PERCENT_MAX,\n    PERF_FRACTION,\n    RACE_DAMAGE_WEAR_FACTOR,\n    RANDOM_VARIANCE_SCALE,\n    REFERENCE_COMPOSITE,\n    SUBCONDITION_WEAR_FACTORS,\n    TIRE_CRITICAL_C,\n    TIRE_COOL_PER_S,\n    TIRE_COOLING_BOOST,\n    TIRE_HEAT_PER_KM,\n    TIRE_OPTIMAL_C,\n    TIRE_OVERHEAT_C,\n    TIRE_TEMP_PENALTY_MAX,\n    TYRE_WEAR_PCT_PER_KM,\n    TIRE_WEAR_PENALTY_MAX,\n    WEAR_PER_RACE_BASE,\n    WEAR_PER_RACE_MAX,\n    WEAR_PER_RACE_MIN,\n    WEAR_REFERENCE_RACE_KM,\n    WEATHER_RNG_OFFSET,\n)\nfrom game.effective_stats import compute_effective_stats\nfrom game.game_state import GameState\nfrom game.loader import (\n    apply_race_condition,\n    load_cars,\n    load_drivers,\n    load_events,\n    load_parts,\n    load_tracks,\n    resolve_race,\n    roll_race_condition,\n)\nfrom game.models import Car, Driver, EffectiveCarStats, Event, RaceCarState, RaceResult, SegmentProfile, Track\nfrom game.opponents import build_opponent_grid, opponent_entry_labels, validate_event_entry\nfrom game.progression import team_level_for_xp\n\nT = TypeVar(\"T\")\n\n\nclass SimulationError(ValueError):\n    \"\"\"Raised when a race cannot be simulated from the supplied state.\"\"\"\n\n\ndef calculate_lap_time(\n    effective: EffectiveCarStats,\n    track: Track,\n    driver: Driver | None = None,\n    state: RaceCarState | None = None,\n    rng: random.Random | None = None,\n    command: str = \"normal\",\n) -> float:\n    \"\"\"Time for one full lap. Segment-resolved when the track has segment_profiles.\"\"\"\n    return lap_time_over_interval(\n        effective, track, driver, state, rng, command,\n        start=0.0, length=1.0,\n    )\n\n\ndef _pace_multiplier(composite: float, pace_factor: float, driver_pace: float) -> float:\n    \"\"\"Proportional pace scalar on the geometry lap (base_lap_time).\n\n    1.0 for a design-midpoint car (composite == REFERENCE_COMPOSITE) at normal pace, so it laps\n    at exactly base_lap_time; a capability or driver-pace edge makes it a consistent *fraction*\n    faster on any track length (the honest model). Command pace_factor amplifies the capability\n    edge the same way the old absolute formula did (`composite * pace_factor`).\n    \"\"\"\n    return 1.0 - PERF_FRACTION * (composite * pace_factor - REFERENCE_COMPOSITE) - DRIVER_PACE_FRACTION * driver_pace\n\n\ndef lap_time_over_interval(\n    effective: EffectiveCarStats,\n    track: Track,\n    driver: Driver | None = None,\n    state: RaceCarState | None = None,\n    rng: random.Random | None = None,\n    command: str = \"normal\",\n    start: float = 0.0,\n    length: float = 1.0,\n) -> float:\n    \"\"\"Time to cover the position interval ``[start, start + length)`` of one lap.\n\n    When the track carries segment_profiles each overlapped segment contributes its\n    own local pace (tag mix + surface/condition); the length-weighted integral over a\n    whole lap reproduces the aggregate formula exactly on dry tarmac, so existing\n    balance is preserved while composition now shapes pace within the lap. Falls back\n    to the aggregate model for profile-less tracks.\n    \"\"\"\n    pace_factor = COMMAND_MODIFIERS[command][COMMAND_PACE_INDEX]\n    if track.segment_profiles:\n        core = 0.0\n        for profile, overlap in _segments_in_interval(track.segment_profiles, start, length):\n            composite = _segment_composite(effective, profile)\n            driver_pace = _blended_pace(driver, profile.wet_weight)\n            core += track.base_lap_time * _pace_multiplier(composite, pace_factor, driver_pace) * overlap\n    else:\n        composite = _track_composite(effective, track)\n        driver_pace = driver.pace if driver is not None else 0.0\n        core = track.base_lap_time * _pace_multiplier(composite, pace_factor, driver_pace) * length\n\n    # The climb adjustment (power-to-weight driven) is applied before re-flooring, and scales\n    # with the interval length so the segment-resolved and aggregate paths agree.\n    core += _climb_adjustment(track, effective) * length\n    core = max(core, track.base_lap_time * length * MIN_LAP_FRACTION)\n    # State penalty is a deterministic drag -> scales linearly with the slice. Driver variance is\n    # additive noise -> scales with sqrt(slice) so the per-lap spread is identical whether a lap is\n    # one tick or a thousand (resolution-invariant; at length=1 this is the instant-sim draw).\n    return core + _state_penalty(state, effective, track.base_lap_time) * length + _lap_variance(driver, rng) * math.sqrt(length)\n\n\ndef _climb_adjustment(track: Track, effective: EffectiveCarStats) -> float:\n    \"\"\"Seconds a full lap gains/loses on a net climb, driven by the car's real power-to-weight.\n\n    Monotonic in the car's own hp/kg, anchored to real paved Pikes Peak stock times (see\n    constants): below GRADIENT_PW_REF the climb adds time, above it a strong car claws time\n    back. 0 for loop layouts (climb_gradient_pct == 0). Nothing references other cars.\"\"\"\n    if track.climb_gradient_pct <= 0.0:\n        return 0.0\n    pw = max(effective.power_to_weight, 1e-3)\n    return GRADIENT_PW_GAIN * math.log(GRADIENT_PW_REF / pw) * track.climb_gradient_pct * track.length_km\n\n\ndef _segments_in_interval(\n    profiles: list[SegmentProfile], start: float, length: float\n) -> list[tuple[SegmentProfile, float]]:\n    end = start + length\n    overlaps: list[tuple[SegmentProfile, float]] = []\n    for profile in profiles:\n        overlap = min(profile.end_pct, end) - max(profile.start_pct, start)\n        if overlap > 1e-12:\n            overlaps.append((profile, overlap))\n    return overlaps\n\n\ndef _segment_composite(effective: EffectiveCarStats, profile: SegmentProfile) -> float:\n    weights = profile.weights\n    grip = effective.grip * (1.0 - profile.wet_weight) + effective.wet_grip * profile.wet_weight\n    if effective.drivetrain == \"AWD\":\n        # AWD claws back traction where grip is scarce; zero on dry tarmac (grip_mult == 1),\n        # so the dry-tarmac segment/aggregate equivalence is preserved.\n        grip *= 1.0 + AWD_LOWGRIP_BONUS * (1.0 - profile.grip_mult)\n    composite = (\n        effective.acceleration * weights[\"acceleration\"]\n        + effective.power * weights[\"power\"]\n        + effective.top_speed * weights[\"top_speed\"]\n        + grip * weights[\"grip\"]\n        + effective.braking * weights[\"braking\"]\n        + effective.handling * weights[\"handling\"]\n        + effective.aero_grip * weights[\"aero\"]\n    )\n    return composite * profile.grip_mult\n\n\ndef _blended_pace(driver: Driver | None, wet_weight: float) -> float:\n    if driver is None:\n        return 0.0\n    return driver.pace * (1.0 - wet_weight) + driver.wet_skill * wet_weight\n\n\ndef _state_penalty(state: RaceCarState | None, effective: EffectiveCarStats, base_lap_time: float) -> float:\n    if state is None:\n        return 0.0\n    penalty = (PERCENT_MAX - state.tire_pct) / PERCENT_MAX * TIRE_WEAR_PENALTY_MAX\n    # Fuel load: a full tank is the reference; every litre burned lightens the car and\n    # buys pace, so brimming at a stop costs lap time until it burns off.\n    burned_l = (PERCENT_MAX - state.fuel_pct) / PERCENT_MAX * effective.fuel_capacity_l\n    penalty -= burned_l * FUEL_WEIGHT_PENALTY_PER_L\n    if state.tire_temp > TIRE_OVERHEAT_C:\n        penalty += _range_penalty(state.tire_temp, TIRE_OVERHEAT_C, TIRE_CRITICAL_C, TIRE_TEMP_PENALTY_MAX)\n    if state.engine_temp > ENGINE_OVERHEAT_C:\n        penalty += _range_penalty(state.engine_temp, ENGINE_OVERHEAT_C, ENGINE_CRITICAL_C, ENGINE_TEMP_PENALTY_MAX)\n    if state.fuel_pct <= 0.0:\n        # Dry tank: the car limps on fumes. Proportional to the lap so it is equally\n        # devastating on any track length, but the car can still crawl to the pits.\n        penalty += base_lap_time * FUEL_EMPTY_PACE_FRACTION\n    if state.driver_energy < DRIVER_ENERGY_LOW_PCT:\n        # An exhausted driver leaks pace, ramping to the full fraction at zero energy.\n        deficit = 1.0 - state.driver_energy / DRIVER_ENERGY_LOW_PCT\n        penalty += base_lap_time * DRIVER_ENERGY_PACE_FRACTION * deficit\n    return penalty\n\n\ndef _lap_variance(driver: Driver | None, rng: random.Random | None) -> float:\n    if rng is None:\n        return 0.0\n    consistency = driver.consistency if driver is not None else PERCENT_MAX / 2\n    variance = RANDOM_VARIANCE_SCALE * (1 - consistency / PERCENT_MAX)\n    return rng.uniform(-variance, variance)\n\n\ndef simulate_race(game_state: GameState, event_id: str, car_id: str, driver_id: str, seed: int = 1) -> RaceResult:\n    rng = random.Random(seed)\n    parts = load_parts()\n    cars = {car.identity.id: car for car in load_cars()}\n    drivers = {driver.id: driver for driver in load_drivers()}\n    events = {event.id: event for event in load_events()}\n    tracks = {track.id: track for track in load_tracks()}\n\n    event = _get(events, event_id, \"event\")\n    current_team_level = team_level_for_xp(game_state.team_xp)\n    if current_team_level < event.min_team_level:\n        raise SimulationError(\n            f\"{event.name} requires Team Lv {event.min_team_level}; \"\n            f\"current Team Lv {current_team_level} ({game_state.team_xp} XP).\"\n        )\n    track = _get(tracks, event.track_id, \"track\")\n    # Race-day forecast: rolled on an isolated stream (the main rng's draw sequence is\n    # untouched) and applied to this freshly loaded track copy.\n    weather = roll_race_condition(track, random.Random(seed + WEATHER_RNG_OFFSET))\n    apply_race_condition(track, weather)\n    player_car = _find_garage_car(game_state, car_id) or deepcopy(_get(cars, car_id, \"car\"))\n    player_driver = _get(drivers, driver_id, \"driver\")\n    validate_event_entry(player_car, event, parts)\n    # Same economics as the live engine (enter_event), minus the funds gate -- this is\n    # the batch summary, used by tools on throwaway states.\n    game_state.money -= event.entry_fee\n    cars[player_car.identity.id] = deepcopy(player_car)\n\n    race_cars = [_initial_state(player_car.identity.id, player_driver.id, \"YOU\", True)]\n    opponent_cars, opponent_drivers, opponent_entries = build_opponent_grid(\n        event, player_car.identity.id, player_driver, cars, parts, track, seed\n    )\n    cars.update(opponent_cars)\n    drivers.update(opponent_drivers)\n    opponent_labels = opponent_entry_labels(opponent_entries, opponent_cars)\n    for label, (opponent_car_id, opponent_driver_id) in zip(opponent_labels, opponent_entries):\n        opponent_state = _initial_state(opponent_car_id, opponent_driver_id, label, False)\n        race_cars.append(opponent_state)\n\n    race_format = resolve_race(event, track)\n\n    lap_times: dict[str, list[float]] = {state.label: [] for state in race_cars}\n    race_log: list[str] = []\n    if weather != \"dry\":\n        race_log.append(f\"Race runs {weather}.\")\n    # Lockstep loop shared by lap and duration races: every car runs the same whole laps, so\n    # a duration race (Regime A) ends on a clean lap boundary once the leader passes the cap.\n    completed_laps = 0\n    # Effective stats are invariant for the whole race (condition and tune don't change\n    # mid-race), so compute them once per entry instead of once per lap per car.\n    effective_by_car = {\n        state.car_id: compute_effective_stats(player_car if state.is_player else cars[state.car_id], parts)\n        for state in race_cars\n    }\n    while not _race_finished(race_cars, race_format, completed_laps):\n        for state in race_cars:\n            driver = player_driver if state.is_player else drivers[state.driver_id]\n            effective = effective_by_car[state.car_id]\n            lap_time = calculate_lap_time(effective, track, driver, state, rng)\n            state.last_lap_time = lap_time\n            state.total_time += lap_time\n            state.lap += 1\n            state.distance += track.length_km\n            _apply_lap_wear(state, effective, track, driver_fitness=driver.fitness, seconds=lap_time)\n            lap_times[state.label].append(lap_time)\n\n        _rank(race_cars)\n        race_log.append(f\"Lap {race_cars[0].lap}: leader {race_cars[0].label}\")\n        completed_laps += 1\n\n    _rank(race_cars)\n    total_laps = completed_laps\n    player_state = next(state for state in race_cars if state.is_player)\n    prize_money = _prize_for_position(event, player_state.position)\n    game_state.money += prize_money\n    game_state.week += 1\n    garage_car = _find_garage_car(game_state, car_id)\n    if garage_car is not None:\n        damage = PERCENT_MAX - player_state.condition_pct\n        apply_post_race_wear(garage_car, track.length_km * total_laps, damage)\n\n    return RaceResult(\n        event_id=event.id,\n        track_id=track.id,\n        total_laps=total_laps,\n        standings=race_cars,\n        player_position=player_state.position,\n        prize_money=prize_money,\n        lap_times=lap_times,\n        race_log=race_log,\n    )\n\n\ndef _track_composite(effective: EffectiveCarStats, track: Track) -> float:\n    return (\n        effective.acceleration * track.acceleration_weight\n        + effective.power * track.power_weight\n        + effective.top_speed * track.top_speed_weight\n        + effective.grip * track.grip_weight\n        + effective.braking * track.braking_weight\n        + effective.handling * track.handling_weight\n        + effective.aero_grip * track.aero_weight\n    )\n\n\ndef _range_penalty(value: float, start: float, end: float, maximum: float) -> float:\n    if end <= start:\n        return maximum\n    return max(0.0, min(1.0, (value - start) / (end - start))) * maximum\n\n\ndef _fitness_drain_factor(driver_fitness: float) -> float:\n    \"\"\"A fitter driver loses energy and focus more slowly (1.0 at the reference fitness).\"\"\"\n    return max(0.5, 1.0 - (driver_fitness - FITNESS_REF) * FITNESS_DRAIN_PER_UNIT)\n\n\ndef _apply_lap_wear(\n    state: RaceCarState,\n    effective: EffectiveCarStats,\n    track: Track,\n    command: str = \"normal\",\n    fraction: float = 1.0,\n    profile: SegmentProfile | None = None,\n    driver_fitness: float = FITNESS_REF,\n    seconds: float | None = None,\n) -> None:\n    \"\"\"Evolve tyre/fuel/engine/driver state for a slice of running, in physical units.\n\n    Distance covered is ``track.length_km * fraction``; tyres lose a distance-based\n    share of life and fuel burns litres against the tank, so a stint and a tank are\n    real kilometres regardless of lap length. Engine heat and driver fatigue accrue over\n    ``seconds`` of running (the slice's real time -- callers pass the tick/lap time; it\n    falls back to ``base_lap_time * fraction``), which is what they physically track and\n    what makes them duration-ready. ``profile`` supplies a segment's local (surface/\n    condition adjusted) tag multipliers; those still integrate to the aggregate over a\n    full lap, so segment ticks and a whole-lap call wear the car by the same total.\n    \"\"\"\n    modifiers = COMMAND_MODIFIERS[command]\n    if command == \"pit\" and fraction >= 1.0:\n        state.tire_pct = PIT_TIRE_RESTORE_PCT\n        state.tire_temp = PIT_TIRE_TEMP_C\n        state.fuel_pct = PIT_FUEL_RESTORE_PCT\n        state.engine_temp = max(INITIAL_ENGINE_TEMP_C, state.engine_temp - PIT_ENGINE_COOL_C)\n        return\n    if seconds is None:\n        seconds = track.base_lap_time * fraction\n    distance_km = track.length_km * fraction\n    tire_wear_rate = profile.tire_wear_rate if profile is not None else track.tire_wear_rate\n    fuel_burn_rate = profile.fuel_burn_rate if profile is not None else track.fuel_burn_rate\n    engine_heat_rate = profile.engine_heat_rate if profile is not None else track.engine_heat_rate\n\n    # Tyres: % of a distance-based life. effective.tire_wear_rate is the car's wear\n    # susceptibility (compound/resistance/width); the track tag rate adds the local\n    # surface/condition load. Heat builds with work (distance) and fights an always-on\n    # passive airflow cooling (time) -- a heat *balance*: gentle running drifts back\n    # toward the operating floor, attacking out-heats the airflow. The cooling commands\n    # multiply the passive rate. Cooling never pulls a tyre below its operating floor.\n    wear_pct = TYRE_WEAR_PCT_PER_KM * effective.tire_wear_rate * tire_wear_rate * distance_km * modifiers[COMMAND_TIRE_WEAR_INDEX]\n    state.tire_pct = max(0.0, state.tire_pct - wear_pct)\n    heat_gain = TIRE_HEAT_PER_KM * effective.tire_heat_rate * tire_wear_rate * distance_km * modifiers[COMMAND_TIRE_WEAR_INDEX]\n    tire_cooling = TIRE_COOL_PER_S * seconds\n    if command in TYRE_COOLING_COMMANDS:\n        tire_cooling *= TIRE_COOLING_BOOST\n    tire_floor = min(state.tire_temp, TIRE_OPTIMAL_C)\n    state.tire_temp = max(tire_floor, state.tire_temp + heat_gain - tire_cooling)\n\n    # Fuel: litres over distance, drawn against the tank -> % of capacity. Economy is affine\n    # in the car's burn rate (floor + rate x unit) so the catalog stays in a realistic band;\n    # the track tag rate and pace command scale the whole economy (see constants).\n    economy_l_per_km = FUEL_ECONOMY_FLOOR_L_PER_KM + effective.fuel_burn_rate * FUEL_L_PER_KM_UNIT\n    litres = economy_l_per_km * fuel_burn_rate * distance_km * modifiers[COMMAND_FUEL_BURN_INDEX]\n    state.fuel_pct = max(0.0, state.fuel_pct - litres / max(effective.fuel_capacity_l, 1.0) * PERCENT_MAX)\n\n    # Engine heat: per second of running at load, against the same always-on passive\n    # cooling balance (radiator airflow); the floor is normal operating temperature.\n    engine_gain = ENGINE_HEAT_PER_S * seconds * engine_heat_rate * effective.engine_heat_rate / PERCENT_MAX * modifiers[COMMAND_ENGINE_HEAT_INDEX]\n    engine_cooling = ENGINE_COOL_PER_S * seconds\n    if command in ENGINE_COOLING_COMMANDS:\n        engine_cooling *= ENGINE_COOLING_BOOST\n    engine_floor = min(state.engine_temp, INITIAL_ENGINE_TEMP_C)\n    state.engine_temp = max(engine_floor, state.engine_temp + engine_gain - engine_cooling)\n\n    # Driver: fatigue is a function of time on track.\n    fitness_drain = _fitness_drain_factor(driver_fitness)\n    state.driver_energy = max(0.0, state.driver_energy - DRIVER_ENERGY_DRAIN_PER_S * seconds * modifiers[COMMAND_TIRE_WEAR_INDEX] * fitness_drain)\n    state.driver_focus = max(0.0, state.driver_focus - DRIVER_FOCUS_DRAIN_PER_S * seconds * modifiers[COMMAND_TIRE_WEAR_INDEX] * fitness_drain)\n    state.driver_stress = min(PERCENT_MAX, state.driver_stress + DRIVER_STRESS_BUILD_PER_S * seconds * modifiers[COMMAND_STRESS_INDEX])\n\n\ndef _initial_state(car_id: str, driver_id: str, label: str, is_player: bool) -> RaceCarState:\n    return RaceCarState(\n        car_id=car_id,\n        driver_id=driver_id,\n        label=label,\n        is_player=is_player,\n        position=1,\n        lap=0,\n        distance=0.0,\n        gap_to_leader=0.0,\n        tire_pct=PERCENT_MAX,\n        tire_temp=INITIAL_TIRE_TEMP_C,\n        fuel_pct=PERCENT_MAX,\n        condition_pct=PERCENT_MAX,\n        engine_temp=INITIAL_ENGINE_TEMP_C,\n        driver_energy=PERCENT_MAX,\n        driver_focus=PERCENT_MAX,\n        driver_stress=0.0,\n        pace_mode=\"normal\",\n        last_lap_time=None,\n        total_time=0.0,\n        event_log=[],\n    )\n\n\ndef _race_finished(states: list[RaceCarState], race_format: \"RaceFormat\", completed_laps: int) -> bool:\n    \"\"\"Lockstep stop condition shared by the batch and interactive loops.\n\n    Lap/distance races stop at the fixed lap target. A duration race (Regime A) runs whole\n    laps until the leader's elapsed time crosses the cap, then finishes that lead lap -- the\n    field is synchronized, so everyone completes the same number of laps. At least one lap\n    always runs, even if the cap is shorter than a single lap.\n    \"\"\"\n    if race_format.laps is not None:\n        return completed_laps >= race_format.laps\n    leader_time = min((state.total_time for state in states), default=0.0)\n    return completed_laps >= 1 and leader_time
