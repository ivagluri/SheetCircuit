>= (race_format.duration_s or 0.0)\n\n\ndef _rank(states: list[RaceCarState]) -> None:\n    # Rank by laps completed first, then elapsed time. In a fixed-lap race the field runs\n    # in lockstep so the lap key is always equal and this is a pure time sort; the key is\n    # here so duration/enduro races (cars finishing different lap counts) rank correctly\n    # once that mode is wired in. Gap stays a simple time delta while laps are uniform.\n    states.sort(key=lambda state: (-state.lap, state.total_time))\n    leader_time = states[0].total_time\n    for index, state in enumerate(states, start=1):\n        state.position = index\n        state.gap_to_leader = state.total_time - leader_time\n\n\ndef _prize_for_position(event: Event, position: int) -> int:\n    index = position - 1\n    if index >= len(event.prize_money):\n        return 0\n    return event.prize_money[index]\n\n\ndef apply_post_race_wear(garage_car: Car, race_km: float, damage_pct: float = 0.0) -> float:\n    \"\"\"Wear a garage car after a race, in proportion to the real distance raced.\n\n    Overall wear is distance-scaled (clamped), plus a share of any damage the car took\n    mid-race (``damage_pct`` = points of RaceCarState.condition_pct lost). Sub-systems\n    wear alongside at their own rates, so upkeep is per-system; mileage accrues with the\n    same distance. Returns the overall wear applied.\"\"\"\n    wear = WEAR_PER_RACE_BASE * race_km / WEAR_REFERENCE_RACE_KM\n    wear = min(WEAR_PER_RACE_MAX, max(WEAR_PER_RACE_MIN, wear))\n    wear += damage_pct * RACE_DAMAGE_WEAR_FACTOR\n    condition = garage_car.condition\n    condition.overall_condition = max(0.0, condition.overall_condition - wear)\n    for field_name, factor in SUBCONDITION_WEAR_FACTORS.items():\n        setattr(condition, field_name, max(0.0, getattr(condition, field_name) - wear * factor))\n    condition.mileage += round(race_km * MILEAGE_KM_MULTIPLIER)\n    return wear\n\n\ndef _find_garage_car(game_state: GameState, car_id: str) -> Car | None:\n    return next((car for car in game_state.garage if car.identity.id == car_id), None)\n\n\ndef _get(items: dict[str, T], item_id: str, label: str) -> T:\n    try:\n        return items[item_id]\n    except KeyError as exc:\n        raise SimulationError(f\"Unknown {label}: {item_id}\") from exc\n", "game/sorting.py": "from __future__ import annotations\n\nfrom dataclasses import dataclass\nfrom typing import Any, Callable, Iterable, TypeVar\n\nfrom constants import CLASS_THRESHOLDS\nfrom game.effective_stats import class_rating, derived_class, performance_type\nfrom game.models import Car, Driver, Event\n\nT = TypeVar(\"T\")\n\nCLASS_ORDER = {class_name: index for index, class_name in enumerate(CLASS_THRESHOLDS)}\n\n\n@dataclass(frozen=True)\nclass SortOption:\n    key: str\n    label: str\n    getter: Callable[[Any], Any]\n    default_descending: bool = False\n    aliases: tuple[str, ...] = ()\n\n\n@dataclass(frozen=True)\nclass SortSpec:\n    key: str\n    descending: bool\n\n\ndef sort_items(screen: str, items: Iterable[T], spec: SortSpec | None) -> list[T]:\n    rows = list(items)\n    if spec is None:\n        return rows\n    option = _option_for(screen, spec.key)\n    return sorted(\n        rows,\n        key=lambda item: (_normalized_sort_value(option.getter(item)), _identity_tiebreaker(item)),\n        reverse=spec.descending,\n    )\n\n\ndef parse_sort_spec(screen: str, field: str, direction: str | None = None) -> SortSpec:\n    normalized_field = field.strip().lower()\n    descending_override = None\n    if normalized_field.startswith(\"-\"):\n        normalized_field = normalized_field[1:]\n        descending_override = True\n    elif normalized_field.startswith(\"+\"):\n        normalized_field = normalized_field[1:]\n        descending_override = False\n\n    option = _option_for(screen, normalized_field)\n    descending = option.default_descending if descending_override is None else descending_override\n    if direction is not None:\n        normalized_direction = direction.strip().lower()\n        if normalized_direction in {\"asc\", \"ascending\", \"up\", \"low\", \"lowest\", \"cheap\", \"cheapest\"}:\n            descending = False\n        elif normalized_direction in {\"desc\", \"descending\", \"down\", \"high\", \"highest\", \"expensive\"}:\n            descending = True\n        else:\n            raise ValueError(f\"Unknown sort direction: {direction}\")\n    return SortSpec(option.key, descending)\n\n\ndef sort_label(screen: str, spec: SortSpec | None) -> str:\n    if spec is None:\n        return \"Default\"\n    option = _option_for(screen, spec.key)\n    arrow = \"desc\" if spec.descending else \"asc\"\n    return f\"{option.label} {arrow}\"\n\n\ndef sort_fields(screen: str) -> list[str]:\n    return [option.key for option in _options_for(screen)]\n\n\ndef is_sortable_screen(screen: str) -> bool:\n    return screen in _SORT_OPTIONS\n\n\ndef _option_for(screen: str, field: str) -> SortOption:\n    normalized_screen = screen.strip().lower()\n    normalized_field = field.strip().lower()\n    for option in _options_for(normalized_screen):\n        names = {option.key, *option.aliases}\n        if normalized_field in names:\n            return option\n    valid = \", \".join(sort_fields(normalized_screen))\n    raise ValueError(f\"Cannot sort {screen} by {field!r}. Try: {valid}\")\n\n\ndef _options_for(screen: str) -> list[SortOption]:\n    normalized_screen = screen.strip().lower()\n    if normalized_screen not in _SORT_OPTIONS:\n        raise ValueError(f\"Screen does not support sorting: {screen}\")\n    return _SORT_OPTIONS[normalized_screen]\n\n\ndef _normalized_sort_value(value: Any) -> Any:\n    if isinstance(value, str):\n        return value.casefold()\n    return value\n\n\ndef _identity_tiebreaker(item: Any) -> str:\n    if isinstance(item, Car):\n        return item.identity.id\n    if isinstance(item, Driver):\n        return item.id\n    if isinstance(item, Event):\n        return item.id\n    return repr(item)\n\n\ndef _class_rank(class_name: str) -> int:\n    return CLASS_ORDER.get(class_name, -1)\n\n\n_CAR_SORT_OPTIONS = [\n    SortOption(\"name\", \"Name\", lambda car: car.identity.name, aliases=(\"car\",)),\n    SortOption(\"class\", \"Class\", lambda car: _class_rank(derived_class(car)), True, (\"tier\",)),\n    SortOption(\"pr\", \"PR\", class_rating, True, (\"rating\", \"score\")),\n    SortOption(\"type\", \"Type\", performance_type, aliases=(\"role\", \"archetype\")),\n    SortOption(\"hp\", \"HP\", lambda car: car.powertrain.power_hp, True, (\"power\", \"horsepower\")),\n    SortOption(\"torque\", \"Torque\", lambda car: car.powertrain.torque_nm, True, (\"nm\",)),\n    SortOption(\"price\", \"Price\", lambda car: car.value, aliases=(\"value\", \"cost\")),\n    SortOption(\"condition\", \"Condition\", lambda car: car.condition.overall_condition, True, (\"cond\", \"health\")),\n    SortOption(\"weight\", \"Weight\", lambda car: car.chassis.weight_kg, aliases=(\"mass\",)),\n    SortOption(\"mileage\", \"Mileage\", lambda car: car.condition.mileage, aliases=(\"km\", \"odo\", \"odometer\")),\n    SortOption(\"year\", \"Year\", lambda car: car.identity.year, True),\n]\n\n_DRIVER_SORT_OPTIONS = [\n    SortOption(\"name\", \"Name\", lambda driver: driver.name),\n    SortOption(\"pace\", \"Pace\", lambda driver: driver.pace, True),\n    SortOption(\"consistency\", \"Consistency\", lambda driver: driver.consistency, True, (\"cons\",)),\n    SortOption(\"racecraft\", \"Racecraft\", lambda driver: driver.racecraft, True, (\"craft\",)),\n    SortOption(\"feedback\", \"Feedback\", lambda driver: driver.feedback, True),\n    SortOption(\"fitness\", \"Fitness\", lambda driver: driver.fitness, True),\n    SortOption(\"aggression\", \"Aggression\", lambda driver: driver.aggression, True),\n    SortOption(\n        \"sympathy\",\n        \"Mechanical Sympathy\",\n        lambda driver: driver.mechanical_sympathy,\n        True,\n        (\"mechanical\", \"mechanical_sympathy\", \"mech\"),\n    ),\n    SortOption(\"wet\", \"Wet Skill\", lambda driver: driver.wet_skill, True, (\"wet_skill\",)),\n    SortOption(\"salary\", \"Salary\", lambda driver: driver.salary, aliases=(\"cost\", \"pay\")),\n    SortOption(\"experience\", \"Experience\", lambda driver: driver.experience, True, (\"xp\",)),\n]\n\n_EVENT_SORT_OPTIONS = [\n    SortOption(\"name\", \"Name\", lambda event: event.name),\n    SortOption(\"class\", \"Class\", lambda event: _class_rank(event.car_class_limit), True, (\"tier\", \"limit\")),\n    SortOption(\"fee\", \"Entry Fee\", lambda event: event.entry_fee, aliases=(\"entry\", \"price\", \"cost\")),\n    SortOption(\"prize\", \"Top Prize\", lambda event: event.prize_money[0] if event.prize_money else 0, True),\n    SortOption(\"opponents\", \"Opponents\", lambda event: event.opponent_count, True, (\"opp\",)),\n]\n\n_SORT_OPTIONS = {\n    \"garage\": _CAR_SORT_OPTIONS,\n    \"market\": _CAR_SORT_OPTIONS,\n    \"drivers\": _DRIVER_SORT_OPTIONS,\n    \"events\": _EVENT_SORT_OPTIONS,\n}\n", "game/telemetry.py": "from __future__ import annotations\n\nfrom constants import (\n    BASE_FAILURE_RATE,\n    BASE_MISTAKE_RATE,\n    COMMAND_MISTAKE_INDEX,\n    COMMAND_MODIFIERS,\n    ENGINE_CRITICAL_C,\n    ENGINE_OVERHEAT_C,\n    FAILURE_CONDITION_SCALE,\n    FAILURE_DNF_PROB,\n    FAILURE_DNF_TEMP_PROB,\n    FAILURE_ENGINE_TEMP_SCALE,\n    FAILURE_RELIABILITY_SCALE,\n    FAILURE_SYMPATHY_SCALE,\n    HIGH_FEEDBACK_THRESHOLD,\n    LOW_FEEDBACK_THRESHOLD,\n    MISTAKE_AGGRESSION_SCALE,\n    MISTAKE_CONSISTENCY_SCALE,\n    MISTAKE_FATIGUE_SCALE,\n    MISTAKE_FOCUS_SCALE,\n    MISTAKE_STRESS_SCALE,\n    MISTAKE_TIRE_TEMP_SCALE,\n    MISTAKE_TIRE_WEAR_SCALE,\n    PERCENT_LOW_FUEL_WARNING,\n    PERCENT_MAX,\n    PERCENT_WORN_TIRE_WARNING,\n    TIRE_CRITICAL_C,\n    TIRE_OVERHEAT_C,\n)\nfrom game.models import Driver, EffectiveCarStats, RaceCarState, TelemetryHistory\n\n\ndef record_telemetry(history: TelemetryHistory, state: RaceCarState) -> None:\n    history.lap_times.append(state.last_lap_time or 0.0)\n    history.positions.append(state.position)\n    history.engine_temps.append(state.engine_temp)\n    history.fuel_pct.append(state.fuel_pct)\n    history.tire_wear.append(state.tire_pct)\n    history.tire_temps.append(state.tire_temp)\n    history.driver_energy.append(state.driver_energy)\n    history.driver_focus.append(state.driver_focus)\n    history.driver_stress.append(state.driver_stress)\n\n\ndef warning_messages(state: RaceCarState) -> list[str]:\n    messages: list[str] = []\n    if state.tire_temp >= TIRE_OVERHEAT_C:\n        messages.append(\"Tire temperature warning.\")\n    if state.tire_pct <= PERCENT_WORN_TIRE_WARNING:\n        messages.append(\"Tires are badly worn.\")\n    if state.fuel_pct <= PERCENT_LOW_FUEL_WARNING:\n        messages.append(\"Fuel is below 20%.\")\n    if state.engine_temp >= ENGINE_OVERHEAT_C:\n        messages.append(\"Engine temperature warning.\")\n    return messages\n\n\ndef mistake_chance(state: RaceCarState, driver: Driver, command: str = \"normal\") -> float:\n    command_risk = COMMAND_MODIFIERS[command][COMMAND_MISTAKE_INDEX]\n    tire_wear_risk = max(0.0, (PERCENT_MAX - state.tire_pct) / PERCENT_MAX) * MISTAKE_TIRE_WEAR_SCALE\n    tire_temp_risk = _scaled_above(state.tire_temp, TIRE_OVERHEAT_C, TIRE_CRITICAL_C) * MISTAKE_TIRE_TEMP_SCALE\n    stress_risk = state.driver_stress / PERCENT_MAX * MISTAKE_STRESS_SCALE\n    # Fatigue is added risk, zero for a fresh driver, so baseline rates are unshifted.\n    fatigue_risk = (PERCENT_MAX - state.driver_energy) / PERCENT_MAX * MISTAKE_FATIGUE_SCALE\n    aggression_risk = driver.aggression * MISTAKE_AGGRESSION_SCALE\n    consistency_reduction = driver.consistency * MISTAKE_CONSISTENCY_SCALE\n    focus_reduction = state.driver_focus * MISTAKE_FOCUS_SCALE\n    return _probability(\n        BASE_MISTAKE_RATE * command_risk\n        + aggression_risk\n        + tire_wear_risk\n        + tire_temp_risk\n        + stress_risk\n        + fatigue_risk\n        - consistency_reduction\n        - focus_reduction\n    )\n\n\ndef failure_chance(state: RaceCarState, effective: EffectiveCarStats, driver: Driver, command: str = \"normal\") -> float:\n    command_risk = COMMAND_MODIFIERS[command][COMMAND_MISTAKE_INDEX]\n    reliability_penalty = (PERCENT_MAX - effective.reliability) * FAILURE_RELIABILITY_SCALE\n    condition_penalty = (PERCENT_MAX - state.condition_pct) * FAILURE_CONDITION_SCALE\n    temp_penalty = _scaled_above(state.engine_temp, ENGINE_OVERHEAT_C, ENGINE_CRITICAL_C) * FAILURE_ENGINE_TEMP_SCALE\n    sympathy_reduction = driver.mechanical_sympathy * FAILURE_SYMPATHY_SCALE\n    return _probability(BASE_FAILURE_RATE * command_risk + reliability_penalty + condition_penalty + temp_penalty - sympathy_reduction)\n\n\ndef failure_dnf_chance(state: RaceCarState) -> float:\n    \"\"\"Probability that a mechanical issue (already rolled) is terminal.\n\n    A cool engine mostly gets away with a time loss; past overheat the odds of the car\n    retiring climb steeply toward the critical temperature.\"\"\"\n    heat = _scaled_above(state.engine_temp, ENGINE_OVERHEAT_C, ENGINE_CRITICAL_C)\n    return _probability(FAILURE_DNF_PROB + FAILURE_DNF_TEMP_PROB * heat)\n\n\ndef generate_driver_feedback(driver: Driver, history: TelemetryHistory) -> str:\n    if driver.feedback < LOW_FEEDBACK_THRESHOLD:\n        return \"Car feels loose in some corners.\"\n    latest_tire_temp = history.tire_temps[-1] if history.tire_temps else 0.0\n    latest_engine_temp = history.engine_temps[-1] if history.engine_temps else 0.0\n    latest_fuel = history.fuel_pct[-1] if history.fuel_pct else PERCENT_MAX\n    if driver.feedback >= HIGH_FEEDBACK_THRESHOLD:\n        if latest_tire_temp >= TIRE_OVERHEAT_C:\n            return f\"Tire temp reached {latest_tire_temp:.0f}C. Try calmer pace, less front camber, or more stable pressure.\"\n        if latest_engine_temp >= ENGINE_OVERHEAT_C:\n            return f\"Engine temp reached {latest_engine_temp:.0f}C. Use a safer engine map or improve cooling.\"\n        if latest_fuel <= PERCENT_LOW_FUEL_WARNING:\n            return f\"Fuel dropped to {latest_fuel:.0f}%. Fuel save would protect the final laps.\"\n        return \"Telemetry is stable. Biggest gains are likely setup-specific rather than survival-related.\"\n    if latest_tire_temp >= TIRE_OVERHEAT_C:\n        return \"Tires are running hot. Back off or tune for cooler tire behavior.\"\n    if latest_engine_temp >= ENGINE_OVERHEAT_C:\n        return \"Engine is getting hot. A safer map should help.\"\n    return \"Balance feels workable, but there is time in the setup.\"\n\n\ndef _scaled_above(value: float, start: float, end: float) -> float:\n    if value <= start:\n        return 0.0\n    if end <= start:\n        return 1.0\n    return max(0.0, min(1.0, (value - start) / (end - start)))\n\n\ndef _probability(value: float) -> float:\n    return max(0.0, min(0.95, value))\n", "game/tuning.py": "from __future__ import annotations\n\nfrom copy import deepcopy\nfrom dataclasses import fields\n\nfrom constants import (\n    CAR_MOD_FIELD_RANGES,\n    CAR_MOD_FIELD_SECTIONS,\n    ENGINE_MAP_POWER,\n    TIRE_COMPOUNDS,\n    TUNE_FIELD_RANGES,\n)\nfrom game.game_state import GameState\nfrom game.models import Car, TuneSetup\n\n\nclass TuningError(ValueError):\n    \"\"\"Raised when a tune cannot be applied.\"\"\"\n\n\ndef set_tune(game_state: GameState, car_id: str, tune_setup: TuneSetup) -> GameState:\n    car = _garage_car(game_state, car_id)\n    for field in fields(TuneSetup):\n        _validate_tune_value(field.name, getattr(tune_setup, field.name), getattr(car.tune, field.name))\n    car.tune = deepcopy(tune_setup)\n    return game_state\n\n\ndef update_tune_fields(game_state: GameState, car_id: str, **fields: object) -> GameState:\n    \"\"\"Atomically apply setup knobs (TuneSetup) and/or hard-mod stats (CAR_MOD_FIELD_SECTIONS).\"\"\"\n    car = _garage_car(game_state, car_id)\n    targets = {name: tune_target(car, name) for name in fields}\n    for name, value in fields.items():\n        _validate_tune_value(name, value, getattr(targets[name], name))\n    for name, value in fields.items():\n        setattr(targets[name], name, value)\n    return game_state\n\n\ndef validate_tune_field(game_state: GameState, car_id: str, name: str, value: object) -> None:\n    \"\"\"Validate one prospective tune value without applying it (raises TuningError).\n\n    Lets an editor stage a draft field-by-field with the same rules\n    update_tune_fields enforces when the whole draft is applied.\"\"\"\n    car = _garage_car(game_state, car_id)\n    _validate_tune_value(name, value, getattr(tune_target(car, name), name))\n\n\ndef tune_target(car: Car, name: str) -> object:\n    \"\"\"The object that owns tune field ``name``: the TuneSetup for setup knobs, or the\n    car stat section (tires/brakes/chassis/...) for garage-tweakable hard mods.\"\"\"\n    if hasattr(car.tune, name):\n        return car.tune\n    section = CAR_MOD_FIELD_SECTIONS.get(name)\n    if section is not None:\n        return getattr(car, section)\n    raise TuningError(f\"Unknown tune field: {name}\")\n\n\ndef _garage_car(game_state: GameState, car_id: str) -> Car:\n    car = next((garage_car for garage_car in game_state.garage if garage_car.identity.id == car_id), None)\n    if car is None:\n        raise TuningError(f\"Unknown garage car: {car_id}\")\n    return car\n\n\ndef _validate_tune_value(name: str, value: object, current_value: object) -> None:\n    if value == \"\":\n        raise TuningError(f\"{name} cannot be blank\")\n    if name == \"engine_map\":\n        if not isinstance(value, str) or value not in ENGINE_MAP_POWER:\n            valid = \", \".join(sorted(ENGINE_MAP_POWER))\n            raise TuningError(f\"Invalid engine_map: {value!r}. Valid values: {valid}\")\n        return\n    if name == \"tire_compound\":\n        if not isinstance(value, str) or value not in TIRE_COMPOUNDS:\n            valid = \", \".join(TIRE_COMPOUNDS)\n            raise TuningError(f\"Invalid tire_compound: {value!r}. Valid values: {valid}\")\n        return\n    if isinstance(current_value, bool):\n        return\n    if isinstance(current_value, int) and not isinstance(value, int):\n        raise TuningError(f\"{name} must be an integer\")\n    if isinstance(current_value, float) and not isinstance(value, (int, float)):\n        raise TuningError(f\"{name} must be a number\")\n    bounds = TUNE_FIELD_RANGES.get(name) or CAR_MOD_FIELD_RANGES.get(name)\n    if bounds is not None:\n        low, high = bounds\n        numeric_value = float(value)\n        if numeric_value < low or numeric_value > high:\n            raise TuningError(f\"{name} must be between {low:g} and {high:g}\")\n", "interfaces/__init__.py": "\"\"\"SheetCircuit user interfaces.\"\"\"\n", "interfaces/cli.py": "from __future__ import annotations\n\nimport select\nimport shlex\nimport shutil\nimport sys\n\nfrom constants import PRESENTATION_SPEED_FACTOR, TICK_RATE_HZ\n# Presentation fast-forward multipliers cycled with F in the race loop. Pure render speed:\n# they change only the per-tick wall-clock pause, never the simulated result.\n_RACE_SPEEDS = (1.0, 2.0, 4.0, 8.0)\n\nfrom game.actions import (\n    COMPENDIUM_PREFIX,\n    advance_race_action,\n    advance_to_lap_end_action,\n    buy_car_action,\n    car_detail_screen,\n    compendium_nav,\n    compendium_screen,\n    compendium_token_from_args,\n    driver_detail_screen,\n    parse_compendium_token,\n    drivers_screen,\n    event_detail_screen,\n    events_screen,\n    finish_race_action,\n    format_race_clock,\n    fire_driver_action,\n    garage_screen,\n    hire_driver_action,\n    load_game_action,\n    car_extended_screen,\n    market_screen,\n    market_car_detail_screen,\n    market_car_extended_screen,\n    race_clock_elapsed,\n    race_command_options,\n    race_entry_screen,\n    race_screen,\n    repair_car_action,\n    save_game_action,\n    sell_car_action,\n    simulate_to_end_action,\n    apply_tune_draft,\n    stage_tune_value,\n    start_race_action,\n    tune_car_action,\n    tune_editor_screen,\n    tune_section_screen,\n)\nfrom game.economy import EconomyError\nfrom game.game_state import GameState, new_career\nfrom game.loader import load_drivers, load_events, load_tracks\nfrom game.market import list_market_cars\nfrom game.sorting import SortSpec, is_sortable_screen, parse_sort_spec, sort_fields, sort_items, sort_label\nfrom game.simulation import SimulationError\nfrom game.tuning import TuningError\nfrom interfaces.menu import menu_bar, menu_command, status_bar, team_xp_status\nfrom interfaces.render_text import (\n    driver_rows,\n    event_rows,\n    garage_rows,\n    render_drivers,\n    render_events,\n    render_garage,\n    render_race_status,\n    standings_rows,\n)\nfrom interfaces.terminal import RICH_AVAILABLE, terminal\n\n_SCREEN_SORTS: dict[str, SortSpec] = {}\n_SORTABLE_SCREENS = (\"garage\", \"drivers\", \"events\", \"market\")\n\n\ndef main() -> None:\n    state = new_career()\n    if not sys.stdin.isatty():\n        print(render_garage(state))\n        print(render_drivers(load_drivers()))\n        print(render_events(load_events()))\n        return\n    command_loop(state)\n\n\ndef command_loop(state: GameState) -> None:\n    subtitle = \"Rich UI enabled.\" if RICH_AVAILABLE else \"Install rich for color tables: python3 -m pip install -r requirements.txt\"\n    screen = \"garage\"\n    while True:\n        terminal.clear()\n        _render_screen(state, screen, subtitle)\n        raw = terminal.prompt(\"Choice\").strip()\n        if not raw:\n            continue\n        try:\n            state, screen = run_menu_choice(state, raw, screen)\n        except (EconomyError, TuningError, ValueError) as exc:\n            terminal.print(exc)\n            terminal.pause()\n\n\ndef run_menu_choice(state: GameState, raw: str, current_screen: str = \"garage\") -> tuple[GameState, str]:\n    if current_screen.startswith(COMPENDIUM_PREFIX):\n        nav = compendium_nav(current_screen, raw)\n        if nav is not None:\n            return state, nav or \"garage\"\n    if raw.strip().isdigit() or \"_\" in raw.strip():\n        detail_screen = _screen_selection(state, current_screen, raw.strip())\n        if detail_screen is not None:\n            _show_detail_screen(state, detail_screen, current_screen)\n            return state, current_screen\n    command = menu_command(raw) if len(raw.strip()) == 1 else None\n    command = command or raw.strip()\n    if command in {\"garage\", \"drivers\", \"events\", \"market\", \"help\", \"compendium\"}:\n        return state, command\n    tokens = shlex.split(raw.strip())\n    if tokens and tokens[0].lower() == \"compendium\":\n        return state, compendium_token_from_args(tokens[1:])\n    if tokens and tokens[0].lower() == \"sort\":\n        sorted_screen = _apply_sort_choice(tokens, current_screen)\n        return state, sorted_screen or current_screen\n    if command == \"buy\":\n        if current_screen == \"market\":\n            _buy_on_market(state)\n        return state, \"market\"\n    if command == \"sell\":\n        _sell_picker(state)\n        return state, \"garage\"\n    if command == \"repair\":\n        _repair_picker(state)\n        return state, \"garage\"\n    if command == \"tune\":\n        _tune_picker(state)\n        return state, \"garage\"\n    if command == \"race\":\n        _race_picker(state)\n        return state, \"garage\"\n    if command == \"hire\":\n        _hire_picker(state)\n        return state, \"drivers\"\n    if command == \"fire\":\n        _fire_picker(state)\n        return state, \"drivers\"\n    if command == \"save\":\n        _save_picker(state)\n        return state, current_screen\n    if command == \"load\":\n        return _load_picker(state), \"garage\"\n    if command == \"quit\":\n        raise SystemExit\n    if tokens and tokens[0].lower() in {\"ext\", \"extended\"}:\n        car_token = tokens[1] if len(tokens) > 1 else None\n        _show_extended_car(state, current_screen, car_token)\n        return state, current_screen\n    return run_command(state, command), current_screen\n\n\ndef run_command(state: GameState, raw: str) -> GameState:\n    tokens = shlex.split(raw)\n    if not tokens:\n        return state\n    menu_match = menu_command(tokens[0]) if len(tokens) == 1 else None\n    if menu_match is not None:\n        tokens = [menu_match]\n    command = tokens[0]\n    if command == \"help\":\n        _show_help()\n    elif command == \"compendium\":\n        _show_compendium(compendium_token_from_args(tokens[1:]))\n    elif command == \"garage\":\n        _show_garage(state)\n    elif command == \"drivers\":\n        _show_drivers(state)\n    elif command == \"events\":\n        _show_events()\n    elif command == \"market\":\n        _show_market()\n    elif command == \"sort\":\n        screen = _apply_sort_choice(tokens, \"garage\")\n        if screen is None:\n            return state\n        if screen == \"drivers\":\n            _show_drivers(state)\n        elif screen == \"events\":\n            _show_events()\n        elif screen == \"market\":\n            _show_market()\n        else:\n            _show_garage(state)\n    elif command == \"buy\" and len(tokens) == 3 and tokens[1] == \"car\":\n        result = buy_car_action(state, tokens[2])\n        terminal.print(result.message)\n    elif command == \"buy\" and len(tokens) == 2:\n        market = _sorted_market()\n        car = _select_from_collection(market, tokens[1], lambda item: item.identity.id)\n        if car is None:\n            raise ValueError(f\"Unknown market car: {tokens[1]}\")\n        result = buy_car_action(state, car.identity.id)\n        terminal.print(result.message)\n    elif command == \"sell\" and len(tokens) == 3 and tokens[1] == \"car\":\n        sell_car_action(state, tokens[2])\n        _show_garage(state)\n    elif command == \"repair\" and len(tokens) >= 2:\n        repair_car_action(state, tokens[1])\n        _show_garage(state)\n    elif command == \"tune\" and len(tokens) == 4:\n        tune_car_action(state, tokens[1], tokens[2], _parse_value(tokens[3]))\n        _show_garage(state)\n    elif command == \"buy\":\n        _show_market()\n    elif command == \"sell\":\n        _sell_picker(state)\n    elif command == \"repair\":\n        _repair_picker(state)\n    elif command == \"tune\":\n        _tune_picker(state)\n    elif command == \"race\":\n        _race_picker(state)\n    elif command == \"hire\" and len(tokens) == 2:\n        result = hire_driver_action(state, tokens[1])\n        terminal.print(result.message)\n        _show_drivers(state)\n    elif command == \"fire\" and len(tokens) == 2:\n        result = fire_driver_action(state, tokens[1])\n        terminal.print(result.message)\n        _show_drivers(state)\n    elif command == \"hire\":\n        _hire_picker(state)\n    elif command == \"fire\":\n        _fire_picker(state)\n    elif command == \"enter\" and len(tokens) == 4:\n        _run_race(state, tokens[1], tokens[2], tokens[3])\n    elif command == \"save\":\n        result = save_game_action(state, tokens[1] if len(tokens) > 1 else \"saves/save1.json\")\n        terminal.print(result.message)\n    elif command == \"load\":\n        result = load_game_action(tokens[1] if len(tokens) > 1 else \"saves/save1.json\")\n        state = result.state\n        terminal.print(result.message)\n    elif command == \"quit\":\n        raise SystemExit\n    else:\n        terminal.print(\"Unknown command. Type help.\")\n    return state\n\n\ndef _render_screen(state: GameState, screen: str, subtitle: str = \"\") -> None:\n    label = COMPENDIUM_PREFIX if screen.startswith(COMPENDIUM_PREFIX) else screen\n    terminal.header(\"SheetCircuit\", subtitle)\n    terminal.print(status_bar(state.money, state.week, len(state.garage), label, state.team_xp))\n    terminal.menu(menu_bar())\n    if screen == \"garage\":\n        _show_garage(state)\n    elif screen == \"drivers\":\n        _show_drivers(state)\n    elif screen == \"events\":\n        _show_events(state)\n    elif screen == \"market\":\n        _show_market()\n    elif screen == \"help\":\n        _show_help()\n    elif screen.startswith(COMPENDIUM_PREFIX):\n        _show_compendium(screen)\n    else:\n        _show_garage(state)\n\n\ndef _show_compendium(screen: str) -> None:\n    path, query = parse_compendium_token(screen)\n    data = compendium_screen(path, query)\n    terminal.print(data.title)\n    _render_action_screen(data)\n    if query:\n        terminal.print(\"'b' back to the index  |  a hotkey (G/D/E/\u2026) to leave\")\n    elif path:\n        terminal.print(\"Enter a number/name to open  |  'b' up a level  |  'compendium <field>' to jump\")\n    else:\n        terminal.print(\"Enter a number/name to open a chapter  |  'compendium <field>' to jump to a field\")\n\n\ndef _show_garage(state: GameState) -> None:\n    _render_action_screen(garage_screen(state, _screen_sort(\"garage\")))\n\n\ndef _show_drivers(state: GameState) -> None:\n    _render_action_screen(drivers_screen(state, _screen_sort(\"drivers\")))\n\n\ndef _show_events(state: GameState) -> None:\n    _render_action_screen(events_screen(state, _screen_sort(\"events\")))\n\n\ndef _show_market() -> None:\n    _render_action_screen(market_screen(_screen_sort(\"market\")))\n    terminal.print(\"Enter a number or ID to view details  |  'buy' or 'buy <id>' to purchase  |  'ext <id>' for full specs\")\n\n\ndef _show_extended_car(state: GameState, screen: str, car_token: str | None) -> None:\n    if screen == \"market\":\n        cars = _sorted_market()\n        get_id = lambda c: c.identity.id\n        get_screen = lambda c: market_car_extended_screen(c.identity.id)\n    elif screen == \"garage\":\n        cars = _sorted_garage(state)\n        get_id = lambda c: c.identity.id\n        get_screen = lambda c: car_extended_screen(state, c.identity.id)\n    else:\n        terminal.print(\"Extended view is available on the market and garage screens.\")\n        terminal.pause()\n        return\n    if car_token is not None:\n        car = _select_from_collection(cars, car_token, get_id)\n        if car is None:\n            terminal.print(f\"Unknown car: {car_token}\")\n            terminal.pause()\n            return\n    else:\n        def show():\n            terminal.clear()\n            _render_screen(state, screen)\n            return _sorted_market() if screen == \"market\" else _sorted_garage(state)\n\n        car = _choose(cars, get_id, \"Extended view (number or ID)\", sort_screen=screen, refresh=show)\n        if car is None:\n            return\n    _show_detail_screen(state, get_screen(car), screen)\n\n\ndef _buy_on_market(state: GameState) -> None:\n    def show():\n        terminal.clear()\n        _render_screen(state, \"market\")\n        return _sorted_market()\n\n    car = _choose(_sorted_market(), lambda item: item.identity.id, \"Buy (number or ID)\", sort_screen=\"market\", refresh=show)\n    if car is None:\n        return\n    result = buy_car_action(state, car.identity.id)\n    terminal.print(result.message)\n    terminal.pause()\n\n\ndef _show_detail_screen(state: GameState, screen, parent_screen: str) -> None:\n    terminal.clear()\n    terminal.header(screen.title, screen.subtitle)\n    terminal.print(status_bar(state.money, state.week, len(state.garage), parent_screen, state.team_xp))\n    terminal.menu(menu_bar())\n    _render_action_screen(screen)\n    terminal.pause()\n\n\ndef _screen_selection(state: GameState, screen: str, raw: str):\n    if screen == \"drivers\":\n        combined = _sorted_hired_drivers(state) + _sorted_available_drivers(state)\n        driver = _select_from_collection(combined, raw, lambda item: item.id)\n        return driver_detail_screen(driver.id) if driver is not None else None\n    if screen == \"events\":\n        events = _sorted_events()\n        event = _select_from_collection(events, raw, lambda item: item.id)\n        return event_detail_screen(event.id, state) if event is not None else None\n    if screen == \"garage\":\n        car = _select_from_collection(_sorted_garage(state), raw, lambda item: item.identity.id)\n        return car_detail_screen(state, car.identity.id) if car is not None else None\n    if screen == \"market\":\n        cars = _sorted_market()\n        car = _select_from_collection(cars, raw, lambda item: item.identity.id)\n        return market_car_detail_screen(car.identity.id) if car is not None else None\n    return None\n\n\ndef _select_from_collection(items: list[object], raw: str, get_id):\n    if raw.isdigit():\n        index = int(raw) - 1\n        if 0 <= index < len(items):\n            return items[index]\n        return None\n    normalized = raw.lower()\n    return next((item for item in items if get_id(item).lower() == normalized), None)\n\n\ndef _apply_sort_choice(tokens: list[str], current_screen: str) -> str | None:\n    if len(tokens) == 1:\n        _show_sort_help(current_screen)\n        return None\n\n    requested_screen = current_screen\n    field_index = 1\n    if tokens[1].lower() in _SORTABLE_SCREENS:\n        requested_screen = tokens[1].lower()\n        field_index = 2\n\n    if not is_sortable_screen(requested_screen):\n        valid = \", \".join(_SORTABLE_SCREENS)\n        raise ValueError(f\"Specify a sortable screen: {valid}\")\n    if field_index >= len(tokens):\n        _show_sort_help(requested_screen)\n        return requested_screen\n    if len(tokens) - field_index > 2:\n        raise ValueError(\"Use: sort [screen] <field> [asc|desc]\")\n\n    field = tokens[field_index].lower()\n    if field in {\"clear\", \"default\", \"reset\", \"none\"}:\n        _SCREEN_SORTS.pop(requested_screen, None)\n        return requested_screen\n\n    direction = tokens[field_index + 1] if field_index + 1 < len(tokens) else None\n    _SCREEN_SORTS[requested_screen] = parse_sort_spec(requested_screen, field, direction)\n    return requested_screen\n\n\ndef _show_sort_help(current_screen: str) -> None:\n    rows = []\n    screens = [current_screen] if is_sortable_screen(current_screen) else list(_SORTABLE_SCREENS)\n    for screen in screens:\n        rows.append([screen.title(), \", \".join(sort_fields(screen))])\n    terminal.table(\"Sort Fields\", [\"Screen\", \"Fields\"], rows)\n    terminal.print(\"Use sort <field> [asc|desc], sort <screen> <field> [asc|desc], or sort clear.\")\n\n\ndef _screen_sort(screen: str) -> SortSpec | None:\n    return _SCREEN_SORTS.get(screen)\n\n\ndef _sort_table_title(title: str, screen: str) -> str:\n    spec = _screen_sort(screen)\n    if spec is None:\n        return title\n    return f\"{title} (sorted by {sort_label(screen, spec)})\"\n\n\ndef _sorted_garage(state: GameState):\n    return sort_items(\"garage\", state.garage, _screen_sort(\"garage\"))\n\n\ndef _sorted_market():\n    return sort_items(\"market\", list_market_cars(), _screen_sort(\"market\"))\n\n\ndef _sorted_events():\n    return sort_items(\"events\", load_events(), _screen_sort(\"events\"))\n\n\ndef _sorted_hired_drivers(state: GameState):\n    return sort_items(\"drivers\", state.hired_drivers, _screen_sort(\"drivers\"))\n\n\ndef _sorted_available_drivers(state: GameState):\n    all_drivers = load_drivers()\n    hired_ids = {d.id for d in state.hired_drivers}\n    return sort_items(\"drivers\", [d for d in all_drivers if d.id not in hired_ids], _screen_sort(\"drivers\"))\n\n\ndef _render_action_screen(screen) -> None:\n    for table in screen.tables:\n        terminal.table(table.title, table.headers, table.rows)\n    for message in screen.messages:\n        terminal.print(message)\n\n\ndef _show_help() -> None:\n    terminal.table(\n        \"Menu Hotkeys\",\n        [\"Key\", \"Action\"],\n        [\n            [\"G\", \"Garage screen\"],\n            [\"E\", \"Events screen\"],\n            [\"D\", \"Drivers screen\"],\n            [\"M\", \"Market screen (view & buy)\"],\n            [\"R\", \"Guided race entry\"],\n            [\"X\", \"Guided car sale\"],\n            [\"T\", \"Guided tuning\"],\n            [\"P\", \"Guided repair\"],\n            [\"S\", \"Save game\"],\n            [\"L\", \"Load game\"],\n            [\"H\", \"Help\"],\n            [\"Q\", \"Quit\"],\n        ],\n    )\n    terminal.table(\n        \"Typed Commands\",\n        [\"Command\", \"Purpose\"],\n        [\n            [\"<number> / <id>\", \"Open details for a visible list item\"],\n            [\"ext <number> / ext <id>\", \"Full spec view on market or garage screen\"],\n            [\"garage\", \"Show owned cars\"],\n            [\"drivers\", \"Show drivers\"],\n            [\"events\", \"Show race events\"],\n            [\"market\", \"Show market cars (supports buying)\"],\n            [\"race\", \"Choose event, car, and driver\"],\n            [\"buy\", \"Go to market; on market screen: pick a car to buy\"],\n            [\"buy <car_id>\", \"Buy a specific market car by ID or number\"],\n            [\"buy car <car_id>\", \"Buy a specific market car by ID\"],\n            [\"sell\", \"Choose an owned car to sell\"],\n            [\"sell car <car_id>\", \"Sell a specific garage car\"],\n            [\"repair\", \"Choose an owned car to repair\"],\n            [\"repair <car_id>\", \"Repair a specific garage car\"],\n            [\"tune\", \"Choose an owned car to tune\"],\n            [\"tune <car_id> <field> <value>\", \"Set one tune field\"],\n            [\"hire\", \"Choose a driver to hire\"],\n            [\"hire <driver_id>\", \"Hire a specific driver\"],\n            [\"fire\", \"Choose a driver to release\"],\n            [\"fire <driver_id>\", \"Release a specific driver\"],\n            [\"enter <event_id> <car_id> <driver_id>\", \"Start a race directly\"],\n            [\"sort <field> (asc|desc)\", \"Sort the visible list (works in pickers too)\"],\n            [\"sort <screen> <field> (asc|desc)\", \"Sort garage, drivers, events, or market\"],\n            [\"sort clear\", \"Clear sorting on the current screen\"],\n            [\"save [path]\", \"Save game, default saves/save1.json\"],\n            [\"load [path]\", \"Load game, default saves/save1.json\"],\n            [\"help\", \"Show this help\"],\n            [\"quit\", \"Exit\"],\n        ],\n    )\n    terminal.table(\n        \"Car Columns\",\n        [\"Column\", \"Meaning\"],\n        [\n            [\"Class\", \"Event eligibility letter (E..S), derived from PR; restrictions may still apply\"],\n            [\"PR\", \"Performance rating: mean capability across three reference tracks (drag/slalom/hybrid)\"],\n            [\"Type\", \"Shape \u2014 where pace comes from: Balanced, Power, Handling, or Challenge\"],\n        ],\n    )\n    terminal.print(\n        \"Class is computed, not stored: every car (including ones you build) is run on a fixed\"\n        \" drag, slalom and hybrid reference track; the average is its PR/class and the spread is\"\n        \" its Type. Open a car's details to see the per-track numbers.\"\n    )\n    terminal.print(\n        \"Rivals are matched near your car's derived event pace; higher-class events keep a faster pace floor.\"\n    )\n    terminal.table(\n        \"Sortable Fields\",\n        [\"Screen\", \"Fields\"],\n        [[screen.title(), \", \".join(sort_fields(screen))] for screen in _SORTABLE_SCREENS],\n    )\n    _show_race_help()\n\n\ndef _show_race_help() -> None:\n    terminal.table(\n        \"Race Commands\",\n        [\"Key\", \"Command\", \"Effect\"],\n        [[option.key, option.label, option.description] for option in race_command_options()]\n        + [\n            [\"N / next\", \"Next lap\", \"Fast-forward to the end of the current lap\"],\n            [\"F / >\", \"Faster\", \"Cycle presentation speed (1x/2x/4x/8x); no effect on the result\"],\n            [\"X / end\", \"End\", \"Simulate remaining laps instantly and show result\"],\n            [\"? / help\", \"Help\", \"Show race command help\"],\n        ],\n    )\n\n\n_PICKER_SUBTITLE = \"Choose {noun} by number or ID; 'sort <field>' re-orders; q cancels.\"\n\n\ndef _garage_picker_show(state: GameState, title: str, subtitle: str, screen_label: str):\n    \"\"\"Render a garage-table picker view and return the sorted cars; reusable as the\n    _choose refresh so 'sort' re-orders the list in place.\"\"\"\n    def show():\n        terminal.clear()\n        terminal.header(title, subtitle)\n        terminal.print(status_bar(state.money, state.week, len(state.garage), screen_label, state.team_xp))\n        terminal.menu(menu_bar())\n        terminal.table(_sort_table_title(\"Garage\", \"garage\"), [\"#\", \"ID\", \"Car\", \"Class\", \"PR\", \"Type\", \"Condition\", \"Power\"], garage_rows(state, _screen_sort(\"garage\")))\n        return _sorted_garage(state)\n    return show\n\n\ndef _sell_picker(state: GameState) -> None:\n    if not state.garage:\n        terminal.print(\"Garage is empty.\")\n        return\n    show = _garage_picker_show(state, \"Sell Car\", _PICKER_SUBTITLE.format(noun=\"a garage car\"), \"sell\")\n    car = _choose(show(), lambda item: item.identity.id, \"Sell\", sort_screen=\"garage\", refresh=show)\n    if car is None:\n        return\n    result = sell_car_action(state, car.identity.id)\n    terminal.print(result.message)\n    terminal.pause()\n\n\ndef _repair_picker(state: GameState) -> None:\n    if not state.garage:\n        terminal.print(\"Garage is empty.\")\n        return\n    show = _garage_picker_show(state, \"Repair\", _PICKER_SUBTITLE.format(noun=\"a garage car\"), \"repair\")\n    car = _choose(show(), lambda item: item.identity.id, \"Repair\", sort_screen=\"garage\", refresh=show)\n    if car is None:\n        return\n    result = repair_car_action(state, car.identity.id)\n    terminal.print(result.message)\n    terminal.pause()\n\n\ndef _tune_picker(state: GameState) -> None:\n    if not state.garage:\n        terminal.print(\"Garage is empty.\")\n        return\n    # Deliberately not sortable: the tune flow keeps its plain picker (and the tune\n    # fields list keeps its authored subsystem grouping).\n    _garage_picker_show(state, \"Tune\", \"Choose a car to set up. q cancels.\", \"tune\")()\n    car = _choose(_sorted_garage(state), lambda item: item.identity.id, \"Car\")\n    if car is None:\n        return\n    _tune_editor(state, car.identity.id)\n\n\ndef _tune_editor(state: GameState, car_id: str) -> None:\n    \"\"\"Creator-style setup editor: sections -> fields -> value.\n\n    Edits are STAGED into a draft; [W] applies the whole draft atomically and\n    backing out with staged changes asks first (mirrors the creator's edit loop).\"\"\"\n    draft: dict[str, object] = {}\n    while True:\n        screen = tune_editor_screen(state, car_id, draft)\n        terminal.clear()\n        terminal.header(screen.title, screen.subtitle)\n        terminal.print(status_bar(state.money, state.week, len(state.garage), \"tune\", state.team_xp))\n        terminal.menu(menu_bar())\n        _render_action_screen(screen)\n        terminal.print(\"number/name = open section  |  W = apply staged setup  |  B = back\")\n        raw = terminal.prompt(\"Section\").strip()\n        low = raw.lower()\n        if low in {\"b\", \"q\", \"cancel\", \"\"}:\n            if not draft:\n                return\n            confirm = terminal.prompt(\n                \"Staged changes not applied \u2014 [s] apply & exit, [d] discard & exit, anything else keeps editing\"\n            ).strip().lower()\n            if confirm == \"s\" and _apply_staged_tune(state, car_id, draft):\n                return\n            if confirm == \"d\":\n                return\n            continue\n        if low == \"w\":\n            if _apply_staged_tune(state, car_id, draft):\n                draft = {}\n            continue\n        try:\n            tune_section_screen(state, car_id, raw, draft)\n        except ValueError as exc:\n            terminal.print(exc)\n            terminal.pause()\n            continue\n        _tune_section_editor(state, car_id, raw, draft)\n\n\ndef _tune_section_editor(state: GameState, car_id: str, section: str, draft: dict[str, object]) -> None:\n    while True:\n        screen = tune_section_screen(state, car_id, section, draft)\n        terminal.clear()\n        terminal.header(screen.title, screen.subtitle)\n        terminal.print(status_bar(state.money, state.week, len(state.garage), \"tune\", state.team_xp))\n        terminal.menu(menu_bar())\n        _render_action_screen(screen)\n        terminal.print(\"number/name = edit field  |  B = back to sections\")\n        raw = terminal.prompt(\"Field\").strip()\n        if raw.lower() in {\"b\", \"q\", \"cancel\", \"\"}:\n            return\n        selected_field = _match_tune_field(screen.fields, raw)\n        if selected_field is None:\n            terminal.print(f\"Unknown tune field: {raw}\")\n            terminal.pause()\n            continue\n        if selected_field.help:\n            terminal.print(f\"  {selected_field.help}\")\n        try:\n            value = _prompt_field_value(selected_field)\n            if value is None:\n                terminal.print(\"No change staged.\")\n                continue\n            stage_tune_value(state, car_id, selected_field.name, value)\n        except TuningError as exc:\n            terminal.print(f\"Rejected: {exc}\")\n            terminal.pause()\n            continue\n        if value == selected_field.current:\n            # Re-entering the applied value un-stages the field.\n            draft.pop(selected_field.name, None)\n        else:\n            draft[selected_field.name] = value\n\n\ndef _match_tune_field(fields: list, raw: str):\n    \"\"\"Resolve a tune field by its number in the shown list, name, or display label.\"\"\"\n    if raw.isdigit() and 1 <= int(raw) <= len(fields):\n        return fields[int(raw) - 1]\n    normalized = raw.lower()\n    return next((f for f in fields if normalized in {f.name.lower(), f.label.lower()}), None)\n\n\ndef _apply_staged_tune(state: GameState, car_id: str, draft: dict[str, object]) -> bool:\n    if not draft:\n        terminal.print(\"No staged changes to apply.\")\n        terminal.pause()\n        return False\n    try:\n        result = apply_tune_draft(state, car_id, dict(draft))\n    except TuningError as exc:\n        terminal.print(f\"Cannot apply: {exc}\")\n        terminal.pause()\n        return False\n    terminal.print(result.message)\n    terminal.pause()\n    return True\n\n\ndef _prompt_field_value(field) -> object | None:\n    if field.options:\n        has_desc = any(option.description for option in field.options)\n        if has_desc:\n            rows = [[index, option.label, option.description] for index, option in enumerate(field.options, start=1)]\n            terminal.table(f\"{field.label} Options\", [\"#\", \"Option\", \"Effect\"], rows)\n        else:\n            rows = [[index, option.label, option.value] for index, option in enumerate(field.options, start=1)]\n            terminal.table(f\"{field.label} Options\", [\"#\", \"Option\", \"Value\"], rows)\n        raw = terminal.prompt(\"Option\").strip()\n        if raw == \"\" or raw.lower() in {\"q\", \"quit\", \"cancel\"}:\n            return None\n        if raw.isdigit() and 1 <= int(raw) <= len(field.options):\n            return field.options[int(raw) - 1].value\n        normalized = raw.lower()\n        for option in field.options:\n            if normalized in {option.value.lower(), option.label.lower()}:\n                return option.value\n        raise TuningError(f\"Unknown option for {field.label}: {raw}\")\n    range_text = f\"{field.minimum:g}-{field.maximum:g}\" if field.minimum is not None and field.maximum is not None else \"\"\n    value = terminal.prompt(f\"Value ({range_text})\").strip()\n    if value == \"\" or value.lower() in {\"q\", \"quit\", \"cancel\"}:\n        return None\n    return _parse_value(value)\n\n\ndef _save_picker(state: GameState) -> None:\n    path = terminal.prompt(\"Save path\", \"saves/save1.json\")\n    result = save_game_action(state, path)\n    terminal.print(result.message)\n    terminal.pause()\n\n\ndef _load_picker(state: GameState) -> GameState:\n    path = terminal.prompt(\"Load path\", \"saves/save1.json\")\n    result = load_game_action(path)\n    loaded = result.state\n    terminal.print(result.message)\n    terminal.pause()\n    return loaded\n\n\ndef _hire_picker(state: GameState) -> None:\n    def available_drivers():\n        hired_ids = {d.id for d in state.hired_drivers}\n        return sort_items(\"drivers\", [d for d in load_drivers() if d.id not in hired_ids], _screen_sort(\"drivers\"))\n\n    if not available_drivers():\n        terminal.print(\"No drivers available to hire.\")\n        return\n\n    def show():\n        terminal.clear()\n        terminal.header(\"Hire Driver\", _PICKER_SUBTITLE.format(noun=\"a driver\"))\n        terminal.print(status_bar(state.money, state.week, len(state.garage), \"hire\", state.team_xp))\n        terminal.menu(menu_bar())\n        available = available_drivers()\n        terminal.table(_sort_table_title(\"Available Drivers\", \"drivers\"), [\"#\", \"ID\", \"Name\", \"Pace\", \"Cons\", \"Feedback\", \"Salary\"], driver_rows(available))\n        return available\n\n    driver = _choose(show(), lambda item: item.id, \"Hire\", sort_screen=\"drivers\", refresh=show)\n    if driver is None:\n        return\n    result = hire_driver_action(state, driver.id)\n    terminal.print(result.message)\n    terminal.pause()\n\n\ndef _fire_picker(state: GameState) -> None:\n    if not state.hired_drivers:\n        terminal.print(\"No drivers on your team.\")\n        return\n\n    def show():\n        terminal.clear()\n        terminal.header(\"Release Driver\", _PICKER_SUBTITLE.format(noun=\"a driver\"))\n        terminal.print(status_bar(state.money, state.week, len(state.garage), \"fire\", state.team_xp))\n        terminal.menu(menu_bar())\n        drivers = _sorted_hired_drivers(state)\n        terminal.table(_sort_table_title(\"Your Team\", \"drivers\"), [\"#\", \"ID\", \"Name\", \"Pace\", \"Cons\", \"Feedback\", \"Salary\"], driver_rows(drivers))\n        return drivers\n\n    driver = _choose(show(), lambda item: item.id, \"Release\", sort_screen=\"drivers\", refresh=show)\n    if driver is None:\n        return\n    result = fire_driver_action(state, driver.id)\n    terminal.print(result.message)\n    terminal.pause()\n\n\ndef _race_picker(state: GameState) -> None:\n    if not state.garage:\n        terminal.print(\"Garage is empty. Buy a car first.\")\n        return\n    tracks = {track.id: track for track in load_tracks()}\n\n    def show_events():\n        terminal.clear()\n        terminal.header(\"Race Entry\", \"Choose an event, car, and driver. Enter a number or ID; 'sort <field>' re-orders; q cancels.\")\n        terminal.print(status_bar(state.money, state.week, len(state.garage), \"race entry\", state.team_xp))\n        terminal.menu(menu_bar())\n        events = _sorted_events()\n        terminal.table(\n            _sort_table_title(\"Available Events\", \"events\"),\n            [\"#\", \"ID\", \"Event\", \"Track\", \"Class\", \"Req\", \"Status\", \"Best\", \"Fee\", \"Opp\"],\n            event_rows(events, tracks, state=state),\n        )\n        return events\n\n    event = _choose(show_events(), lambda item: item.id, \"Event\", sort_screen=\"events\", refresh=show_events)\n    if event is None:\n        return\n\n    show_cars = _garage_picker_show(state, \"Race Entry\", f\"Event: {event.name}\", \"race entry\")\n    car = _choose(show_cars(), lambda item: item.identity.id, \"Car\", sort_screen=\"garage\", refresh=show_cars)\n    if car is None:\n        return\n\n    def show_drivers():\n        terminal.clear()\n        terminal.header(\"Race Entry\", f\"{event.name} / {car.identity.name}\")\n        terminal.print(status_bar(state.money, state.week, len(state.garage), \"race entry\", state.team_xp))\n        terminal.menu(menu_bar())\n        drivers = sort_items(\"drivers\", state.hired_drivers or load_drivers(), _screen_sort(\"drivers\"))\n        terminal.table(_sort_table_title(\"Drivers\", \"drivers\"), [\"#\", \"ID\", \"Name\", \"Pace\", \"Cons\", \"Feedback\", \"Salary\"], driver_rows(drivers))\n        return drivers\n\n    driver = _choose(show_drivers(), lambda item: item.id, \"Driver\", sort_screen=\"drivers\", refresh=show_drivers)\n    if driver is None:\n        return\n    _run_race(state, event.id, car.identity.id, driver.id)\n\n\ndef _choose(items: list[object], get_id, label: str, sort_screen: str | None = None, refresh=None):\n    \"\"\"Prompt until an item is picked (or cancelled). Every picker list is sortable\n    with the same grammar as the main screens: pass the backing sort screen plus a\n    ``refresh`` that re-renders the picker's table and returns the re-sorted items.\"\"\"\n    while True:\n        raw = terminal.prompt(label).strip()\n        if raw.lower() in {\"q\", \"quit\", \"cancel\"}:\n            terminal.print(\"Cancelled.\")\n            return None\n        tokens = shlex.split(raw) if raw else []\n        if tokens and tokens[0].lower() == \"sort\":\n            if sort_screen is None or refresh is None:\n                terminal.print(\"This list has a fixed order.\")\n                continue\n            if len(tokens) == 1:\n                _show_sort_help(sort_screen)\n                continue\n            try:\n                _apply_sort_choice(tokens, sort_screen)\n            except ValueError as exc:\n                terminal.print(exc)\n                continue\n            items = refresh()\n            continue\n        if raw.isdigit():\n            index = int(raw) - 1\n            if 0 <= index < len(items):\n                return items[index]\n        for item in items:\n            if get_id(item) == raw:\n                return item\n        terminal.print(f\"Unknown {label.lower()}: {raw}\")\n\n\ndef _run_race(state: GameState, event_id: str, car_id: str, driver_id: str) -> None:\n    try:\n        race = start_race_action(state, event_id, car_id, driver_id)\n    except SimulationError as exc:\n        terminal.print(str(exc))\n        terminal.pause()\n        return\n    session = race.session\n    last_result = None\n    current_command = \"normal\"\n    resume_command = \"normal\"  # what to fall back to after a one-shot pit\n    pending_command: str | None = None\n    race_error = \"\"\n    show_help = False\n    interactive = sys.stdin.isatty() and sys.stdout.isatty()\n    # Constant per-update pause: tick count already scales with the car's watched length\n    # (see ticks_per_lap_for), so total watched = ticks / TICK_RATE_HZ tracks the real race.\n    base_tick_sleep = 1.0 / TICK_RATE_HZ\n    speed_mult = 1.0  # presentation speed; F cycles it, never touches the result\n\n    _render_race_screen(state, session, None, \"\")\n    _print_lap_bar(session, current_command, pending_command, speed_mult)\n\n    while not session.is_finished:\n        skip_to_lap = False\n        if interactive:\n            ready = select.select([sys.stdin], [], [], base_tick_sleep / speed_mult)[0]\n            if ready:\n                raw = sys.stdin.readline().strip()\n                low = raw.lower()\n                if low in {\"help\", \"?\"}:\n                    show_help = True\n                elif low in {\"end\", \"skip\", \"x\"}:\n                    result = simulate_to_end_action(session, current_command)\n                    last_result = result.tick\n                    _render_race_screen(state, session, last_result, \"\")\n                    terminal.print(\"Race simulated to completion.\")\n                    break\n                elif low in {\"n\", \"next\", \"lap\", \"l\"}:\n                    skip_to_lap = True  # fast-forward over the rest of this lap\n                elif low in {\"f\", \"ff\", \">\"}:\n                    speed_mult = _cycle_speed(speed_mult)\n                elif raw:\n                    matched = _race_command(raw)\n                    if matched is not None:\n                        pending_command = matched\n\n        if pending_command:\n            if pending_command == \"pit\" and current_command != \"pit\":\n                resume_command = current_command\n            current_command = pending_command\n            pending_command = None\n\n        try:\n            advance = advance_to_lap_end_action if skip_to_lap else advance_race_action\n            race_result = advance(session, current_command)\n            last_result = race_result.tick\n        except SimulationError as exc:\n            race_error = str(exc)\n            break\n\n        # Pit is one-shot: once the stop completes at lap end, resume prior pace.\n        if current_command == \"pit\" and last_result is not None and last_result.is_lap_end:\n            current_command = resume_command\n\n        _render_race_screen(state, session, last_result, race_error)\n        race_error = \"\"\n\n        if show_help:\n            # Hold the race so help is readable; the sim only advances when we tick it,\n            # and the next tick's redraw restores the pinned race layout.\n            _show_race_help()\n            terminal.pause(\"Press Enter to resume the race\")\n            show_help = False\n\n        _print_lap_bar(session, current_command, pending_command, speed_mult)\n\n    finished = finish_race_action(state, session)\n    terminal.clear()\n    terminal.header(finished.screen.title, finished.screen.subtitle)\n    terminal.print(_post_race_status_bar(state))\n    _render_post_race_screen(finished.screen)\n    terminal.pause()\n\n\ndef _cycle_speed(current: float) -> float:\n    \"\"\"Step to the next presentation speed, wrapping 8x back to 1x.\"\"\"\n    try:\n        index = _RACE_SPEEDS.index(current)\n    except ValueError:\n        index = 0\n    return _RACE_SPEEDS[(index + 1) % len(_RACE_SPEEDS)]\n\n\ndef _print_lap_bar(session, current_command: str, pending_command: str | None, speed_mult: float = 1.0) -> None:\n    status = f\"next: {pending_command}\" if pending_command else current_command\n    if session.duration_s is not None:\n        # Duration race: the bar tracks elapsed against the time cap, not within-lap position.\n        elapsed = race_clock_elapsed(session)\n        frac = min(elapsed / session.duration_s, 1.0) if session.duration_s else 1.0\n        label = f\"{format_race_clock(elapsed)}/{format_race_clock(session.duration_s)} \u00b7 Lap {session.current_lap}\"\n    else:\n        frac = session.current_sub_tick / session.ticks_per_lap\n        lap = min(session.current_lap + 1, session.total_laps)\n        label = f\"Lap {lap}/{session.total_laps}\"\n    filled = int(frac * 24)\n    bar = \"\u2588\" * filled + \"\u2591\" * (24 - filled)\n    sys.stdout.write(\n        f\"  {label}  [{bar}] {int(frac * 100):3d}%  [{status}]  {speed_mult:g}x\"\n        \"  cmd+Enter  N=next lap  F=faster  X=end\\n\"\n    )\n    sys.stdout.flush()\n\n\ndef _race_log_event_budget(session) -> int:\n    \"\"\"Race-log Event width that keeps the three-column race layout inside the terminal.\n\n    Panel widths are deterministic (rich SIMPLE_HEAVY tables): the strip is the lane grid + 4,\n    standings are the longest car label + 43, and the log adds 10 around the Event column, plus\n    ~5 for inter-column gaps. Everything but the Event text is fixed, so it takes the remainder.\n    Below the floor the log wraps under the other panels \u2014 still pinned, just taller.\n    \"\"\"\n    width = shutil.get_terminal_size((120, 40)).columns\n    strip_w = 2 * len(session.cars) + 3\n    label_w = max((len(car.label) for car in session.cars), default=10)\n    middle_w = max(label_w + 43, 43)\n    return max(16, min(48, width - strip_w - middle_w - 10 - 5))\n\n\ndef _render_race_screen(state: GameState, session, result=None, error: str = \"\") -> None:\n    screen = race_screen(session, result, error, log_event_chars=_race_log_event_budget(session))\n    terminal.clear()\n    terminal.header(screen.title, screen.subtitle)\n    terminal.print(status_bar(state.money, state.week, len(state.garage), \"race\", state.team_xp))\n    terminal.menu(_option_bar(screen.actions) + \"  help\")\n    for message in screen.messages:\n        terminal.print(message)\n    # Pinned three-column layout: track strip | standings + player status | race log. Every\n    # panel is constant-height (see race_screen), so nothing shifts or scrolls between ticks.\n    side_titles = {\"Track\", \"Race Log\"}\n    strip = next((table for table in screen.tables if table.title == \"Track\"), None)\n    race_log = next((table for table in screen.tables if table.title == \"Race Log\"), None)\n    main_tables = [table for table in screen.tables if table.title not in side_titles]\n    groups = [[table] for table in (strip,) if table is not None]\n    groups.append(main_tables)\n    if race_log is not None:\n        groups.append([race_log])\n    if len(groups) == 1:\n        for table in main_tables:\n            terminal.table(table.title, table.headers, table.rows)\n        return\n    terminal.table_columns(\n        *[[(table.title, table.headers, table.rows) for table in group] for group in groups]\n    )\n\n\ndef _render_post_race_screen(screen) -> None:\n    for message in screen.messages:\n        terminal.print(message)\n\n    by_title = {table.title: table for table in screen.tables}\n    standings = by_title.get(\"Final Standings\")\n    if standings is not None:\n        terminal.table(standings.title, standings.headers, standings.rows)\n\n    compact = {title: _compact_post_race_table(table) for title, table in by_title.items()}\n    layout = [\n        (\"Rewards\", \"Team Progress\"),\n        (\"Event Progress\", \"Driver Progress\"),\n        (\"Car Condition\",),\n    ]\n    groups = [[compact[title] for title in titles if title in compact] for titles in layout]\n    groups = [group for group in groups if group]\n    if not groups:\n        return\n    terminal.table_columns(\n        *[[(table.title, table.headers, table.rows) for table in group] for group in groups]\n    )\n\n\ndef _compact_post_race_table(table):\n    rows = [list(row) for row in table.rows]\n    if table.title == \"Rewards\":\n        labels = {\n            \"First Win Bonus\": \"First Win\",\n            \"Event Kind Multiplier\": \"Kind x\",\n            \"Repeat Multiplier\": \"Repeat x\",\n        }\n        rows = [[labels.get(str(row[0]), row[0]), row[1]] for row in rows]\n        return type(table)(table.title, [\"Reward\", \"Value\"], rows)\n    if table.title == \"Team Progress\":\n        labels = {\"Team Level\": \"Level\", \"Team XP\": \"XP\", \"Next Level\": \"Next\"}\n        compact_rows = []\n        for row in rows:\n            label = labels.get(str(row[0]), row[0])\n            before = _short_level(str(row[1]))\n            after = _short_level(str(row[2]))\n            if str(row[0]) == \"Next Level\":\n                if after == \"Max level\":\n                    compact_rows.append([label, after])\n                elif \" XP needed\" in after and after.startswith(\"L\"):\n                    level, needed = after.split(\":\", 1)\n                    needed = needed.strip().replace(\" XP needed\", \" XP\")\n                    compact_rows.append([label, f\"{needed} to {level}\"])\n                else:\n                    compact_rows.append([label, after])\n            else:\n                compact_rows.append([label, f\"{before} -> {after}\"])\n        return type(table)(table.title, [\"Metric\", \"Change\"], compact_rows)\n    if table.title == \"Event Progress\":\n        labels = {\"Best Result\": \"Best\", \"Best Time\": \"Time\"}\n        rows = [[labels.get(str(row[0]), row[0]), row[2]] for row in rows]\n        return type(table)(table.title, [\"Metric\", \"Now\"], rows)\n    if table.title == \"Driver Progress\":\n        compact_rows = []\n        for row in rows:\n            value = str(row[1])\n            if \" XP (total: \" in value and \" +\" in value:\n                driver, xp = value.rsplit(\" +\", 1)\n                gained, total = xp.split(\" XP (total: \", 1)\n                compact_rows.append([_clip_text(driver, 12), f\"+{gained} ({total.rstrip(')')})\"])\n            else:\n                compact_rows.append([row[0], _clip_text(value, 22)])\n        return type(table)(table.title, [\"Driver\", \"XP\"], compact_rows)\n    if table.title == \"Car Condition\":\n        labels = {\"Gearbox\": \"Gear\", \"Suspension\": \"Susp\"}\n        compact_rows = []\n        for row in rows:\n            label = labels.get(str(row[0]), row[0])\n            if str(row[0]) == \"Mileage\":\n                mileage = str(row[2]).replace(\" km\", \"\")\n                delta = str(row[3]).replace(\" km\", \"\")\n                compact_rows.append([label, f\"{mileage} ({delta})\"])\n            else:\n                compact_rows.append([label, f\"{row[2]} ({row[3]})\"])\n        return type(table)(table.title, [\"Area\", \"Now\"], compact_rows)\n    return table\n\n\ndef _post_race_status_bar(state: GameState) -> str:\n    return f\"Money: ${state.money:,}  Week: {state.week}  Garage: {len(state.garage)}  {team_xp_status(state.team_xp)}\"\n\n\ndef _short_level(value: str) -> str:\n    return value.replace(\"Lv \", \"L\")\n\n\ndef _clip_text(value: str, width: int) -> str:\n    if len(value) <= width:\n        return value\n    return value[: max(0, width - 3)] + \"...\"\n\n\ndef _parse_value(value: str) -> object:\n    if value in {\"safe\", \"balanced\", \"hot\", \"qualifying\", \"fuel_save\"}:\n        return value\n    try:\n        if \".\" in value:\n            return float(value)\n        return int(value)\n    except ValueError:\n        return value\n\n\ndef _race_command(raw: str) -> str | None:\n    normalized = raw.lower()\n    for option in race_command_options():\n        if normalized in {option.key.lower(), option.value.lower(), option.label.lower()}:\n            return option.value\n    return None\n\n\ndef _option_bar(options) -> str:\n    labels = []\n    for option in options:\n        if option.label.lower().startswith(option.key.lower()):\n            labels.append(f\"[{option.key}]{option.label[1:]}\")\n        else:\n            labels.append(f\"[{option.key}]{option.label}\")\n    return \"  \".join(labels)\n\n\nif __name__ == \"__main__\":\n    main()\n", "interfaces/menu.py": "from __future__ import annotations\n\nfrom dataclasses import dataclass\n\nfrom game.progression import team_xp_progress\n\n\n@dataclass(frozen=True)\nclass MenuAction:\n    key: str\n    label: str\n    command: str\n\n\nMENU_ACTIONS = [\n    MenuAction(\"G\", \"Garage\", \"garage\"),\n    MenuAction(\"E\", \"Events\", \"events\"),\n    MenuAction(\"D\", \"Drivers\", \"drivers\"),\n    MenuAction(\"M\", \"Market\", \"market\"),\n    MenuAction(\"R\", \"Race\", \"race\"),\n    MenuAction(\"X\", \"Sell\", \"sell\"),\n    MenuAction(\"T\", \"Tune\", \"tune\"),\n    MenuAction(\"P\", \"Repair\", \"repair\"),\n    MenuAction(\"S\", \"Save\", \"save\"),\n    MenuAction(\"L\", \"Load\", \"load\"),\n    MenuAction(\"C\", \"Compendium\", \"compendium\"),\n    MenuAction(\"H\", \"Help\", \"help\"),\n    MenuAction(\"Q\", \"Quit\", \"quit\"),\n]\n\n\ndef menu_bar() -> str:\n    labels: list[str] = []\n    for action in MENU_ACTIONS:\n        if action.label.lower().startswith(action.key.lower()):\n            labels.append(f\"[{action.key}]{action.label[1:]}\")\n        else:\n            labels.append(f\"[{action.key}]{action.label}\")\n    return \"  \".join(labels)\n\n\ndef menu_command(choice: str) -> str | None:\n    normalized = choice.strip().lower()\n    if not normalized:\n        return None\n    for action in MENU_ACTIONS:\n        if normalized == action.key.lower():\n            return action.command\n    return None\n\n\ndef team_xp_status(team_xp: int, width: int = 8) -> str:\n    progress = team_xp_progress(team_xp)\n    if progress.next_level is None:\n        return f\"Team Lv {progress.level} [MAX] {progress.xp} XP\"\n    filled = round(progress.level_fraction * width)\n    bar = \"\u2588\" * filled + \"\u2591\" * (width - filled)\n    return f\"Team Lv {progress.level} [{bar}] {progress.xp}/{progress.next_level_xp} XP\"\n\n\ndef status_bar(money: int, week: int, garage_count: int, screen: str, team_xp: int = 0) -> str:\n    return (\n        f\"Money: ${money:,}  Week: {week}  Garage: {garage_count}  \"\n        f\"{team_xp_status(team_xp)}  Screen: {screen.title()}\"\n    )\n", "interfaces/render_text.py": "from __future__ import annotations\n\nfrom game.effective_stats import class_rating, derived_class, performance_type\nfrom game.event_display import event_best_text, event_requirement_text, team_status_text\nfrom game.game_state import GameState\nfrom game.models import Car, Driver, Event, Part, RaceCarState, RaceSession, Track\nfrom game.sorting import SortSpec, sort_items\n\n\ndef render_garage(game_state: GameState) -> str:\n    if not game_state.garage:\n        return \"Garage is empty.\"\n    return \"\\n\".join(\n        f\"{car.identity.id}: {car.identity.name} ({derived_class(car)}) \"\n        f\"PR {class_rating(car)} {performance_type(car)} condition {car.condition.overall_condition:.0f}%\"\n        for car in game_state.garage\n    )\n\n\ndef render_drivers(drivers: list[Driver]) -> str:\n    return \"\\n\".join(f\"{driver.id}: {driver.name} pace {driver.pace}\" for driver in drivers)\n\n\ndef render_events(events: list[Event]) -> str:\n    return \"\\n\".join(f\"{event.id}: {event.name} entry ${event.entry_fee}\" for event in events)\n\n\ndef render_market(game_state: GameState) -> str:\n    from game.market import list_market_cars\n\n    return \"\\n\".join(\n        f\"{car.identity.id}: {car.identity.name} ${car.value} class {derived_class(car)} \"\n        f\"PR {class_rating(car)} {performance_type(car)}\"\n        for car in list_market_cars()\n    )\n\n\ndef render_parts(parts: list[Part]) -> str:\n    return \"\\n\".join(f\"{part.id}: {part.name} ${part.cost}\" for part in parts)\n\n\ndef render_standings(cars: list[RaceCarState]) -> str:\n    return \"\\n\".join(\n        f\"P{car.position} {car.label:8} +{car.gap_to_leader:.3f} last {car.last_lap_time or 0.0:.3f}\"\n        for car in cars\n    )\n\n\ndef render_race_status(session: RaceSession) -> str:\n    player = next(car for car in session.cars if car.is_player)\n    return (\n        f\"Lap {session.current_lap}/{session.total_laps}\\n\"\n        f\"Tires {player.tire_pct:.0f}% {player.tire_temp:.0f}C | \"\n        f\"Fuel {player.fuel_pct:.0f}% | Engine {player.engine_temp:.0f}C\\n\"\n        f\"Driver energy {player.driver_energy:.0f}% focus {player.driver_focus:.0f}% stress {player.driver_stress:.0f}%\"\n    )\n\n\ndef garage_rows(game_state: GameState, sort_spec: SortSpec | None = None) -> list[list[object]]:\n    cars = sort_items(\"garage\", game_state.garage, sort_spec)\n    return [\n        [\n            index,\n            car.identity.id,\n            car.identity.name,\n            derived_class(car),\n            class_rating(car),\n            performance_type(car),\n            f\"{car.condition.overall_condition:.0f}%\",\n            f\"{car.powertrain.power_hp} hp\",\n        ]\n        for index, car in enumerate(cars, start=1)\n    ]\n\n\ndef driver_rows(drivers: list[Driver], sort_spec: SortSpec | None = None) -> list[list[object]]:\n    sorted_drivers = sort_items(\"drivers\", drivers, sort_spec)\n    return [\n        [\n            index,\n            driver.id,\n            driver.name,\n            driver.pace,\n            driver.consistency,\n            driver.feedback,\n            f\"${driver.salary}\",\n        ]\n        for index, driver in enumerate(sorted_drivers, start=1)\n    ]\n\n\ndef event_rows(\n    events: list[Event],\n    tracks: dict[str, Track],\n    sort_spec: SortSpec | None = None,\n    state: GameState | None = None,\n) -> list[list[object]]:\n    sorted_events = sort_items(\"events\", events, sort_spec)\n    return [\n        [\n            index,\n            event.id,\n            event.name,\n            tracks[event.track_id].name if event.track_id in tracks else event.track_id,\n            event.car_class_limit,\n            event_requirement_text(event),\n            team_status_text(state, event) if state is not None else \"-\",\n            event_best_text(state.event_progress.get(event.id)) if state is not None else \"-\",\n            f\"${event.entry_fee}\",\n            event.opponent_count,\n        ]\n        for index, event in enumerate(sorted_events, start=1)\n    ]\n\n\ndef market_rows(cars: list[Car], sort_spec: SortSpec | None = None) -> list[list[object]]:\n    sorted_cars = sort_items(\"market\", cars, sort_spec)\n    return [\n        [\n            index,\n            car.identity.id,\n            car.identity.name,\n            derived_class(car),\n            class_rating(car),\n            performance_type(car),\n            f\"${car.value}\",\n            f\"{car.powertrain.power_hp} hp\",\n            f\"{car.condition.overall_condition:.0f}%\",\n        ]\n        for index, car in enumerate(sorted_cars, start=1)\n    ]\n\n\ndef standings_rows(cars: list[RaceCarState]) -> list[list[object]]:\n    return [\n        [\n            car.position,\n            car.label,\n            f\"+{car.gap_to_leader:.3f}\",\n            f\"{car.last_lap_time or 0.0:.3f}\",\n            f\"{car.tire_pct:.0f}%\",\n            f\"{car.fuel_pct:.0f}%\",\n        ]\n        for car in cars\n    ]\n", "interfaces/terminal.py": "from __future__ import annotations\n\nfrom dataclasses import dataclass\nimport shutil\nimport sys\nfrom typing import Sequence\n\n\ntry:\n    from rich import box\n    from rich.columns import Columns\n    from rich.console import Console\n    from rich.console import Group\n    from rich.panel import Panel\n    from rich.table import Table\n\n    RICH_AVAILABLE = True\nexcept ImportError:\n    box = None\n    Columns = None\n    Console = None\n    Group = None\n    Panel = None\n    Table = None\n    RICH_AVAILABLE = False\n\n\n@dataclass\nclass Column:\n    header: str\n    values: list[str]\n\n\nclass Terminal:\n    def __init__(self) -> None:\n        self._console = Console() if RICH_AVAILABLE and Console is not None else None\n\n    def print(self, text: object = \"\") -> None:\n        if self._console is not None:\n            self._console.print(text)\n        else:\n            print(text)\n\n    def clear(self) -> None:\n        if not sys.stdout.isatty():\n            return\n        if self._console is not None:\n            self._console.clear()\n        else:\n            print(\"\\033[2J\\033[H\", end=\"\")\n\n    def header(self, title: str, subtitle: str = \"\") -> None:\n        if self._console is not None and Panel is not None:\n            body = subtitle if subtitle else title\n            self._console.print(Panel(body, title=title, border_style=\"cyan\"))\n        else:\n            print(title)\n            if subtitle:\n                print(subtitle)\n\n    def menu(self, text: str) -> None:\n        if self._console is not None and Panel is not None:\n            self._console.print(Panel(text, title=\"Menu\", border_style=\"green\"))\n        else:\n            print()\n            print(text)\n\n    def table(self, title: str, headers: Sequence[str], rows: Sequence[Sequence[object]]) -> None:\n        if self._console is not None and Table is not None and box is not None:\n            self._console.print(self._rich_table(title, headers, rows))\n            return\n        print(\"\\n\".join(self._plain_table_lines(title, headers, rows)))\n\n    def table_columns(\n        self,\n        *groups: Sequence[tuple[str, Sequence[str], Sequence[Sequence[object]]]],\n    ) -> None:\n        \"\"\"Render groups of tables side by side; each group stacks its tables vertically.\"\"\"\n        if (\n            self._console is not None\n            and Columns is not None\n            and Group is not None\n            and Table is not None\n            and box is not None\n        ):\n            # no_wrap: side-by-side panels must keep a constant height, so a cell that\n            # can't fit truncates with an ellipsis instead of wrapping onto extra lines.\n            rendered = [\n                Group(*(self._rich_table(title, headers, rows, no_wrap=True) for title, headers, rows in group))\n                for group in groups\n            ]\n            # Left-packed (no expand): a column growing wider (e.g. a long race-log line)\n            # only extends its own right edge instead of re-spacing the whole row.\n            self._console.print(Columns(rendered, expand=False, equal=False))\n            return\n\n        group_lines: list[list[str]] = []\n        for group in groups:\n            lines: list[str] = []\n            for title, headers, rows in group:\n                if lines:\n                    lines.append(\"\")\n                lines.extend(self._plain_table_lines(title, headers, rows))\n            group_lines.append(lines)\n        widths = [max((len(line) for line in lines), default=0) for lines in group_lines]\n        terminal_width = shutil.get_terminal_size((120, 40)).columns\n        gap = 4\n        if sum(widths) + gap * (len(group_lines) - 1) > terminal_width:\n            print(\"\\n\\n\".join(\"\\n\".join(lines) for lines in group_lines))\n            return\n        height = max(len(lines) for lines in group_lines)\n        combined = []\n        for index in range(height):\n            cells = [\n                (lines[index] if index < len(lines) else \"\").ljust(widths[column])\n                for column, lines in enumerate(group_lines)\n            ]\n            combined.append((\" \" * gap).join(cells).rstrip())\n        print(\"\\n\".join(combined))\n\n    def _rich_table(self, title: str, headers: Sequence[str], rows: Sequence[Sequence[object]], no_wrap: bool = False):\n        table = Table(title=title, box=box.SIMPLE_HEAVY)\n        for header in headers:\n            if no_wrap:\n                table.add_column(header, no_wrap=True, overflow=\"ellipsis\")\n            else:\n                table.add_column(header)\n        for row in rows:\n            table.add_row(*(str(value) for value in row))\n        return table\n\n    def _plain_table_lines(\n        self,\n        title: str,\n        headers: Sequence[str],\n        rows: Sequence[Sequence[object]],\n    ) -> list[str]:\n        lines = [title]\n        if not rows:\n            return lines + [\"  none\"]\n        widths = [len(header) for header in headers]\n        for row in rows:\n            for index, value in enumerate(row):\n                widths[index] = max(widths[index], len(str(value)))\n        header_line = \"  \".join(header.ljust(widths[index]) for index, header in enumerate(headers))\n        lines.append(header_line)\n        lines.append(\"  \".join(\"-\" * width for width in widths))\n        for row in rows:\n            lines.append(\"  \".join(str(value).ljust(widths[index]) for index, value in enumerate(row)))\n        return lines\n\n    def prompt(self, label: str, default: str | None = None) -> str:\n        suffix = f\" [{default}]\" if default is not None else \"\"\n        raw = input(f\"{label}{suffix}: \").strip()\n        return raw if raw else (default or \"\")\n\n    def pause(self, label: str = \"Press Enter\") -> None:\n        if sys.stdin.isatty():\n            input(f\"{label}...\")\n\n\ntermin
