_name[name]\n            rows.append([index, field.label, field.current, _allowed_text(field)])\n            index += 1\n        tables.append(TableData(category, [\"#\", \"Field\", \"Current\", \"Allowed\"], rows))\n    return ScreenData(\n        name=\"tune\",\n        title=\"Tune\",\n        subtitle=car.identity.name,\n        tables=tables,\n        fields=fields,\n    )\n\n\n# --- Creator-style tune editor ------------------------------------------------\n# The tune flow mirrors the creator's car editor: a sections menu opens one group of\n# knobs at a time, edits are STAGED into a draft (dict of field -> value) owned by the\n# UI session, and nothing touches the car until the whole draft is applied atomically.\n\n\ndef tune_editor_screen(state: GameState, car_id: str, draft: dict[str, Any] | None = None) -> ScreenData:\n    \"\"\"Top level of the tune editor: the section list plus the live stat readout.\"\"\"\n    car = _garage_car_or_raise(state, car_id)\n    draft = draft or {}\n    rows = []\n    for index, (category, names) in enumerate(_TUNE_FIELD_GROUPS, start=1):\n        staged = sum(1 for name in names if name in draft)\n        rows.append([index, category, len(names), f\"{staged} staged\" if staged else \"\"])\n    subtitle = car.identity.name\n    if draft:\n        plural = \"s\" if len(draft) != 1 else \"\"\n        subtitle += f\" \u2014 {len(draft)} staged change{plural} (not applied)\"\n    return ScreenData(\n        name=\"tune_editor\",\n        title=\"Tune\",\n        subtitle=subtitle,\n        tables=[TableData(\"Setup Sections\", [\"#\", \"Section\", \"Fields\", \"Staged\"], rows)],\n        messages=_tune_preview_lines(car, draft),\n    )\n\n\ndef tune_section_screen(state: GameState, car_id: str, section: Any, draft: dict[str, Any] | None = None) -> ScreenData:\n    \"\"\"One section's knobs: current value, staged value, allowed domain.\n\n    ``section`` is a 1-based index or a section name (case-insensitive).\"\"\"\n    car = _garage_car_or_raise(state, car_id)\n    draft = draft or {}\n    category, names = _resolve_tune_section(section)\n    fields = [_field_data(name, _tune_current(car, name)) for name in names]\n    rows = []\n    for index, field_data in enumerate(fields, start=1):\n        staged = _format_tune_value(draft[field_data.name]) if field_data.name in draft else \"\"\n        rows.append([index, field_data.label, _format_tune_value(field_data.current), staged, _allowed_text(field_data)])\n    return ScreenData(\n        name=\"tune_section\",\n        title=f\"Tune \u00b7 {category}\",\n        subtitle=car.identity.name,\n        tables=[TableData(category, [\"#\", \"Field\", \"Current\", \"Staged\", \"Allowed\"], rows)],\n        fields=fields,\n        messages=_tune_preview_lines(car, draft),\n    )\n\n\ndef stage_tune_value(state: GameState, car_id: str, field_name: str, value: Any) -> None:\n    \"\"\"Validate one draft value with the same rules the atomic apply enforces.\"\"\"\n    validate_tune_field(state, car_id, field_name, value)\n\n\ndef apply_tune_draft(state: GameState, car_id: str, draft: dict[str, Any]) -> ActionResult:\n    \"\"\"Apply a staged draft to the car in one validated, atomic write.\"\"\"\n    update_tune_fields(state, car_id, **draft)\n    labels = \", \".join(_field_label(name) for name in draft)\n    return ActionResult(state=state, message=f\"Setup applied: {labels}.\", screen=garage_screen(state))\n\n\ndef _garage_car_or_raise(state: GameState, car_id: str):\n    car = next((garage_car for garage_car in state.garage if garage_car.identity.id == car_id), None)\n    if car is None:\n        raise ValueError(f\"Unknown garage car: {car_id}\")\n    return car\n\n\ndef _resolve_tune_section(section: Any) -> tuple[str, list[str]]:\n    token = str(section).strip()\n    if token.isdigit():\n        index = int(token) - 1\n        if 0 <= index < len(_TUNE_FIELD_GROUPS):\n            return _TUNE_FIELD_GROUPS[index]\n    for category, names in _TUNE_FIELD_GROUPS:\n        if token.lower() == category.lower():\n            return category, names\n    valid = \", \".join(category for category, _names in _TUNE_FIELD_GROUPS)\n    raise ValueError(f\"Unknown tune section: {section}. Try: {valid}\")\n\n\ndef _format_tune_value(value: Any) -> Any:\n    return f\"{value:g}\" if isinstance(value, float) else value\n\n\ndef _tune_preview_lines(car, draft: dict[str, Any]) -> list[str]:\n    \"\"\"The creator-style readout with before\u2192after deltas for staged changes.\n\n    Both sides run the same pure effective-stats function; a value renders as a\n    plain number when the draft doesn't move it and as ``cur\u2192new`` when it does.\"\"\"\n    parts = load_parts()\n    current_eff = compute_effective_stats(car, parts)\n    tuned_car = deepcopy(car)\n    for name, value in draft.items():\n        setattr(tune_target(tuned_car, name), name, value)\n    tuned_eff = compute_effective_stats(tuned_car, parts)\n\n    def delta(current: Any, new: Any, fmt: str = \"{:.0f}\") -> str:\n        left, right = fmt.format(current), fmt.format(new)\n        return left if left == right else f\"{left}\u2192{right}\"\n\n    lines = [\n        f\"PR {delta(class_rating(car), class_rating(tuned_car), '{}')}\"\n        f\"  Class {delta(derived_class(car), derived_class(tuned_car), '{}')}\"\n        f\"  ({delta(performance_type(car), performance_type(tuned_car), '{}')})\",\n        f\"power {delta(current_eff.power, tuned_eff.power)}\"\n        f\"  accel {delta(current_eff.acceleration, tuned_eff.acceleration)}\"\n        f\"  top {delta(current_eff.top_speed, tuned_eff.top_speed)}\"\n        f\"  grip {delta(current_eff.grip, tuned_eff.grip)}\"\n        f\"  brake {delta(current_eff.braking, tuned_eff.braking)}\"\n        f\"  handling {delta(current_eff.handling, tuned_eff.handling)}\",\n        f\"aero {delta(current_eff.aero_grip, tuned_eff.aero_grip)}\"\n        f\"  drag {delta(current_eff.drag, tuned_eff.drag)}\"\n        f\"  reliability {delta(current_eff.reliability, tuned_eff.reliability)}\"\n        f\"  weight {delta(current_eff.weight, tuned_eff.weight)}kg\",\n    ]\n    if draft:\n        lines.append(\"(deltas vs the car's applied setup)\")\n    return lines\n\n\ndef tune_fields_for_car(state: GameState, car_id: str) -> list[FieldData]:\n    car = next((garage_car for garage_car in state.garage if garage_car.identity.id == car_id), None)\n    if car is None:\n        raise ValueError(f\"Unknown garage car: {car_id}\")\n    names = [name for _category, group in _TUNE_FIELD_GROUPS for name in group]\n    return [_field_data(name, _tune_current(car, name)) for name in names]\n\n\ndef _tune_current(car, name: str) -> Any:\n    \"\"\"Current value of a tune-menu field, wherever it lives on the car.\"\"\"\n    return getattr(tune_target(car, name), name)\n\n\ndef _field_data(name: str, current: Any) -> FieldData:\n    if name == \"engine_map\":\n        return FieldData(\n            name=name,\n            label=_field_label(name),\n            current=current,\n            value_type=\"choice\",\n            options=[\n                OptionData(value=value, label=_engine_map_label(value), description=_engine_map_desc(value))\n                for value in sorted(ENGINE_MAP_POWER)\n            ],\n            help=_tune_help(name),\n        )\n    if name == \"tire_compound\":\n        return FieldData(\n            name=name,\n            label=_field_label(name),\n            current=current,\n            value_type=\"choice\",\n            options=[\n                OptionData(value=value, label=value.replace(\"_\", \" \").title())\n                for value in TIRE_COMPOUNDS\n            ],\n            help=_tune_help(name),\n        )\n    minimum, maximum = TUNE_FIELD_RANGES.get(name) or CAR_MOD_FIELD_RANGES[name]\n    value_type = \"integer\" if isinstance(current, int) else \"number\"\n    return FieldData(\n        name=name,\n        label=_field_label(name),\n        current=current,\n        value_type=value_type,\n        minimum=minimum,\n        maximum=maximum,\n        help=_tune_help(name),\n    )\n\n\ndef _tune_help(name: str) -> str:\n    \"\"\"Short effect summary for a tune-menu field, from the compendium registry.\"\"\"\n    entry = registry.TUNE_LOOKUP.get(name)\n    return entry.effect_summary if entry else \"\"\n\n\n_TUNE_FIELD_LABELS: dict[str, str] = {\n    \"tire_compound\": \"Tyre Compound\",\n    \"tire_width_front\": \"Tyre Width (F)\",\n    \"tire_width_rear\": \"Tyre Width (R)\",\n    \"base_grip\": \"Base Grip\",\n    \"wet_grip\": \"Wet Grip\",\n    \"tire_wear_resistance\": \"Wear Resistance\",\n    \"tire_heat_resistance\": \"Heat Resistance\",\n    \"tire_warmup\": \"Warmup\",\n    \"braking_power\": \"Braking Power\",\n    \"brake_stability\": \"Brake Stability\",\n    \"brake_cooling\": \"Brake Cooling\",\n    \"brake_fade_resistance\": \"Fade Resistance\",\n    \"weight_distribution_front\": \"Weight Dist (F)\",\n    \"center_of_gravity\": \"Centre of Gravity\",\n    \"chassis_rigidity\": \"Chassis Rigidity\",\n    \"stability\": \"Stability\",\n    \"rotation\": \"Rotation\",\n    \"handling\": \"Handling\",\n    \"mechanical_grip\": \"Mechanical Grip\",\n    \"suspension_compliance\": \"Compliance\",\n    \"curb_handling\": \"Curb Handling\",\n    \"bump_absorption\": \"Bump Absorption\",\n    \"steering_precision\": \"Steering Precision\",\n    \"downforce\": \"Downforce (Base)\",\n    \"drag\": \"Drag\",\n    \"aero_efficiency\": \"Aero Efficiency\",\n    \"high_speed_stability\": \"High-Speed Stability\",\n    \"fuel_efficiency\": \"Fuel Efficiency\",\n    \"tire_pressure_front\": \"Tyre Pressure (F)\",\n    \"tire_pressure_rear\": \"Tyre Pressure (R)\",\n    \"camber_front\": \"Camber (F)\",\n    \"camber_rear\": \"Camber (R)\",\n    \"toe_front\": \"Toe (F)\",\n    \"toe_rear\": \"Toe (R)\",\n    \"final_drive\": \"Final Drive\",\n    \"gear_bias\": \"Gear Bias\",\n    \"differential_power\": \"Diff Power\",\n    \"differential_coast\": \"Diff Coast\",\n    \"differential_preload\": \"Diff Preload\",\n    \"engine_map\": \"Engine Map\",\n    \"brake_bias\": \"Brake Bias\",\n    \"brake_pressure\": \"Brake Pressure\",\n    \"front_ride_height\": \"Ride Height (F)\",\n    \"rear_ride_height\": \"Ride Height (R)\",\n    \"suspension_stiffness_front\": \"Stiffness (F)\",\n    \"suspension_stiffness_rear\": \"Stiffness (R)\",\n    \"antiroll_front\": \"Anti-Roll (F)\",\n    \"antiroll_rear\": \"Anti-Roll (R)\",\n    \"front_downforce\": \"Downforce (F)\",\n    \"rear_downforce\": \"Downforce (R)\",\n}\n\n\ndef _field_label(name: str) -> str:\n    return _TUNE_FIELD_LABELS.get(name, name.replace(\"_\", \" \").title())\n\n\ndef _engine_map_label(value: str) -> str:\n    labels = {\n        \"balanced\": \"Balanced\",\n        \"fuel_save\": \"Fuel Save\",\n        \"hot\": \"Hot\",\n        \"qualifying\": \"Qualifying\",\n        \"safe\": \"Safe\",\n    }\n    return labels.get(value, value.replace(\"_\", \" \").title())\n\n\ndef _engine_map_desc(value: str) -> str:\n    # Plain-language summary of each map's power / fuel / heat trade-off (see ENGINE_MAP_*).\n    descriptions = {\n        \"fuel_save\": \"Lowest power, best fuel economy, runs coolest.\",\n        \"safe\": \"A little less power; easier on fuel and temps.\",\n        \"balanced\": \"Stock map \u2014 no power, fuel, or heat trade-offs.\",\n        \"hot\": \"More power, but burns more fuel and runs hotter.\",\n        \"qualifying\": \"Most power for short stints; very thirsty and very hot.\",\n    }\n    return descriptions.get(value, \"\")\n\n\ndef _allowed_text(field: FieldData) -> str:\n    if field.options:\n        return \", \".join(option.label for option in field.options)\n    return f\"{field.minimum:g}-{field.maximum:g}\"\n\n\ndef _gauge_bar(value: float, max_val: float = 100.0, width: int = 16) -> str:\n    filled = round(max(0.0, min(value / max_val, 1.0)) * width)\n    return \"\u2588\" * filled + \"\u2591\" * (width - filled)\n\n\ndef format_race_clock(seconds: float) -> str:\n    \"\"\"Race elapsed/target as H:MM:SS (or M:SS under an hour).\"\"\"\n    seconds = max(0, int(round(seconds)))\n    hours, rem = divmod(seconds, 3600)\n    minutes, secs = divmod(rem, 60)\n    if hours:\n        return f\"{hours}:{minutes:02d}:{secs:02d}\"\n    return f\"{minutes}:{secs:02d}\"\n\n\ndef estimate_race_times(car, driver, event, track, parts=None) -> tuple[float, float]:\n    \"\"\"Nominal (canonical_seconds, play_seconds) for ``car``/``driver`` on this event.\n\n    Canonical is the real race clock: deterministic lap time (no wear, no random variance) times\n    the lap count, or the duration cap for time races. Play is what the player actually watches,\n    canonical compressed by PRESENTATION_SPEED_FACTOR. The car's pace shapes the canonical figure,\n    so a faster car shows a shorter race -- \"your car vs this event\", not a fixed track number.\n    \"\"\"\n    parts = load_parts() if parts is None else parts\n    race_format = resolve_race(event, track)\n    if race_format.laps is not None:\n        effective = compute_effective_stats(car, parts)\n        lap_time = calculate_lap_time(effective, track, driver, state=None, rng=None)\n        canonical_s = lap_time * race_format.laps\n    else:\n        canonical_s = float(race_format.duration_s)\n    play_s = canonical_s / PRESENTATION_SPEED_FACTOR if PRESENTATION_SPEED_FACTOR else canonical_s\n    return canonical_s, play_s\n\n\ndef _estimate_entry(state: GameState, event, track):\n    \"\"\"Pick a representative (car, driver) to estimate an event's times for the player.\n\n    Prefers the player's best-rated garage car that is actually eligible for the event; falls back\n    to their best car overall, then to the sample catalog. Returns (car, driver, eligible) or None\n    when nothing is available to estimate with.\n    \"\"\"\n    from game.opponents import validate_event_entry\n\n    parts = load_parts()\n    garage = list(state.garage)\n    if garage:\n        ranked = sorted(garage, key=lambda car: class_rating(car, parts), reverse=True)\n        eligible = None\n        for car in ranked:\n            try:\n                validate_event_entry(car, event, parts)\n            except Exception:\n                continue\n            eligible = car\n            break\n        car = eligible or ranked[0]\n        is_eligible = eligible is not None\n    else:\n        catalog = load_cars()\n        if not catalog:\n            return None\n        car = max(catalog, key=lambda c: class_rating(c, parts))\n        is_eligible = False\n    drivers = state.hired_drivers or load_drivers()\n    if not drivers:\n        return None\n    return car, drivers[0], is_eligible\n\n\ndef race_clock_elapsed(session: \"RaceSession\") -> float:\n    \"\"\"The duration-race clock: the leader's (front-runner's) elapsed seconds.\"\"\"\n    return min((state.total_time for state in session.cars), default=0.0)\n\n\n_RACE_LOG_VISIBLE_EVENTS = 10\n# Fallback Event-column width when the caller passes no terminal-size budget; capping it keeps\n# the pinned race layout from outgrowing the terminal and wrapping.\n_RACE_LOG_EVENT_CHARS = 38\n_RACE_STRIP_ROWS = 14\n\n\ndef _clip(text: str, limit: int) -> str:\n    return text if len(text) <= limit else text[: limit - 1] + \"\u2026\"\n\n\ndef _nominal_lap_seconds(session: RaceSession) -> float:\n    \"\"\"Recover the player's nominal lap pace from the tick density set at race start.\n\n    enter_event picks ticks_per_lap = nominal_lap_s / PRESENTATION_SPEED_FACTOR * TICK_RATE_HZ,\n    so inverting it avoids recomputing effective stats every render (exact up to clamping).\n    \"\"\"\n    return max(1.0, session.ticks_per_lap * PRESENTATION_SPEED_FACTOR / TICK_RATE_HZ)\n\n\ndef _lane_tags(cars) -> list[str]:\n    tags = []\n    rival = 0\n    for car in cars:\n        if car.is_player:\n            tags.append(\"Y\")\n        else:\n            rival += 1\n            tags.append(str(rival) if rival < 10 else chr(ord(\"a\") + rival - 10))\n    return tags\n\n\n# Real gaps are tiny next to a lap (4 s on an 80 s lap is under one strip row), so the strip\n# magnifies them for the eye; the passes in _strip_cells then guarantee unequal times never\n# share a row and a slower car never shows above a faster one.\n_RACE_STRIP_GAP_ZOOM = 4.0\n\n\ndef _strip_cells(session: RaceSession) -> list[int | None]:\n    \"\"\"Strip row per grid slot (0 = start line, rows-1 = flag); None for a DNF lane.\n\n    Each car's gap to the leader converts to a magnified lap-fraction deficit behind the shared\n    lap position, clamped at the start line rather than wrapped (a wrapped straggler would read\n    as leading). Two passes resolve collisions while keeping the standings order: bottom-up,\n    each strictly-faster car is raised at least one row above the slower one below it (true\n    dead heats share a row); top-down, the chain is capped back under the flag.\n    \"\"\"\n    lap_frac = session.current_sub_tick / session.ticks_per_lap if session.ticks_per_lap else 0.0\n    nominal = _nominal_lap_seconds(session)\n    cells: list[int | None] = [None] * len(session.cars)\n    active = [(index, car) for index, car in enumerate(session.cars) if not car.is_dnf]\n    if not active:\n        return cells\n    leader_time = min(car.total_time for _, car in active)\n    ordered = sorted(active, key=lambda item: item[1].total_time, reverse=True)  # slowest first\n    raised: list[int] = []\n    ties: list[bool] = []  # ties[i]: ordered[i] dead-heats ordered[i - 1] (the car below it)\n    prev_cell: int | None = None\n    prev_time: float | None = None\n    for _, car in ordered:\n        deficit = (car.total_time - leader_time) / nominal * _RACE_STRIP_GAP_ZOOM\n        cell = int(max(lap_frac - deficit, 0.0) * _RACE_STRIP_ROWS)\n        tie = prev_time is not None and car.total_time == prev_time\n        if prev_cell is not None:\n            cell = prev_cell if tie else max(cell, prev_cell + 1)\n        raised.append(cell)\n        ties.append(tie)\n        prev_cell, prev_time = cell, car.total_time\n    limit = _RACE_STRIP_ROWS - 1\n    for pos in reversed(range(len(ordered))):\n        raised[pos] = min(raised[pos], limit)\n        limit = raised[pos] if pos > 0 and ties[pos] else raised[pos] - 1\n    for (index, _), cell in zip(ordered, raised):\n        cells[index] = max(cell, 0)  # >rows-sized grids saturate at the start line\n    return cells\n\n\ndef _race_track_strip(session: RaceSession) -> TableData:\n    \"\"\"Vertical mini-map of the field: one lane per grid slot, dots climb to the flag each lap.\n\n    The lockstep sim keeps every car at the same track position within a tick, so lanes separate\n    by *time* via _strip_cells (magnified gaps, collision cascade). Lanes stay in grid order so\n    they never shuffle; standings are the authority on positions and true gaps.\n    \"\"\"\n    lanes = session.cars\n    grid = [[\"\u00b7\"] * len(lanes) for _ in range(_RACE_STRIP_ROWS)]\n    for index, (car, cell) in enumerate(zip(lanes, _strip_cells(session))):\n        if cell is None:\n            grid[_RACE_STRIP_ROWS - 1][index] = \"x\"\n            continue\n        grid[_RACE_STRIP_ROWS - 1 - cell][index] = \"\u25cf\" if car.is_player else \"\u25cb\"\n    width = 2 * len(lanes) - 1\n    rows = [[\"\u2550\" * width]]\n    rows.extend([\" \".join(row)] for row in grid)\n    rows.append([\" \".join(_lane_tags(lanes))])\n    rows.append([\"\u25cf you \u25cb rival\"])\n    return TableData(\"Track\", [\"\"], rows)\n\n\ndef _standings_table(session: RaceSession, tick: RaceTickResult | None) -> TableData:\n    \"\"\"Standings pinned to a constant height: running cars ranked, DNFs listed below them.\"\"\"\n    if tick is not None:\n        running = list(tick.standings)\n    else:\n        running = sorted((car for car in session.cars if not car.is_dnf), key=lambda car: car.total_time)\n    rows = [\n        [\n            car.position if tick is not None else index,\n            car.label,\n            f\"{car.gap_to_leader:+7.3f}\",\n            f\"{car.last_lap_time or 0.0:7.3f}\",\n            f\"{car.tire_pct:3.0f}%\",\n            f\"{car.fuel_pct:3.0f}%\",\n        ]\n        for index, car in enumerate(running, start=1)\n    ]\n    rows.extend([\"-\", car.label, \"DNF\", \"-\", \"-\", \"-\"] for car in session.cars if car.is_dnf)\n    return TableData(\"Standings\", [\"P\", \"Car\", \"Gap\", \"Last\", \"Tires\", \"Fuel\"], rows)\n\n\ndef _final_standings_table(session: RaceSession) -> TableData:\n    running = sorted((car for car in session.cars if not car.is_dnf), key=lambda car: car.position)\n    rows = [\n        [\n            car.position,\n            car.label,\n            format_race_clock(car.total_time),\n            f\"{car.gap_to_leader:+.3f}\",\n            f\"{car.last_lap_time or 0.0:.3f}\",\n            \"Finished\",\n        ]\n        for car in running\n    ]\n    rows.extend([\"-\", car.label, \"DNF\", \"-\", \"-\", \"DNF\"] for car in session.cars if car.is_dnf)\n    return TableData(\"Final Standings\", [\"P\", \"Car\", \"Total\", \"Gap\", \"Last\", \"Status\"], rows)\n\n\ndef race_screen(\n    session: RaceSession,\n    tick: RaceTickResult | None = None,\n    error: str = \"\",\n    log_event_chars: int | None = None,\n) -> ScreenData:\n    # Every element renders every tick at a constant size (standings, log, and the one-line\n    # status below are padded/pinned), so the redrawn screen never jumps or scrolls. The log's\n    # Event column is space-padded to log_event_chars (the UI passes a terminal-width budget)\n    # so the panel is full width from tick 0 instead of widening when the first event lands.\n    player = next(car for car in session.cars if car.is_player)\n    if error:\n        status = f\"Race command error: {error}\"\n    elif tick is None:\n        status = \"Awaiting race command.\"\n    else:\n        status = \"\"\n    messages = [status]\n    tables = [_standings_table(session, tick)]\n    tables.append(\n        TableData(\n            \"Player Status\",\n            [\"\", \"\"],\n            [\n                [\"Tires\",  f\"[{_gauge_bar(player.tire_pct)}]  {player.tire_pct:3.0f}%  {player.tire_temp:.0f}\u00b0C\"],\n                [\"Fuel\",   f\"[{_gauge_bar(player.fuel_pct)}]  {player.fuel_pct:3.0f}%\"],\n                [\"Engine\", f\"[{_gauge_bar(player.engine_temp, ENGINE_CRITICAL_C)}]  {player.engine_temp:.0f}\u00b0C\"],\n                [\"Energy\", f\"[{_gauge_bar(player.driver_energy)}]  {player.driver_energy:3.0f}%\"],\n                [\"Focus\",  f\"[{_gauge_bar(player.driver_focus)}]  {player.driver_focus:3.0f}%\"],\n                [\"Stress\", f\"[{_gauge_bar(player.driver_stress)}]  {player.driver_stress:3.0f}%\"],\n                [\"Weather\", session.weather],\n            ],\n        )\n    )\n    tables.append(_race_track_strip(session))\n    event_chars = log_event_chars or _RACE_LOG_EVENT_CHARS\n    log_rows: list[list[Any]] = [\n        [lap, _clip(message, event_chars).ljust(event_chars)]\n        for lap, message in session.race_log[-_RACE_LOG_VISIBLE_EVENTS:]\n    ]\n    log_rows.extend([[\"\", \" \" * event_chars]] * (_RACE_LOG_VISIBLE_EVENTS - len(log_rows)))\n    tables.append(TableData(\"Race Log\", [\"Lap\", \"Event\"], log_rows))\n    if session.duration_s is not None:\n        # Duration race: the canonical clock is the readout, not a lap target. Lap count is\n        # still shown (it climbs as the field circulates) but elapsed/target time leads.\n        lap_part = (\n            f\"{format_race_clock(race_clock_elapsed(session))} / {format_race_clock(session.duration_s)}\"\n            f\" \u00b7 Lap {session.current_lap}\"\n        )\n    else:\n        lap_part = f\"Lap {session.current_lap}/{session.total_laps}\"\n    subtitle = lap_part + (\n        f\" \u00b7 S{session.current_sub_tick}/{session.ticks_per_lap}\" if session.ticks_per_lap > 1 else \"\"\n    )\n    return ScreenData(\n        name=\"race\",\n        title=\"Race\",\n        subtitle=subtitle,\n        tables=tables,\n        messages=messages,\n        actions=race_command_options(),\n    )\n\n\ndef post_race_screen(session: RaceSession, result) -> ScreenData:\n    messages = [f\"Race finished. Prize: ${result.prize_money}\"]\n    tables = [\n        _final_standings_table(session),\n        _rewards_table(result),\n        _team_progress_table(result),\n        _event_progress_delta_table(result),\n        _driver_progress_table(result),\n        _car_condition_table(result),\n    ]\n    return ScreenData(\n        name=\"post_race\",\n        title=\"Post Race\",\n        subtitle=session.event.name if session.event is not None else session.event_id,\n        tables=tables,\n        messages=messages,\n    )\n\n\ndef _rewards_table(result) -> TableData:\n    rows: list[list[object]] = [[\"Prize\", f\"${result.prize_money}\"]]\n    award = result.team_xp_award\n    if award is not None:\n        rows.extend([\n            [\"Team XP\", f\"+{award.total_xp}\"],\n            [\"Result XP\", f\"+{award.result_xp}\"],\n            [\"First Win Bonus\", f\"+{award.first_win_bonus}\" if award.first_win_bonus else \"-\"],\n            [\"Event Kind Multiplier\", f\"{award.event_kind_multiplier:.2f}x\"],\n            [\"Repeat Multiplier\", f\"{award.repeat_multiplier:.2f}x\"],\n        ])\n    return TableData(\"Rewards\", [\"Reward\", \"Value\"], rows)\n\n\ndef _team_progress_table(result) -> TableData:\n    before = team_xp_progress(result.team_xp_before)\n    after = team_xp_progress(result.team_xp_after)\n    if after.next_level is None:\n        next_text = \"Max level\"\n    else:\n        next_text = f\"Lv {after.next_level}: {after.xp_needed_for_next} XP needed\"\n    return TableData(\n        \"Team Progress\",\n        [\"Metric\", \"Before\", \"After\"],\n        [\n            [\"Team Level\", f\"Lv {before.level}\", f\"Lv {after.level}\"],\n            [\"Team XP\", before.xp, after.xp],\n            [\"Next Level\", \"-\", next_text],\n        ],\n    )\n\n\ndef _event_progress_delta_table(result) -> TableData:\n    before = result.event_progress_before\n    after = result.event_progress_after\n    return TableData(\n        \"Event Progress\",\n        [\"Metric\", \"Before\", \"After\"],\n        [\n            [\"Starts\", before.get(\"starts\", 0), after.get(\"starts\", 0)],\n            [\"Best Result\", event_best_text(before), event_best_text(after)],\n            [\"Wins\", before.get(\"wins\", 0), after.get(\"wins\", 0)],\n            [\"Podiums\", before.get(\"podiums\", 0), after.get(\"podiums\", 0)],\n            [\"Best Time\", _best_time_text(before.get(\"best_time_s\")), _best_time_text(after.get(\"best_time_s\"))],\n        ],\n    )\n\n\ndef _driver_progress_table(result) -> TableData:\n    message = result.driver_progression_message or \"No driver progression.\"\n    return TableData(\"Driver Progress\", [\"Metric\", \"Value\"], [[\"Driver\", message]])\n\n\ndef _car_condition_table(result) -> TableData:\n    before = result.car_condition_before\n    after = result.car_condition_after\n    if before is None or after is None:\n        return TableData(\"Car Condition\", [\"Area\", \"Before\", \"After\", \"Change\"], [[\"Condition\", \"-\", \"-\", \"-\"]])\n    specs = [\n        (\"Overall\", \"overall_condition\", \"{:.0f}%\"),\n        (\"Engine\", \"engine_condition\", \"{:.0f}%\"),\n        (\"Gearbox\", \"gearbox_condition\", \"{:.0f}%\"),\n        (\"Suspension\", \"suspension_condition\", \"{:.0f}%\"),\n        (\"Brakes\", \"brake_condition\", \"{:.0f}%\"),\n        (\"Body\", \"body_condition\", \"{:.0f}%\"),\n        (\"Tires\", \"tire_condition\", \"{:.0f}%\"),\n        (\"Mileage\", \"mileage\", \"{:,.0f} km\"),\n    ]\n    rows = []\n    for label, field_name, fmt in specs:\n        old = getattr(before, field_name)\n        new = getattr(after, field_name)\n        rows.append([label, fmt.format(old), fmt.format(new), _condition_delta(old, new, \" km\" if field_name == \"mileage\" else \"%\")])\n    return TableData(\"Car Condition\", [\"Area\", \"Before\", \"After\", \"Change\"], rows)\n\n\ndef _best_time_text(value) -> str:\n    return f\"{value:.1f}s\" if value is not None else \"-\"\n\n\ndef _condition_delta(before: float, after: float, suffix: str) -> str:\n    delta = after - before\n    sign = \"+\" if delta > 0 else \"\"\n    if suffix == \" km\":\n        return f\"{sign}{delta:,.0f}{suffix}\"\n    return f\"{sign}{delta:.0f}{suffix}\"\n\n\ndef race_command_options() -> list[OptionData]:\n    return [\n        OptionData(\"normal\", \"Normal\", \"N\", \"Balanced race pace\"),\n        OptionData(\"push\", \"Push\", \"P\", \"Lean on it: faster, more wear/heat/risk\"),\n        OptionData(\"go_all_out\", \"Go All Out\", \"O\", \"Max pace, heavy wear/heat, crash risk\"),\n        OptionData(\"save_tyres\", \"Save Tyres\", \"T\", \"Ease off to save and cool tyres\"),\n        OptionData(\"save_fuel\", \"Save Fuel\", \"F\", \"Short-shift to save fuel and cool the engine\"),\n        OptionData(\"cool_down\", \"Cool Down\", \"C\", \"Back right off, cool engine and tyres\"),\n        OptionData(\"pit\", \"Pit\", \"I\", \"Pit once: lose pit time, restore tyres and fuel\"),\n    ]\n\n\ndef hire_driver_action(state: GameState, driver_id: str) -> ActionResult:\n    hire_driver(state, driver_id)\n    driver = next(d for d in state.hired_drivers if d.id == driver_id)\n    return ActionResult(state=state, message=f\"Hired {driver.name}.\", screen=drivers_screen(state))\n\n\ndef fire_driver_action(state: GameState, driver_id: str) -> ActionResult:\n    driver = next((d for d in state.hired_drivers if d.id == driver_id), None)\n    name = driver.name if driver else driver_id\n    fire_driver(state, driver_id)\n    return ActionResult(state=state, message=f\"Released {name}.\", screen=drivers_screen(state))\n\n\ndef buy_car_action(state: GameState, car_id: str) -> ActionResult:\n    buy_car(state, car_id)\n    return ActionResult(state=state, message=f\"Bought {car_id}.\", screen=garage_screen(state))\n\n\ndef sell_car_action(state: GameState, car_id: str) -> ActionResult:\n    sell_car(state, car_id)\n    return ActionResult(state=state, message=f\"Sold {car_id}.\", screen=garage_screen(state))\n\n\ndef repair_car_action(state: GameState, car_id: str) -> ActionResult:\n    repair_car(state, car_id)\n    return ActionResult(state=state, message=f\"Repaired {car_id}.\", screen=garage_screen(state))\n\n\ndef tune_car_action(state: GameState, car_id: str, field_name: str, value: Any) -> ActionResult:\n    update_tune_fields(state, car_id, **{field_name: value})\n    return ActionResult(state=state, message=f\"Updated {field_name}.\", screen=garage_screen(state))\n\n\ndef save_game_action(state: GameState, path: str | Path = \"saves/save1.json\") -> ActionResult:\n    save_game(state, Path(path))\n    return ActionResult(state=state, message=\"Saved.\")\n\n\ndef load_game_action(path: str | Path = \"saves/save1.json\") -> ActionResult:\n    state = load_game(Path(path))\n    return ActionResult(state=state, message=\"Loaded.\", screen=garage_screen(state))\n\n\ndef start_race_action(state: GameState, event_id: str, car_id: str, driver_id: str, seed: int | None = None) -> RaceActionResult:\n    if seed is None:\n        seed = random.randrange(1, 1_000_000)\n    session = enter_event(state, event_id, car_id, driver_id, seed=seed)\n    return RaceActionResult(session=session, screen=race_screen(session))\n\n\ndef advance_race_action(session: RaceSession, command: str) -> RaceActionResult:\n    tick = apply_player_command(session, command)\n    return RaceActionResult(session=session, tick=tick, screen=race_screen(session, tick))\n\n\ndef simulate_to_end_action(session: RaceSession, command: str = \"normal\") -> RaceActionResult:\n    \"\"\"Advance all remaining ticks instantly with the given command; return final state.\"\"\"\n    last_tick: RaceTickResult | None = None\n    while not session.is_finished:\n        result = advance_race_action(session, command)\n        last_tick = result.tick\n        if command == \"pit\" and last_tick is not None and last_tick.is_lap_end:\n            # Pit is one-shot: re-issuing it every tick would dive into the pits every\n            # lap. After the stop, resume normal running (the CLI resumes the prior\n            # command; the action layer defaults to normal).\n            command = \"normal\"\n    screen = race_screen(session, last_tick)\n    return RaceActionResult(session=session, tick=last_tick, screen=screen)\n\n\ndef advance_to_lap_end_action(session: RaceSession, command: str = \"normal\") -> RaceActionResult:\n    \"\"\"Advance at full speed until the current lap completes (or the race ends).\n\n    Pure presentation fast-forward: it runs exactly the ticks the live loop would, just\n    without the per-tick wall-clock pause, so the outcome is identical to watching the lap\n    tick by tick. Lets a long/duration event skip lap-by-lap instead of being hand-ticked.\n    \"\"\"\n    last_tick: RaceTickResult | None = None\n    while not session.is_finished:\n        result = advance_race_action(session, command)\n        last_tick = result.tick\n        if last_tick is not None and last_tick.is_lap_end:\n            break\n    screen = race_screen(session, last_tick)\n    return RaceActionResult(session=session, tick=last_tick, screen=screen)\n\n\ndef finish_race_action(state: GameState, session: RaceSession) -> RaceActionResult:\n    result = finish_event(state, session)\n    screen = post_race_screen(session, result)\n    return RaceActionResult(session=session, screen=screen, prize_money=result.prize_money)\n", "game/economy.py": "from __future__ import annotations\n\nfrom copy import deepcopy\n\nfrom constants import (\n    PERCENT_MAX,\n    REPAIR_COST_PER_POINT,\n    REPAIR_MAX_POINTS,\n    SELL_CONDITION_WEIGHT,\n    SELL_MILEAGE_FLOOR,\n    SELL_MILEAGE_FULL_KM,\n    SELL_VALUE_FACTOR,\n)\nfrom game.game_state import GameState\nfrom game.loader import load_cars, load_drivers\nfrom game.market import list_market_cars\n\n\nclass EconomyError(ValueError):\n    \"\"\"Raised when an economy operation cannot be completed.\"\"\"\n\n\ndef buy_car(game_state: GameState, market_car_id: str) -> GameState:\n    market = {car.identity.id: car for car in list_market_cars()}\n    if market_car_id not in market:\n        raise EconomyError(f\"Unknown market car: {market_car_id}\")\n    car = market[market_car_id]\n    if game_state.money < car.value:\n        raise EconomyError(f\"Insufficient funds for {car.identity.name}\")\n    game_state.money -= car.value\n    game_state.garage.append(deepcopy(car))\n    return game_state\n\n\ndef sell_car(game_state: GameState, car_id: str) -> GameState:\n    car = _garage_car(game_state, car_id)\n    sale_price = round(car.value * SELL_VALUE_FACTOR * _resale_factor(car))\n    game_state.money += sale_price\n    game_state.garage.remove(car)\n    return game_state\n\n\ndef _resale_factor(car) -> float:\n    \"\"\"Condition and mileage depreciate resale: a clean low-miler sells near the full\n    sell factor, a thrashed high-miler well below it. Racing (which wears condition and\n    adds mileage) now has a real cost on the way out of the garage.\"\"\"\n    condition = 1.0 - SELL_CONDITION_WEIGHT * (1.0 - car.condition.overall_condition / PERCENT_MAX)\n    mileage = max(\n        SELL_MILEAGE_FLOOR,\n        1.0 - car.condition.mileage / SELL_MILEAGE_FULL_KM * (1.0 - SELL_MILEAGE_FLOOR),\n    )\n    return condition * mileage\n\n\ndef repair_car(game_state: GameState, car_id: str, points: float = REPAIR_MAX_POINTS) -> GameState:\n    car = _garage_car(game_state, car_id)\n    fields = [\n        \"overall_condition\",\n        \"engine_condition\",\n        \"brake_condition\",\n        \"suspension_condition\",\n        \"tire_condition\",\n    ]\n    restorations = {\n        field: min(points, PERCENT_MAX - getattr(car.condition, field))\n        for field in fields\n    }\n    total_points = sum(restorations.values())\n    cost = round(total_points * REPAIR_COST_PER_POINT)\n    if game_state.money < cost:\n        raise EconomyError(f\"Insufficient funds for repair: {cost}\")\n    game_state.money -= cost\n    for field, restored in restorations.items():\n        setattr(car.condition, field, getattr(car.condition, field) + restored)\n    return game_state\n\n\ndef hire_driver(game_state: GameState, driver_id: str) -> GameState:\n    pool = {driver.id: driver for driver in load_drivers()}\n    if driver_id not in pool:\n        raise EconomyError(f\"Unknown driver: {driver_id}\")\n    if any(d.id == driver_id for d in game_state.hired_drivers):\n        raise EconomyError(f\"{pool[driver_id].name} is already on your team\")\n    driver = pool[driver_id]\n    if game_state.money < driver.salary:\n        raise EconomyError(f\"Insufficient funds to hire {driver.name} (salary: ${driver.salary})\")\n    game_state.money -= driver.salary\n    game_state.hired_drivers.append(deepcopy(driver))\n    return game_state\n\n\ndef fire_driver(game_state: GameState, driver_id: str) -> GameState:\n    driver = next((d for d in game_state.hired_drivers if d.id == driver_id), None)\n    if driver is None:\n        raise EconomyError(f\"Driver {driver_id} is not on your team\")\n    game_state.hired_drivers.remove(driver)\n    return game_state\n\n\ndef _garage_car(game_state: GameState, car_id: str):\n    car = next((garage_car for garage_car in game_state.garage if garage_car.identity.id == car_id), None)\n    if car is None:\n        raise EconomyError(f\"Unknown garage car: {car_id}\")\n    return car\n", "game/effective_stats.py": "from __future__ import annotations\n\nimport math\nfrom copy import deepcopy\n\nimport constants as C\nfrom constants import (\n    BRAKE_BIAS_IDEAL,\n    BRAKE_BIAS_PENALTY,\n    CAMBER_IDEAL_DEG,\n    CAMBER_PENALTY,\n    CLASS_RATING_SCALE,\n    CLASS_THRESHOLDS,\n    COOLING_HEAT_REDUCTION,\n    DOWNFORCE_DRAG_PENALTY,\n    ENGINE_MAP_FUEL,\n    ENGINE_MAP_HEAT,\n    ENGINE_MAP_POWER,\n    FINAL_DRIVE_ACCEL_FACTOR,\n    FINAL_DRIVE_IDEAL,\n    FINAL_DRIVE_SPEED_FACTOR,\n    MIN_CONDITION_FACTOR,\n    NORM_ACCEL_REF_HW,\n    NORM_AERO_MAX,\n    NORM_POWER_REF_HP,\n    NORM_SPEED_REF_KMH,\n    NORM_TORQUE_REF_NM,\n    ORPHAN_FACTOR_CEIL,\n    ORPHAN_FACTOR_FLOOR,\n    PERCENT_MAX,\n    PERCENT_MIN,\n    PRESSURE_IDEAL_BAR,\n    PRESSURE_PENALTY,\n    RIDE_HEIGHT_IDEAL_MM,\n    RIDE_HEIGHT_PENALTY,\n    STRESS_RELIABILITY_PENALTY,\n    TOP_SPEED_COEFF,\n    WEIGHT_REFERENCE_KG,\n)\nfrom game.loader import load_parts\nfrom game.models import Car, EffectiveCarStats, Part, TuneSetup\n\n\ndef clamp(value: float, low: float = PERCENT_MIN, high: float = PERCENT_MAX) -> float:\n    return max(low, min(high, value))\n\n\ndef _pace(value: float) -> float:\n    \"\"\"Soft-knee transform for a performance axis that feeds the pace composite.\n\n    Identity at/below the knee (ordinary cars and the reference car are unchanged), then\n    a logarithmic compression above it: more performance always helps with diminishing\n    returns and there is no ceiling, so future upgrade parts never wall out. Lower bound\n    stays at zero.\n    \"\"\"\n    value = max(0.0, value)\n    if value <= C.PACE_SOFT_KNEE:\n        return value\n    return C.PACE_SOFT_KNEE + C.PACE_SOFT_SOFTNESS * math.log1p((value - C.PACE_SOFT_KNEE) / C.PACE_SOFT_SOFTNESS)\n\n\ndef _centered_factor(value: float, reference: float, per_unit: float) -> float:\n    \"\"\"A multiplier that is 1.0 at ``reference`` and scales ``per_unit`` per point of\n    deviation. Used to fold a stat into an effective axis without shifting the catalog\n    baseline (a reference-valued car is unaffected).\"\"\"\n    return 1.0 + (value - reference) * per_unit\n\n\ndef _combine_factor(*factors: float) -> float:\n    \"\"\"Multiply per-stat factors and clamp the product to the orphan swing band, so a\n    single axis stacking several folded stats still moves only a few percent.\"\"\"\n    product = 1.0\n    for factor in factors:\n        product *= factor\n    return max(ORPHAN_FACTOR_FLOOR, min(ORPHAN_FACTOR_CEIL, product))\n\n\ndef apply_part_modifiers(car: Car, parts: list[Part] | None = None) -> Car:\n    modified = deepcopy(car)\n    part_map = {part.id: part for part in (parts if parts is not None else load_parts())}\n    for part_id in modified.installed_parts:\n        part = part_map[part_id]\n        for path, delta in part.modifiers.items():\n            _apply_delta(modified, path, delta)\n    return modified\n\n\ndef _apply_delta(car: Car, path: str, delta: int | float) -> None:\n    target_name, attr_name = path.split(\".\", maxsplit=1)\n    target = getattr(car, target_name)\n    setattr(target, attr_name, getattr(target, attr_name) + delta)\n\n\ndef set_tune(car: Car, tune_setup: TuneSetup) -> Car:\n    tuned = deepcopy(car)\n    tuned.tune = deepcopy(tune_setup)\n    return tuned\n\n\ndef compute_effective_stats(car: Car, parts: list[Part] | None = None) -> EffectiveCarStats:\n    modified = apply_part_modifiers(car, parts)\n    tune = modified.tune\n    # Engine map is a setup choice (tuning menu), not a mid-race command.\n    engine_map = tune.engine_map\n    if engine_map not in ENGINE_MAP_POWER:\n        valid = \", \".join(sorted(ENGINE_MAP_POWER))\n        raise ValueError(f\"Invalid engine_map: {engine_map!r}. Valid values: {valid}\")\n\n    overall_factor = _condition_factor(modified.condition.overall_condition)\n    engine_factor = _condition_factor(modified.condition.engine_condition)\n    brake_factor = _condition_factor(modified.condition.brake_condition)\n    tire_factor = _condition_factor((modified.condition.tire_condition + modified.condition.overall_condition) / 2)\n    suspension_factor = _condition_factor(modified.condition.suspension_condition)\n\n    pt = modified.powertrain\n    ch = modified.chassis\n    ti = modified.tires\n    br = modified.brakes\n    su = modified.suspension\n    ae = modified.aero\n    du = modified.durability\n    fu = modified.fuel\n    cond = modified.condition\n\n    power = pt.power_hp * engine_factor * ENGINE_MAP_POWER[engine_map]\n    torque = pt.torque_nm * engine_factor * ENGINE_MAP_POWER[engine_map]\n    weight = max(ch.weight_kg, 1)\n\n    # Aero efficiency trims effective drag; a damaged body adds a little drag.\n    drag = ae.drag + (tune.front_downforce + tune.rear_downforce) * DOWNFORCE_DRAG_PENALTY\n    drag *= _centered_factor(ae.aero_efficiency, C.AERO_EFFICIENCY_REF, -C.AERO_EFFICIENCY_DRAG_PER_UNIT)\n    drag *= _centered_factor(cond.body_condition, C.BODY_CONDITION_REF, -C.BODY_CONDITION_DRAG_PER_UNIT)\n    drag = max(0.0, drag)\n\n    # Engine character (torque delivery, powerband, throttle) shapes acceleration.\n    torque_ratio = pt.torque_nm / max(pt.power_hp, 1)\n    accel_character = _combine_factor(\n        _centered_factor(torque_ratio, C.TORQUE_RATIO_REF, C.TORQUE_RATIO_ACCEL_FACTOR),\n        _centered_factor(pt.powerband, C.POWERBAND_REF, C.POWERBAND_ACCEL_PER_UNIT),\n        _centered_factor(pt.throttle_response, C.THROTTLE_RESPONSE_REF, C.THROTTLE_ACCEL_PER_UNIT),\n    )\n    final_drive_delta = (tune.final_drive - FINAL_DRIVE_IDEAL) / FINAL_DRIVE_IDEAL\n    acceleration = (power / weight / NORM_ACCEL_REF_HW) * PERCENT_MAX\n    acceleration *= 1 + final_drive_delta * FINAL_DRIVE_ACCEL_FACTOR\n    acceleration *= accel_character\n    top_speed_kmh = TOP_SPEED_COEFF * (power / (drag / PERCENT_MAX + 0.5)) ** 0.333\n    top_speed = top_speed_kmh / NORM_SPEED_REF_KMH * PERCENT_MAX\n    top_speed *= 1 - final_drive_delta * FINAL_DRIVE_SPEED_FACTOR\n\n    brake_bias_factor = 1 - abs(tune.brake_bias - BRAKE_BIAS_IDEAL) * BRAKE_BIAS_PENALTY\n    braking = br.braking_power * brake_factor * brake_bias_factor * tune.brake_pressure\n    brake_stability = br.brake_stability * brake_factor * brake_bias_factor\n    # Cooling and fade resistance keep brakes effective; brake_stability now contributes.\n    braking *= _combine_factor(\n        _centered_factor(br.brake_cooling, C.BRAKE_COOLING_REF, C.BRAKE_COOLING_PER_UNIT),\n        _centered_factor(br.brake_fade_resistance, C.BRAKE_FADE_REF, C.BRAKE_FADE_PER_UNIT),\n    )\n    braking = braking * (1 - C.BRAKE_STABILITY_BLEND) + brake_stability * C.BRAKE_STABILITY_BLEND\n\n    # Setup quantities used across the grip/handling axes (Phase-2 tune knobs).\n    avg_stiffness = (tune.suspension_stiffness_front + tune.suspension_stiffness_rear) / 2\n    avg_antiroll = (tune.antiroll_front + tune.antiroll_rear) / 2\n    total_toe = abs(tune.toe_front) + abs(tune.toe_rear)\n\n    camber_factor = _camber_factor(tune.camber_front, tune.camber_rear)\n    pressure_factor = _pressure_factor(tune.tire_pressure_front, tune.tire_pressure_rear)\n    grip = ti.base_grip * tire_factor * camber_factor * pressure_factor\n    wet_grip = ti.wet_grip * tire_factor * pressure_factor\n    mechanical_grip = su.mechanical_grip * suspension_factor * tire_factor\n    # One clamped orphan factor per axis: contact patch (tyre width) plus setup\n    # (stiffness/preload/toe) shape grip; mechanical grip from the suspension blends in.\n    grip *= _combine_factor(\n        _centered_factor(ti.tire_width_front, C.TIRE_WIDTH_FRONT_REF, C.TIRE_WIDTH_GRIP_PER_MM),\n        _centered_factor(ti.tire_width_rear, C.TIRE_WIDTH_REAR_REF, C.TIRE_WIDTH_GRIP_PER_MM),\n        1 - abs(avg_stiffness - C.SUSP_STIFFNESS_IDEAL) * C.SUSP_STIFFNESS_GRIP_PENALTY_PER_UNIT,\n        1 - abs(tune.differential_preload - C.DIFF_PRELOAD_IDEAL) * C.DIFF_PRELOAD_GRIP_PENALTY_PER_UNIT,\n        1 - total_toe * C.TOE_GRIP_PENALTY,\n    )\n    grip = grip * (1 - C.MECH_GRIP_BLEND) + mechanical_grip * C.MECH_GRIP_BLEND\n    drivetrain = modified.identity.drivetrain\n    if drivetrain == \"AWD\":\n        # AWD puts power down better; the surface-scaled half lives in the segment composite.\n        grip *= C.AWD_GRIP_BONUS\n\n    weight_factor = min(1.15, WEIGHT_REFERENCE_KG / weight)\n    ride_factor = _ride_height_factor(tune.front_ride_height, tune.rear_ride_height)\n    suspension_compliance = clamp(su.suspension_compliance * suspension_factor)\n    curb_handling = clamp(su.curb_handling * suspension_factor)\n    handling = su.handling * suspension_factor * overall_factor * weight_factor * ride_factor\n    # Chassis (rigidity, CoG, rotation, weight balance), suspension feel (bump absorption,\n    # steering precision, compliance, curb behaviour) and setup (stiffness, anti-roll,\n    # coast diff, front toe) all shape handling, bounded by a single orphan clamp.\n    handling *= _combine_factor(\n        _centered_factor(ch.chassis_rigidity, C.RIGIDITY_REF, C.RIGIDITY_HANDLING_PER_UNIT),\n        _centered_factor(ch.center_of_gravity, C.CENTER_OF_GRAVITY_REF, C.COG_HANDLING_PER_UNIT),\n        _centered_factor(ch.rotation, C.ROTATION_REF, C.ROTATION_HANDLING_PER_UNIT),\n        1 - abs(ch.weight_distribution_front - C.WEIGHT_DIST_IDEAL) * C.WEIGHT_DIST_HANDLING_PENALTY,\n        _centered_factor(su.bump_absorption, C.BUMP_ABSORPTION_REF, C.BUMP_HANDLING_PER_UNIT),\n        _centered_factor(su.steering_precision, C.STEERING_PRECISION_REF, C.STEERING_HANDLING_PER_UNIT),\n        _centered_factor(suspension_compliance, C.COMPLIANCE_REF, C.COMPLIANCE_HANDLING_PER_UNIT),\n        _centered_factor(curb_handling, C.CURB_HANDLING_REF, C.CURB_HANDLING_PER_UNIT),\n        _centered_factor(avg_stiffness, C.SUSP_STIFFNESS_IDEAL, C.SUSP_STIFFNESS_HANDLING_PER_UNIT),\n        _centered_factor(avg_antiroll, C.ANTIROLL_IDEAL, C.ANTIROLL_HANDLING_PER_UNIT),\n        _centered_factor(tune.differential_coast, C.DIFF_COAST_IDEAL, C.DIFF_COAST_HANDLING_PER_UNIT),\n        1 + abs(tune.toe_front) * C.TOE_RESPONSE_FACTOR,\n    )\n    aero_grip = (ae.downforce + tune.front_downforce + tune.rear_downforce) / NORM_AERO_MAX * PERCENT_MAX\n\n    # Gear bias and power-diff shape accel/top-speed (neutral at default setup).\n    acceleration *= 1 + tune.gear_bias * C.GEAR_BIAS_ACCEL_FACTOR\n    top_speed *= 1 - tune.gear_bias * C.GEAR_BIAS_SPEED_FACTOR\n    acceleration *= _centered_factor(tune.differential_power, C.DIFF_POWER_IDEAL, C.DIFF_POWER_ACCEL_PER_UNIT)\n\n    stability = clamp(ch.stability * overall_factor + ae.high_speed_stability * 0.20)\n    # High-speed stability gives a small confidence margin at the top end.\n    top_speed = top_speed * (1 - C.STABILITY_TOPSPEED_BLEND) + stability * C.STABILITY_TOPSPEED_BLEND\n\n    cooling_factor = max(0.35, 1 - pt.cooling * COOLING_HEAT_REDUCTION)\n    engine_heat_rate = pt.engine_stress * ENGINE_MAP_HEAT[engine_map] * cooling_factor\n    fuel_burn_rate = modified.fuel.base_fuel_burn * ENGINE_MAP_FUEL[engine_map] * max(0.50, power / NORM_POWER_REF_HP)\n    # Efficiency (the fuel system) trims burn; a bigger tank drains a smaller % per lap, so\n    # capacity becomes a real strategic lever (bounded to avoid extremes).\n    fuel_burn_rate *= _centered_factor(fu.fuel_efficiency, C.FUEL_EFFICIENCY_REF, -C.FUEL_EFFICIENCY_BURN_PER_UNIT)\n    # Tank capacity no longer fudges the burn *rate*; it sets real range at race time\n    # (litres burned / capacity). A bigger tank = more laps between stops, not less burn.\n    tire_wear_rate = max(0.20, (PERCENT_MAX - ti.tire_wear_resistance) / PERCENT_MAX)\n    tire_heat_rate = max(0.20, (PERCENT_MAX - ti.tire_heat_resistance) / PERCENT_MAX)\n    # Wider tyres run a touch hotter and wear faster; quicker-warming tyres heat sooner.\n    width_load = _combine_factor(\n        _centered_factor(ti.tire_width_front, C.TIRE_WIDTH_FRONT_REF, C.TIRE_WIDTH_WEAR_PER_MM),\n        _centered_factor(ti.tire_width_rear, C.TIRE_WIDTH_REAR_REF, C.TIRE_WIDTH_WEAR_PER_MM),\n    )\n    tire_wear_rate *= width_load\n    tire_heat_rate *= width_load * _centered_factor(ti.tire_warmup, C.TIRE_WARMUP_REF, C.TIRE_WARMUP_HEAT_PER_UNIT)\n    reliability = du.overall_reliability * overall_factor\n    reliability *= max(0.30, 1 - pt.engine_stress * STRESS_RELIABILITY_PENALTY)\n    # Secondary durability (engine/gearbox/suspension/brake/cooling), the car's\n    # mechanical-sympathy modifier, and gearbox condition now shape failure risk.\n    secondary_durability = (\n        du.engine_reliability + pt.engine_reliability + du.gearbox_reliability\n        + du.suspension_durability + du.brake_durability + du.cooling_capacity\n    ) / 6\n    reliability *= _combine_factor(\n        _centered_factor(secondary_durability, C.DURABILITY_REF, C.DURABILITY_RELIABILITY_PER_UNIT),\n        1 + du.mechanical_sympathy_modifier * C.MECH_SYMPATHY_MOD_PER_UNIT,\n        _centered_factor(cond.gearbox_condition, C.GEARBOX_CONDITION_REF, C.CONDITION_RELIABILITY_PER_UNIT),\n    )\n\n    # Performance axes that feed the pace composite use the no-ceiling soft knee; the rest\n    # (rates/reliability and secondary readouts) keep the genuine 0-100 clamp.\n    return EffectiveCarStats(\n        power=_pace(power / NORM_POWER_REF_HP * PERCENT_MAX),\n        torque=clamp(torque / NORM_TORQUE_REF_NM * PERCENT_MAX),\n        weight=float(weight),\n        acceleration=_pace(acceleration),\n        top_speed=_pace(top_speed),\n        braking=_pace(braking),\n        brake_stability=clamp(brake_stability),\n        grip=_pace(grip),\n        wet_grip=_pace(wet_grip),\n        handling=_pace(handling),\n        mechanical_grip=clamp(mechanical_grip),\n        # aero stays clamped: it isn't a supercar differentiator and its huge pre-clamp\n        # values (downforce can reach ~2x) would otherwise over-inflate the aero-heavy car.\n        aero_grip=clamp(aero_grip),\n        drag=drag,\n        stability=stability,\n        tire_wear_rate=tire_wear_rate,\n        tire_heat_rate=tire_heat_rate,\n        fuel_burn_rate=fuel_burn_rate,\n        engine_heat_rate=engine_heat_rate,\n        reliability=clamp(reliability),\n        suspension_compliance=suspension_compliance,\n        curb_handling=curb_handling,\n        drivetrain=drivetrain,\n        fuel_capacity_l=float(fu.fuel_capacity_l),\n        power_to_weight=power / weight,  # real hp/kg (post-parts, post-map): drives climb pace\n    )\n\n\ndef derived_rating(car: Car, parts: list[Part] | None = None) -> int:\n    \"\"\"Performance rating derived from the car alone: its mean capability across the fixed\n    drag/slalom/hybrid reference suite, scaled. Computed at runtime (never stored), so it\n    generalises to any custom car and never goes stale. See game/reference_suite.py.\"\"\"\n    from game.reference_suite import mean_capability  # lazy: reference_suite -> simulation -> here\n\n    effective = compute_effective_stats(car, parts)\n    return round(mean_capability(effective) * CLASS_RATING_SCALE)\n\n\ndef class_rating(car: Car, parts: list[Part] | None = None) -> int:\n    return derived_rating(car, parts)\n\n\ndef derived_class(car: Car, parts: list[Part] | None = None) -> str:\n    \"\"\"The car's class letter (E..S), bracketed from its derived rating. Single source of\n    truth for eligibility and display -- there is no stored class.\"\"\"\n    return rating_class(derived_rating(car, parts))\n\n\ndef class_breakdown(car: Car, parts: list[Part] | None = None) -> dict:\n    \"\"\"Display-ready view of how the class is derived: the car's capability on each\n    reference fixture, the mean, and the resulting PR / class / shape. Lets the UI explain\n    a class that is computed rather than stored.\"\"\"\n    from game.reference_suite import archetype_capabilities  # lazy: avoid import cycle\n\n    effective = compute_effective_stats(car, parts)\n    caps = archetype_capabilities(effective)\n    mean = sum(caps.values()) / len(caps)\n    pr = round(mean * CLASS_RATING_SCALE)\n    return {\n        \"drag\": round(caps[\"power\"]),\n        \"slalom\": round(caps[\"technical\"]),\n        \"hybrid\": round(caps[\"hybrid\"]),\n        \"mean\": round(mean, 1),\n        \"pr\": pr,\n        \"class\": rating_class(pr),\n        \"shape\": performance_type(car, parts),\n    }\n\n\ndef performance_type(car: Car, parts: list[Part] | None = None) -> str:\n    \"\"\"The car's \"shape\": where its pace comes from, comparing speed axes against control\n    axes. Distinguishes same-tier cars (a power specialist vs a balanced car vs a handler).\"\"\"\n    from game.reference_suite import mean_capability  # lazy: avoid import cycle\n\n    effective = compute_effective_stats(car, parts)\n    if set(car.identity.tags).intersection({\"challenge\", \"joke\"}) or mean_capability(effective) < C.SHAPE_CHALLENGE_FLOOR:\n        return \"Challenge\"\n    speed = (effective.power + effective.acceleration + effective.top_speed) / 3\n    control = (effective.grip + effective.braking + effective.handling) / 3\n    if speed - control >= C.SHAPE_SPEED_CONTROL_DELTA:\n        return \"Power\"\n    if control - speed >= C.SHAPE_SPEED_CONTROL_DELTA:\n        return \"Handling\"\n    return \"Balanced\"\n\n\ndef rating_class(rating: int) -> str:\n    current = \"E\"\n    for class_name, threshold in CLASS_THRESHOLDS.items():\n        if rating >= threshold:\n            current = class_name\n    return current\n\n\ndef _condition_factor(value: float) -> float:\n    return max(MIN_CONDITION_FACTOR, value / PERCENT_MAX)\n\n\ndef _camber_factor(front: float, rear: float) -> float:\n    average = (abs(front) + abs(rear)) / 2\n    return max(0.85, 1 - abs(average - CAMBER_IDEAL_DEG) * CAMBER_PENALTY)\n\n\ndef _pressure_factor(front: float, rear: float) -> float:\n    average = (front + rear) / 2\n    return max(0.85, 1 - abs(average - PRESSURE_IDEAL_BAR) * PRESSURE_PENALTY)\n\n\ndef _ride_height_factor(front: int, rear: int) -> float:\n    average = (front + rear) / 2\n    return max(0.85, 1 - abs(average - RIDE_HEIGHT_IDEAL_MM) * RIDE_HEIGHT_PENALTY)\n", "game/event_display.py": "from __future__ import annotations\n\nfrom typing import Any\n\nfrom constants import TEAM_LEVEL_THRESHOLDS\nfrom game.progression import normalize_event_progress, team_level_for_xp\n\n\ndef event_kind_label(event_kind: str) -> str:\n    return str(event_kind).replace(\"_\", \" \").title()\n\n\ndef event_requirement_text(event: Any) -> str:\n    return f\"Lv {event.min_team_level}\"\n\n\ndef team_status_text(state: Any, event: Any) -> str:\n    current_level = team_level_for_xp(state.team_xp)\n    if current_level >= event.min_team_level:\n        return \"Open\"\n    return f\"Locked ({xp_needed_for_team_level(state.team_xp, event.min_team_level)} XP)\"\n\n\ndef xp_needed_for_team_level(team_xp: int, min_team_level: int) -> int:\n    target = TEAM_LEVEL_THRESHOLDS.get(int(min_team_level), max(TEAM_LEVEL_THRESHOLDS.values()))\n    return max(0, target - max(0, int(team_xp)))\n\n\ndef event_best_text(progress: dict | None) -> str:\n    normalized = normalize_event_progress(progress)\n    if normalized[\"starts\"] == 0:\n        return \"No starts\"\n    best_position = normalized[\"best_position\"]\n    if best_position is None:\n        return \"No finish\"\n    wins = normalized[\"wins\"]\n    if wins == 1:\n        return \"Win\"\n    if wins > 1:\n        return f\"{wins} wins\"\n    if best_position <= 3:\n        return f\"P{best_position} podium\"\n    return f\"P{best_position}\"\n\n\ndef event_progress_rows(progress: dict | None) -> list[list[object]]:\n    normalized = normalize_event_progress(progress)\n    best_time = normalized[\"best_time_s\"]\n    return [\n        [\"Starts\", normalized[\"starts\"]],\n        [\"Best Result\", event_best_text(normalized)],\n        [\"Wins\", normalized[\"wins\"]],\n        [\"Podiums\", normalized[\"podiums\"]],\n        [\"Best Time\", f\"{best_time:.1f}s\" if best_time is not None else \"-\"],\n    ]\n", "game/game_state.py": "from __future__ import annotations\n\nfrom dataclasses import dataclass, field\n\nfrom constants import STARTING_MONEY, STARTING_WEEK\nfrom game.loader import load_cars, load_drivers\nfrom game.models import Car, Driver\n\n\n@dataclass\nclass GameState:\n    money: int = STARTING_MONEY\n    week: int = STARTING_WEEK\n    team_xp: int = 0\n    garage: list[Car] = field(default_factory=list)\n    hired_drivers: list[Driver] = field(default_factory=list)\n    event_progress: dict[str, dict] = field(default_factory=dict)\n\n\ndef new_game() -> GameState:\n    return GameState()\n\n\ndef _starter_car(cars: list[Car]) -> Car:\n    \"\"\"Cheapest entry-class car, chosen by criteria rather than a hardcoded id, so the\n    career still starts even if the seed catalog changes. Prefers the lowest class\n    present, then the cheapest car within it.\"\"\"\n    if not cars:\n        raise ValueError(\"No cars available to start a career\")\n    from game.effective_stats import derived_class\n    class_order = {\"E\": 0, \"D\": 1, \"C\": 2, \"B\": 3, \"A\": 4, \"S\": 5}\n    return min(cars, key=lambda c: (class_order.get(derived_class(c), 99), c.value))\n\n\ndef _starter_driver(drivers: list[Driver]) -> Driver:\n    \"\"\"A rookie to start with: the cheapest-salary driver available.\"\"\"\n    if not drivers:\n        raise ValueError(\"No drivers available to start a career\")\n    return min(drivers, key=lambda d: d.salary)\n\n\ndef new_career() -> GameState:\n    return GameState(\n        garage=[_starter_car(load_cars())],\n        hired_drivers=[_starter_driver(load_drivers())],\n    )\n", "game/loader.py": "from __future__ import annotations\n\nimport json\nfrom dataclasses import fields\nfrom pathlib import Path\nfrom typing import Any, Callable, TypeVar\n\nfrom constants import (\n    BASE_REFERENCE_SPEED,\n    CONDITION_MODIFIERS,\n    CONDITION_NEUTRAL,\n    CONDITION_SEVERITY,\n    ELEVATION_FACTOR_CEIL,\n    ELEVATION_FACTOR_FLOOR,\n    ELEVATION_FUEL_PER_M,\n    ELEVATION_HEAT_PER_M,\n    ELEVATION_REF_M,\n    EVENT_KIND_LADDER,\n    EVENT_KINDS,\n    NET_CLIMB_LAYOUTS,\n    OVERTAKE_DIFFICULTY_TAG_DELTA,\n    SEGMENT_TAG_RATES,\n    SEGMENT_TAG_SPEED,\n    SEGMENT_TAG_WEIGHTS,\n    SURFACE_MODIFIERS,\n    SURFACE_NEUTRAL,\n    TRACK_LENGTH_TOLERANCE,\n    WEATHER_WET_SHARE,\n)\nfrom game.progression import min_team_level_for_class\nfrom game.models import (\n    AeroStats,\n    BrakeStats,\n    Car,\n    CarCondition,\n    CarIdentity,\n    ChassisStats,\n    Driver,\n    DurabilityStats,\n    Event,\n    FuelStats,\n    Part,\n    PowertrainStats,\n    SegmentProfile,\n    SuspensionStats,\n    TireStats,\n    Track,\n    TrackSegment,\n    TuneSetup,\n)\n\nWEIGHT_DIMS = [\"power\", \"top_speed\", \"acceleration\", \"grip\", \"braking\", \"handling\", \"aero\"]\nRATE_NAMES = [\"tire_wear\", \"fuel_burn\", \"engine_heat\"]\n\nDATA_ROOT = Path(__file__).resolve().parents[1] / \"data\"\nT = TypeVar(\"T\")\n\n\nclass DataLoadError(ValueError):\n    \"\"\"Raised when game data cannot be loaded or validated.\"\"\"\n\n\ndef _load_json(path: Path) -> Any:\n    try:\n        with path.open(encoding=\"utf-8\") as handle:\n            return json.load(handle)\n    except json.JSONDecodeError as exc:\n        raise DataLoadError(f\"Malformed JSON in {path}: {exc}\") from exc\n    except OSError as exc:\n        raise DataLoadError(f\"Could not read {path}: {exc}\") from exc\n\n\ndef _objects_from_dir(subdir: str, factory: Callable[[dict[str, Any], Path], T], data_root: Path = DATA_ROOT) -> list[T]:\n    directory = data_root / subdir\n    if not directory.exists():\n        raise DataLoadError(f\"Missing data directory: {directory}\")\n\n    loaded: list[T] = []\n    for path in sorted(directory.glob(\"*.json\")):\n        payload = _load_json(path)\n        rows = payload if isinstance(payload, list) else [payload]\n        if not isinstance(rows, list):\n            raise DataLoadError(f\"Expected object or list in {path}\")\n        for row in rows:\n            if not isinstance(row, dict):\n                raise DataLoadError(f\"Expected JSON object in {path}\")\n            loaded.append(factory(row, path))\n    return loaded\n\n\ndef _dataclass_from_dict(cls: type[T], data: dict[str, Any], path: Path) -> T:\n    names = {field.name for field in fields(cls)}\n    missing = names.difference(data)\n    if missing:\n        raise DataLoadError(f\"Missing fields for {cls.__name__} in {path}: {sorted(missing)}\")\n    try:\n        return cls(**{name: data[name] for name in names})\n    except TypeError as exc:\n        raise DataLoadError(f\"Invalid fields for {cls.__name__} in {path}: {exc}\") from exc\n\n\ndef car_from_dict(data: dict[str, Any], path: Path | None = None) -> Car:\n    source = path or Path(\"<memory>\")\n    try:\n        identity_data = data.get(\"identity\") or {\n            \"id\": data[\"id\"],\n            \"name\": data[\"name\"],\n            \"year\": data[\"year\"],\n            \"manufacturer\": data[\"manufacturer\"],\n            \"model\": data[\"model\"],\n            \"drivetrain\": data[\"drivetrain\"],\n            \"layout\": data[\"layout\"],\n            \"tags\": data[\"tags\"],\n        }\n        return Car(\n            identity=_dataclass_from_dict(CarIdentity, identity_data, source),\n            powertrain=_dataclass_from_dict(PowertrainStats, data[\"powertrain\"], source),\n            chassis=_dataclass_from_dict(ChassisStats, data[\"chassis\"], source),\n            tires=_dataclass_from_dict(TireStats, data[\"tires\"], source),\n            brakes=_dataclass_from_dict(BrakeStats, data[\"brakes\"], source),\n            suspension=_dataclass_from_dict(SuspensionStats, data[\"suspension\"], source),\n            aero=_dataclass_from_dict(AeroStats, data[\"aero\"], source),\n            durability=_dataclass_from_dict(DurabilityStats, data[\"durability\"], source),\n            fuel=_dataclass_from_dict(FuelStats, data[\"fuel\"], source),\n            condition=_dataclass_from_dict(CarCondition, data[\"condition\"], source),\n            installed_parts=list(data.get(\"installed_parts\", [])),\n            tune=_dataclass_from_dict(TuneSetup, data[\"tune\"], source),\n            value=data[\"value\"],\n        )\n    except KeyError as exc:\n        raise DataLoadError(f\"Missing car field {exc!s} in {source}\") from exc\n\n\ndef driver_from_dict(data: dict[str, Any], path: Path | None = None) -> Driver:\n    return _dataclass_from_dict(Driver, data, path or Path(\"<memory>\"))\n\n\ndef event_from_dict(data: dict[str, Any], path: Path | None = None) -> Event:\n    source = path or Path(\"<memory>\")\n    event_data = dict(data)\n    event_data.setdefault(\"rival_skill\", None)\n    try:\n        class_limit = event_data[\"car_class_limit\"]\n    except KeyError as exc:\n        raise DataLoadError(f\"Missing event field {exc!s} in {source}\") from exc\n    if event_data.get(\"min_team_level\") is None:\n        try:\n            event_data[\"min_team_level\"] = min_team_level_for_class(class_limit)\n        except ValueError as exc:\n            raise DataLoadError(\n                f\"Event {event_data.get('id', '?')} in {source} has unknown car_class_limit: {class_limit}\"\n            ) from exc\n    else:\n        try:\n            event_data[\"min_team_level\"] = int(event_data[\"min_team_level\"])\n        except (TypeError, ValueError) as exc:\n            raise DataLoadError(\n                f\"Event {event_data.get('id', '?')} in {source} has invalid min_team_level: \"\n                f\"{event_data.get('min_team_level')!r}\"\n            ) from exc\n        if event_data[\"min_team_level\"] < 1:\n            raise DataLoadError(\n                f\"Event {event_data.get('id', '?')} in {source} has min_team_level below 1: \"\n                f\"{event_data['min_team_level']}\"\n            )\n    event_kind = event_data.get(\"event_kind\") or EVENT_KIND_LADDER\n    normalized_kind = str(event_kind).strip().lower()\n    if normalized_kind not in EVENT_KINDS:\n        expected = \", \".join(EVENT_KINDS)\n        raise DataLoadError(\n            f\"Event {event_data.get('id', '?')} in {source} has unknown event_kind \"\n            f\"{event_kind!r}; expected one of: {expected}\"\n        )\n    event_data[\"event_kind\"] = normalized_kind\n    for field_name in (\"laps\", \"distance_km\", \"duration_s\"):\n        event_data.setdefault(field_name, None)\n    specified = [name for name in (\"laps\", \"distance_km\", \"duration_s\") if event_data[name] is not None]\n    if len(specified) != 1:\n        raise DataLoadError(\n            f\"Event {event_data.get('id', '?')} in {source} must set exactly one race-length \"\n            f\"field (laps, distance_km, or duration_s); found {specified or 'none'}\"\n        )\n    return _dataclass_from_dict(Event, event_data, source)\n\n\ndef resolve_race(event: Event, track: Track) -> \"RaceFormat\":\n    \"\"\"Resolve an event's race length against a track into a concrete RaceFormat.\n\n    Lap- and distance-based events yield a fixed lap target (distance is divided by the\n    track's lap length). Duration-based events are returned open-ended; the race loop's\n    time predicate will consume them once duration is wired in.\n    \"\"\"\n    from game.models import RaceFormat\n\n    if event.laps is not None:\n        return RaceFormat(mode=\"laps\", laps=max(1, int(event.laps)))\n    if event.distance_km is not None:\n        laps = max(1, round(event.distance_km / max(track.length_km, 1e-6)))\n        return RaceFormat(mode=\"distance\", laps=laps, distance_km=event.distance_km)\n    if event.duration_s is not None:\n        return RaceFormat(mode=\"duration\", laps=None, duration_s=event.duration_s)\n    # event_from_dict guarantees one is set; this guards programmatic Events.\n    raise DataLoadError(f\"Event {event.id} has no race-length specified\")\n\n\ndef part_from_dict(data: dict[str, Any], path: Path | None = None) -> Part:\n    return _dataclass_from_dict(Part, data, path or Path(\"<memory>\"))\n\n\ndef _segment_tag_weights(segment: TrackSegment) -> dict[str, float]:\n    contrib = {dim: 0.0 for dim in WEIGHT_DIMS}\n    for tag in segment.tags:\n        if tag not in SEGMENT_TAG_WEIGHTS:\n            raise DataLoadError(f\"Unknown segment tag: {tag}\")\n        for dim, value in SEGMENT_TAG_WEIGHTS[tag].items():\n            contrib[dim] += value\n    return contrib\n\n\ndef _segment_tag_rates(segment: TrackSegment) -> dict[str, float]:\n    contrib = {rate: 0.0 for rate in RATE_NAMES}\n    for tag in segment.tags:\n        if tag not in SEGMENT_TAG_RATES:\n            raise DataLoadError(f\"Unknown segment tag: {tag}\")\n        for rate, value in SEGMENT_TAG_RATES[tag].items():\n            contrib[rate] += value\n    return contrib\n\n\ndef _segment_modifiers(segment: TrackSegment) -> tuple[float, float, float]:\n    \"\"\"Resolve (grip_mult, tire_wear_mult, wet_weight) from surface + condition.\n\n    Unknown surface/condition strings fall back to the neutral baseline so existing\n    free-form data keeps loading.\n    \"\"\"\n    surface = SURFACE_MODIFIERS.get(segment.surface, SURFACE_NEUTRAL)\n    condition = CONDITION_MODIFIERS.get(segment.condition, CONDITION_NEUTRAL)\n    return (\n        surface[\"grip\"] * condition[\"grip\"],\n        surface[\"tire_wear\"] * condition[\"tire_wear\"],\n        condition[\"wet_weight\"],\n    )\n\n\ndef derive_weights(segments: list[TrackSegment]) -> dict[str, float]:\n    raw = {dim: 0.0 for dim in WEIGHT_DIMS}\n    for segment in segments:\n        for dim, value in _segment_tag_weights(segment).items():\n            raw[dim] += segment.length_pct * value\n    total = sum(raw.values()) or 1.0\n    return {dim: value / total for dim, value in raw.items()}\n\n\ndef derive_rates(segments: list[TrackSegment]) -> dict[str, float]:\n    rates = {rate: 0.0 for rate in RATE_NAMES}\n    for segment in segments:\n        contrib = _segment_tag_rates(segment)\n        _, tire_wear_mult, _ = _segment_modifiers(segment)\n        rates[\"tire_wear\"] += segment.length_pct * contrib[\"tire_wear\"] * tire_wear_mult\n        rates[\"fuel_burn\"] += segment.length_pct * contrib[\"fuel_burn\"]\n        rates[\"engine_heat\"] += segment.length_pct * contrib[\"engine_heat\"]\n    return rates\n\n\ndef build_segment_profiles(segments: list[TrackSegment]) -> list[SegmentProfile]:\n    \"\"\"Per-segment, position-resolved profiles whose length-weighted sum reproduces\n    the aggregate weights/rates (see SegmentProfile). The global ``total`` divisor is\n    the same one derive_weights() normalizes by, which is what keeps the integral\n    consistent so dry tarmac tracks behave identically to the aggregate model.\"\"\"\n    raw = {dim: 0.0 for dim in WEIGHT_DIMS}\n    for segment in segments:\n        for dim, value in _segment_tag_weights(segment).items():\n            raw[dim] += segment.length_pct * value\n    total = sum(raw.values()) or 1.0\n\n    profiles: list[SegmentProfile] = []\n    cursor = 0.0\n    for segment in segments:\n        contrib = _segment_tag_weights(segment)\n        rates = _segment_tag_rates(segment)\n        grip_mult, tire_wear_mult, wet_weight = _segment_modifiers(segment)\n        start = cursor\n        cursor += segment.length_pct\n        profiles.append(\n            SegmentProfile(\n                name=segment.name,\n                length_pct=segment.length_pct,\n                start_pct=start,\n                end_pct=cursor,\n                surface=segment.surface,\n                condition=segment.condition,\n                weights={dim: contrib[dim] / total for dim in WEIGHT_DIMS},\n                tire_wear_rate=rates[\"tire_wear\"] * tire_wear_mult,\n                fuel_burn_rate=rates[\"fuel_burn\"],\n                engine_heat_rate=rates[\"engine_heat\"],\n                grip_mult=grip_mult,\n                tire_wear_mult=tire_wear_mult,\n                wet_weight=wet_weight,\n            )\n        )\n    return profiles\n\n\ndef _segment_speed_factor(segment: TrackSegment) -> float:\n    \"\"\"Dimensionless reference-speed factor for one segment: the mean of its tags'\n    factors (a tagless segment is neutral 1.0). Straights pull it up, chicanes down.\"\"\"\n    if not segment.tags:\n        return 1.0\n    total = 0.0\n    for tag in segment.tags:\n        if tag not in SEGMENT_TAG_SPEED:\n            raise DataLoadError(f\"Unknown segment tag: {tag}\")\n        total += SEGMENT_TAG_SPEED[tag]\n    return total / len(segment.tags)\n\n\ndef derive_base_lap_time(segments: list[TrackSegment], length_km: float) -> float:\n    \"\"\"Reference lap time (s) for one lap, derived from the track's own geometry.\n\n    A length-weighted speed factor over the segment tag mix sets the track's reference\n    speed (``BASE_REFERENCE_SPEED x speed_factor``); the reference lap is distance / speed.\n    This IS base_lap_time -- the honest lap a design-midpoint car runs on this geometry; pace\n    is proportional (PERF_FRACTION), so that car laps at exactly this and weaker/stronger cars\n    fall a consistent % off it. Never stored -> custom/creator tracks get a sane base for free.\n    See constants.SEGMENT_TAG_SPEED.\n    \"\"\"\n    speed_factor = sum(seg.length_pct * _segment_speed_factor(seg) for seg in segments)\n    speed_factor = max(speed_factor, 1e-6)\n    return length_km / (BASE_REFERENCE_SPEED * speed_factor) * 3600.0\n\n\ndef _elevation_factor(elevation_m: float, per_m: float) -> float:\n    \"\"\"Bounded multiplier for elevation-driven fuel/heat load (1.0 at the reference).\"\"\"\n    factor = 1.0 + (elevation_m - ELEVATION_REF_M) * per_m\n    return max(ELEVATION_FACTOR_FLOOR, min(ELEVATION_FACTOR_CEIL, factor))\n\n\ndef track_from_dict(data: dict[str, Any], path: Path | None = None) -> Track:\n    source = path or Path(\"<memory>\")\n    try:\n        segments = [_dataclass_from_dict(TrackSegment, item, source) for item in data[\"segments\"]]\n    except KeyError as exc:\n        raise DataLoadError(f\"Missing track field {exc!s} in {source}\") from exc\n\n    length_total = sum(segment.length_pct for segment in segments)\n    if abs(length_total - 1.0) > TRACK_LENGTH_TOLERANCE:\n        raise DataLoadError(f\"Track segment length_pct values in {source} sum to {length_total:.3f}, not 1.0\")\n\n    weights = derive_weights(segments)\n    rates = derive_rates(segments)\n    overtake = float(data[\"overtake_difficulty\"])\n    for segment in segments:\n        for tag in segment.tags:\n            overtake += OVERTAKE_DIFFICULTY_TAG_DELTA.get(tag, 0.0) * segment.length_pct\n    overtake = max(0.0, min(1.0, overtake))\n\n    # Sustained elevation change taxes fuel and engine heat. Applied uniformly to the\n    # aggregate rates and to every segment profile so the segment-resolved race wears\n    # the car identically to the aggregate model (the documented integration invariant).\n    # Distance no longer scales these here -- attrition is resolved per-kilometre at race\n    # time (see _apply_lap_wear), so a track's rates stay intensive tag multipliers.\n    elevation = data[\"elevation_change_m\"]\n    elev_heat = _elevation_factor(elevation, ELEVATION_HEAT_PER_M)\n    elev_fuel = _elevation_factor(elevation, ELEVATION_FUEL_PER_M)\n    rates[\"engine_heat\"] *= elev_heat\n    rates[\"fuel_burn\"] *= elev_fuel\n    profiles = build_segment_profiles(segments)\n    for profile in profiles:\n        profile.engine_heat_rate *= elev_heat\n        profile.fuel_burn_rate *= elev_fuel\n\n    # Net climb grade for the hillclimb time penalty. Only point-to-point/hillclimb traversals\n    # have a real net gain; a loop climbs and descends equally over a lap, so its stored\n    # elevation_change_m is undulation, not net climb -> 0 grade, no penalty (see simulation).\n    length_km = data[\"length_km\"]\n    if data[\"layout_type\"] in NET_CLIMB_LAYOUTS and length_km > 0:\n        climb_gradient_pct = elevation / (length_km * 1000.0) * 100.0\n    else:\n        climb_gradient_pct = 0.0\n\n    return Track(\n        id=data[\"id\"],\n        name=data[\"name\"],\n        layout_type=data[\"layout_type\"],\n        base_lap_time=derive_base_lap_time(segments, data[\"length_km\"]),\n        length_km=data[\"length_km\"],\n        pit_lane_loss_s=data[\"pit_lane_loss_s\"],\n        segments=segments,\n        overtake_difficulty=overtake,\n        elevation_change_m=data[\"elevation_change_m\"],\n        surface=data[\"surface\"],\n        default_condition=data[\"default_condition\"],\n        weather_variability=data[\"weather_variability\"],\n        power_weight=weights[\"power\"],\n        acceleration_weight=weights[\"acceleration\"],\n        top_speed_weight=weights[\"top_speed\"],\n        grip_weight=weights[\"grip\"],\n        braking_weight=weights[\"braking\"],\n        handling_weight=weights[\"handling\"],\n        aero_weight=weights[\"aero\"],\n        tire_wear_rate=rates[\"tire_wear\"],\n        fuel_burn_rate=rates[\"fuel_burn\"],\n        engine_heat_rate=rates[\"engine_heat\"],\n        climb_gradient_pct=climb_gradient_pct,\n        segment_profiles=profiles,\n    )\n\n\ndef roll_race_condition(track: Track, rng) -> str:\n    \"\"\"One pre-race forecast roll: the chance the race does not run in the track's\n    default condition is ``weather_variability``; a change is usually damp, sometimes\n    full wet. Never de-escalates below the authored default.\"\"\"\n    if track.weather_variability <= 0.0:\n        return track.default_condition\n    roll = rng.random()\n    if roll >= track.weather_variability:\n        return track.default_condition\n    rolled = \"wet\" if roll < track.weather_variability * WEATHER_WET_SHARE else \"damp\"\n    if CONDITION_SEVERITY.get(rolled, 0) <= CONDITION_SEVERITY.get(track.default_condition, 0):\n        return track.default_condition\n    return rolled\n\n\ndef apply_race_condition(track: Track, condition: str) -> None:\n    \"\"\"Escalate a session's (freshly loaded) track to the rolled race condition.\n\n    Each profile whose authored condition is milder is recomposed from surface x new\n    condition (grip, tyre wear, wet blend); the aggregate tyre-wear rate is re-derived\n    from the profiles, so the segment<->aggregate integration invariant stays exact.\n    Escalation only -- an authored-wet segment never dries out.\"\"\"\n    if condition not in CONDITION_MODIFIERS or not track.segment_profiles:\n        return\n    severity = CONDITION_SEVERITY.get(condition, 0)\n    for profile in track.segment_profiles:\n        if severity <= CONDITION_SEVERITY.get(profile.condition, 0):\n            continue\n        surface = SURFACE_MODIFIERS.get(profile.surface, SURFACE_NEUTRAL)\n        modifiers = CONDITION_MODIFIERS[condition]\n        raw_tire_rate = profile.tire_wear_rate / profile.tire_wear_mult\n        profile.condition = condition\n        profile.grip_mult = surface[\"grip\"] * modifiers[\"grip\"]\n        profile.tire_wear_mult = surface[\"tire_wear\"] * modifiers[\"tire_wear\"]\n        profile.wet_weight = modifiers[\"wet_weight\"]\n        profile.tire_wear_rate = raw_tire_rate * profile.tire_wear_mult\n    track.tire_wear_rate = sum(p.length_pct * p.tire_wear_rate for p in track.segment_profiles)\n\n\ndef load_cars(data_root: Path = DATA_ROOT) -> list[Car]:\n    return _objects_from_dir(\"cars\", car_from_dict, data_root)\n\n\ndef load_drivers(data_root: Path = DATA_ROOT) -> list[Driver]:\n    return _objects_from_dir(\"drivers\", driver_from_dict, data_root)\n\n\ndef load_tracks(data_root: Path = DATA_ROOT) -> list[Track]:\n    return _objects_from_dir(\"tracks\", track_from_dict, data_root)\n\n\ndef load_events(data_root: Path = DATA_ROOT) -> list[Event]:\n    return _objects_from_dir(\"events\", event_from_dict, data_root)\n\n\ndef load_parts(data_root: Path = DATA_ROOT) -> list[Part]:\n    return _objects_from_dir(\"parts\", part_from_dict, data_root)\n\n\ndef load_all_data(data_root: Path = DATA_ROOT) -> dict[str, list[Any
