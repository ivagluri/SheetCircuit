<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SheetCircuit Creator</title>
<style>
  :root {
    --bg: #101216;
    --panel: #191d24;
    --fg: #d6d9de;
    --dim: #8a919c;
    --accent: #5cc8ff;
    --btn: #232935;
    --btn-hover: #2f3848;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "SF Mono", "Cascadia Mono", "JetBrains Mono", Consolas, Menlo, monospace;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #boot {
    margin: auto;
    text-align: center;
    color: var(--dim);
    padding: 2em;
    line-height: 1.8;
  }
  #boot .title { color: var(--accent); font-size: 18px; }
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
    padding: 8px;
    gap: 8px;
  }
  #topbar { display: flex; justify-content: space-between; align-items: center; color: var(--dim); }
  #topbar a { color: var(--accent); text-decoration: none; }
  #screen {
    flex: 1;
    margin: 0;
    padding: 12px;
    background: var(--panel);
    border: 1px solid #2a303b;
    border-radius: 6px;
    overflow: auto;
    white-space: pre;
    line-height: 1.35;
  }
  .btnrow { display: flex; flex-wrap: wrap; gap: 6px; }
  .btnrow[hidden] { display: none; }
  button, label.btn {
    background: var(--btn);
    color: var(--fg);
    border: 1px solid #333c4c;
    border-radius: 4px;
    padding: 5px 10px;
    font: inherit;
    cursor: pointer;
  }
  button:hover, label.btn:hover { background: var(--btn-hover); }
  #inputrow { display: flex; gap: 8px; align-items: center; }
  #prompt-label { color: var(--dim); white-space: nowrap; max-width: 45%; overflow: hidden; text-overflow: ellipsis; }
  #cmd {
    flex: 1;
    background: var(--panel);
    color: var(--fg);
    border: 1px solid #333c4c;
    border-radius: 4px;
    padding: 7px 10px;
    font: inherit;
  }
  #cmd:focus { outline: 1px solid var(--accent); }
  #stash-panel {
    background: var(--panel);
    border: 1px solid #333c4c;
    border-radius: 6px;
    padding: 10px 12px;
    max-height: 12em;
    overflow: auto;
  }
  #stash-panel[hidden] { display: none; }
  #stash-panel .row { display: flex; justify-content: space-between; gap: 8px; padding: 2px 0; }
  #error {
    background: #3a1518;
    color: #ffb4b4;
    border: 1px solid #7c2b31;
    border-radius: 4px;
    padding: 8px 12px;
    white-space: pre-wrap;
    max-height: 10em;
    overflow: auto;
  }
  #error[hidden] { display: none; }
</style>
</head>
<body>
<div id="boot">
  <div class="title">SheetCircuit Creator</div>
  <div>Loading the Python runtime (~7&nbsp;MB, cached after the first visit)…</div>
  <div id="boot-status">starting…</div>
</div>
<div id="app" hidden>
  <div id="topbar">
    <span>SheetCircuit Creator — saves download as JSON; session copies stay in this browser</span>
    <a id="game-link" href="./">&larr; play the game</a>
  </div>
  <div id="mode-buttons" class="btnrow"></div>
  <pre id="screen"></pre>
  <div id="stash-panel" hidden></div>
  <div id="error" hidden></div>
  <div id="inputrow">
    <span id="prompt-label">Choice:</span>
    <input id="cmd" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button id="send">Enter</button>
    <label class="btn" title="Bring a car/track/event JSON into this session">Import&nbsp;JSON<input type="file" id="ul-import" accept=".json,application/json" hidden></label>
    <button id="stash-toggle" title="Records saved in this browser">Session&nbsp;files</button>
  </div>
</div>
<script type="application/json" id="sc-files">__SHEETCIRCUIT_FILES__</script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
"use strict";
const STASH_KEY = "sheetcircuit.creator.files";
const COLUMNS = 140;
let creator = null;

const el = (id) => document.getElementById(id);
const show = (text) => { el("screen").textContent = text; };
const bootStatus = (text) => { el("boot-status").textContent = text; };

function readStash() {
  try { return JSON.parse(localStorage.getItem(STASH_KEY) || "{}"); }
  catch { return {}; }
}
function writeStash(map) {
  try { localStorage.setItem(STASH_KEY, JSON.stringify(map)); }
  catch (err) { showError("Could not store session copy: " + err); }
}

function showError(err) {
  const box = el("error");
  box.textContent = String(err);
  box.hidden = false;
}

function renderButtons(buttons) {
  const row = el("mode-buttons");
  row.textContent = "";
  for (const [cmd, label] of buttons) {
    const btn = document.createElement("button");
    btn.textContent = label;
    btn.addEventListener("click", () => submit(cmd));
    row.appendChild(btn);
  }
}

function refreshMeta() {
  const meta = JSON.parse(creator.ui_meta());
  el("prompt-label").textContent = meta.prompt_label + ":";
  renderButtons(meta.buttons);
  const request = meta.js_request;
  if (request) {
    if (request.stash) {
      const map = readStash();
      map[request.stash.path] = request.stash.content;
      writeStash(map);
    }
    if (request.download) {
      const blob = new Blob([request.download.content], { type: "application/json" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = request.download.filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }
    creator.clear_js_request();
  }
  renderStashPanel();
}

function renderStashPanel() {
  const panel = el("stash-panel");
  if (panel.hidden) return;
  panel.textContent = "";
  const map = readStash();
  const paths = Object.keys(map).sort();
  if (!paths.length) {
    panel.textContent = "No session files yet — saved or imported records appear here.";
    return;
  }
  for (const path of paths) {
    const row = document.createElement("div");
    row.className = "row";
    const name = document.createElement("span");
    name.textContent = path;
    const remove = document.createElement("button");
    remove.textContent = "Remove";
    remove.addEventListener("click", () => {
      const current = readStash();
      delete current[path];
      writeStash(current);
      show(creator.delete_record(path));
      refreshMeta();
    });
    row.append(name, remove);
    panel.appendChild(row);
  }
}

function submit(text) {
  if (!creator) return;
  el("error").hidden = true;
  try {
    show(creator.handle_input(text));
    refreshMeta();
  } catch (err) {
    showError(err);
  }
  el("cmd").value = "";
  el("cmd").focus();
}

async function boot() {
  try {
    bootStatus("fetching Python runtime…");
    const pyodide = await loadPyodide();
    bootStatus("installing game files…");
    const files = JSON.parse(el("sc-files").textContent);
    const writeFile = (path, text) => {
      const full = "/app/" + path;
      pyodide.FS.mkdirTree(full.slice(0, full.lastIndexOf("/")));
      pyodide.FS.writeFile(full, text);
    };
    for (const [path, text] of Object.entries(files)) writeFile(path, text);
    // Load-bearing order: the localStorage stash must be in the FS BEFORE the
    // editor imports — editor.fields globs data/tracks at import time to build
    // the event track_id choices, and the open/clone pickers glob on entry.
    for (const [path, text] of Object.entries(readStash())) writeFile(path, text);
    bootStatus("starting creator…");
    pyodide.runPython(
      'import os, sys\n' +
      'os.environ["COLUMNS"] = "' + COLUMNS + '"\n' +
      'sys.path.insert(0, "/app")\n' +
      'from interfaces.web import install_stdin_guard\n' +
      'install_stdin_guard()\n' +
      'import editor.web as editor_web\n' +
      'creator = editor_web.WebCreator()\n'
    );
    creator = pyodide.globals.get("creator");
    show(creator.render());
    refreshMeta();
    el("boot").hidden = true;
    el("app").hidden = false;
    el("cmd").focus();
  } catch (err) {
    bootStatus("failed to start: " + err + "\n(the first load needs an internet connection for the Python runtime)");
    throw err;
  }
}

el("send").addEventListener("click", () => submit(el("cmd").value.trim()));
el("cmd").addEventListener("keydown", (event) => {
  if (event.key === "Enter") submit(el("cmd").value.trim());
});
el("ul-import").addEventListener("change", async (event) => {
  const file = event.target.files[0];
  if (!file || !creator) return;
  el("error").hidden = true;
  try {
    show(creator.import_record(await file.text()));
    refreshMeta();
  } catch (err) {
    showError(err);
  }
  event.target.value = "";
});
el("stash-toggle").addEventListener("click", () => {
  const panel = el("stash-panel");
  panel.hidden = !panel.hidden;
  renderStashPanel();
});
// When opened from disk the game file keeps its build name.
if (location.protocol === "file:") el("game-link").href = "sheetcircuit.html";

boot();
</script>
</body>
</html>
