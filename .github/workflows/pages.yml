name: Deploy web version to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: python3 -m unittest discover -s tests
      - name: Build single-file web version
        run: python3 tools/build_web.py --output _site/index.html
      - name: Build single-file creator
        run: python3 tools/build_web.py --target creator --output _site/creator.html
      - name: Build compendium reference page
        run: python3 tools/build_web.py --target compendium --output _site/compendium.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
